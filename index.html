    <style>

    </style>
</head>
<body>
    <div class="app-card">
        <img src="logo.jpeg" alt="нОЬлВШлЃ§мІБ л°Ьк≥†" class="app-logo">

        <div id="report-overlay">
            <div style="font-size:16px; font-weight:bold; margin-bottom:15px;">рЯУК нЫИл†® л¶ђнПђнКЄ (мµЬкЈЉ 10нЪМ)</div>

            <h3>мЭМм†ХмЭД мД†нГЭнХШмДЄмЪФ</h3>
            <div class="btn-group">
                <button class="btn-category" onclick="selectMajor(2)">2лПД нЫИл†®</button>
                <button class="btn-category" onclick="selectMajor(6)" style="background: #2C3E50;">6лПД нЫИл†®</button>

        <div id="step1-5-page" class="page">
            <h2>6лПД мДЄлґА мД†нГЭ</h2>

            <div class="btn-group">
                <button class="btn-category" onclick="selectSub6('up')">лЛ®6лПД мГБнЦЙ нЫИл†®<br><small>(2~5лПД нХШнЦЙ)</small></button>
                <button class="btn-category" onclick="selectSub6('down')" style="background: #2C3E50;">лЛ®6лПД нХШнЦЙ нЫИл†®<br><small>(2~5лПД мГБнЦЙ)</small></button>
                <button class="btn-back" onclick="goStep1()">вђЕ м≤ШмЭМмЬЉл°Ь</button>

            </div>
            <div id="options-area"></div>

                    <button id="replay-btn" class="btn-replay" style="flex: 1;" onclick="handlePlay(true)" disabled>лЛ§мЛЬлУ£кЄ∞</button>
                </div>
                <button id="ans-btn" class="btn-sub" onclick="showAns()">м†ХлЛµ/мХЕл≥і нЩХмЭЄ</button>
                <button id="next-btn" class="btn-next" onclick="nextProblem()">лЛ§мЭМ лђЄм†Ь</button>
                <button class="btn-back" onclick="goStep2()">рЯП† л™®лУЬ мД†нГЭмЬЉл°Ь</button>
            </div>
        </div>
    </div>

    <script>
        const { Renderer, Stave, StaveNote, Voice, Formatter, Accidental } = Vex.Flow;
        const sampler = new Tone.Sampler({
            urls: { "A0": "A0.mp3", "C1": "C1.mp3", "D#1": "Ds1.mp3", "F#1": "Fs1.mp3", "A1": "A1.mp3", "C2": "C2.mp3", "D#2": "Ds2.mp3", "F#2": "Fs2.mp3", "A2": "A2.mp3", "C3": "C3.mp3", "D#3": "Ds3.mp3", "F#3": "Fs3.mp3", "A3": "A3.mp3", "C4": "C4.mp3", "D#4": "Ds4.mp3", "F#4": "Fs4.mp3", "A4": "A4.mp3", "C5": "C5.mp3", "D#5": "Ds5.mp3", "F#5": "Fs5.mp3", "A5": "A5.mp3", "C6": "C6.mp3" },
            release: 0.5, baseUrl: "https://tonejs.github.io/audio/salamander/",
            onload: () => { 
                document.getElementById('mode-ear-btn').disabled = false; 
                document.getElementById('mode-sight-btn').disabled = false;
            }
        }).toDestination();

        let currentBpm = 80; let visualNotes = []; let historyPool = []; let currentAns = "", matchedLyric = "";
        let isSightReadingMode = false; let currentIntervalMajor = 2; let sub6Direction = 'up'; 
        let trialCount = 0; let correctCount = 0; let wrongList = [];

        function updateTempo(val) { currentBpm = val; document.getElementById('tempo-val').innerText = `BPM ${val}`; }

        const baseScales = [{ n: 'c', m: 0 }, { n: 'd', m: 2 }, { n: 'e', m: 4 }, { n: 'f', m: 5 }, { n: 'g', m: 7 }, { n: 'a', m: 9 }, { n: 'b', m: 11 }];
        function getSimplestNoteInfo(midi, preferredBaseIdx) {
            let octave = Math.floor(midi / 12) - 1; let chroma = midi % 12; if (chroma < 0) chroma += 12;
            for (let i = 0; i < baseScales.length; i++) { if (baseScales[i].m === chroma) return { midi, key: baseScales[i].n, acc: "", oct: octave }; }
            const targetNatural = baseScales[preferredBaseIdx].m; let diff = chroma - targetNatural;
            if (diff > 6) diff -= 12; else if (diff < -6) diff += 12;
            for (let i = 0; i < baseScales.length; i++) {
                let nDiff = chroma - baseScales[i].m; if (nDiff > 6) nDiff -= 12; else if (nDiff < -6) nDiff += 12;
                if (Math.abs(nDiff) === 1) return { midi, key: baseScales[i].n, acc: (nDiff === 1 ? "#" : "b"), oct: octave };
            }
            return { midi, key: baseScales[preferredBaseIdx].n, acc: (diff > 0 ? "#" : "b"), oct: octave };
        }

        const pattern2D = [
            { lyric: "лПД-лФФ-л†И", ans: "лЛ®2вЖС+лЛ®2вЖС", iv: [1, 1] }, { lyric: "лѓЄ-нММ-мЖФ", ans: "лЛ®2вЖС+мЮ•2вЖС", iv: [1, 2] }, { lyric: "лЭЉ-мЛЬ-лПД", ans: "мЮ•2вЖС+лЛ®2вЖС", iv: [2, 1] }, { lyric: "лПД-л†И-лѓЄ", ans: "мЮ•2вЖС+мЮ•2вЖС", iv: [2, 2] },
            { lyric: "лПД-мЛЬ-мДЄ", ans: "лЛ®2вЖУ+лЛ®2вЖУ", iv: [-1, -1] }, { lyric: "мЖФ-нММ-лѓЄ", ans: "мЮ•2вЖУ+лЛ®2вЖУ", iv: [-2, -1] }, { lyric: "лПД-мЛЬ-лЭЉ", ans: "лЛ®2вЖУ+мЮ•2вЖУ", iv: [-1, -2] }, { lyric: "лѓЄ-л†И-лПД", ans: "мЮ•2вЖУ+мЮ•2вЖУ", iv: [-2, -2] }
        ];

        const patternM6Up = {
            1: { lyric: "лѓЄ-лПД-мЛЬ", ans: "лЛ®6вЖС+лЛ®2вЖУ" }, 2: { lyric: "мЛЬ-мЖФ-нММ", ans: "лЛ®6вЖС+мЮ•2вЖУ" }, 3: { lyric: "лѓЄ-лПД-лЭЉ", ans: "лЛ®6вЖС+лЛ®3вЖУ" }, 4: { lyric: "лѓЄ-лПД-мЖФ#", ans: "лЛ®6вЖС+мЮ•3вЖУ" },
            5: { lyric: "лѓЄ-лПД-мЖФ", ans: "лЛ®6вЖС+мЩД4вЖУ" }, 6: { lyric: "лЭЉ-нММ-мЛЬ", ans: "лЛ®6вЖС+м¶Э4вЖУ" }, 7: { lyric: "мЛЬ-мЖФ-лПД", ans: "лЛ®6вЖС+мЩД5вЖУ" }
        };

        const patternM6Down = {
            1: { lyric: "мЛЬ-лПД-лѓЄ", ans: "лЛ®6вЖУ+лЛ®2вЖС" }, 2: { lyric: "нММ-мЖФ-мЛЬ", ans: "лЛ®6вЖУ+мЮ•2вЖС" }, 3: { lyric: "лЭЉ-лПД-лѓЄ", ans: "лЛ®6вЖУ+лЛ®3вЖС" }, 4: { lyric: "мЖФ#-лПД-лѓЄ", ans: "лЛ®6вЖУ+мЮ•3вЖС" },
            5: { lyric: "мЖФ-лПД-лѓЄ", ans: "лЛ®6вЖУ+мЩД4вЖС" }, 6: { lyric: "мЛЬ-нММ-лЭЉ", ans: "лЛ®6вЖУ+м¶Э4вЖС" }, 7: { lyric: "лПД-мЖФ-мЛЬ", ans: "лЛ®6вЖУ+мЩД5вЖС" }
        };

        function selectMajor(major) {
            currentIntervalMajor = major;
            if (major === 6) {
                document.getElementById('step1-page').classList.remove('active');
                document.getElementById('step1-5-page').classList.add('active');
            } else {
                showStep2();
            }
        }

        function selectSub6(dir) {
            sub6Direction = dir;
            showStep2();
        }

        function showStep2() {
            const title = currentIntervalMajor === 2 ? "2лПД нЫИл†® л™®лУЬ" : (sub6Direction === 'up' ? "лЛ®6лПД мГБнЦЙ л™®лУЬ" : "лЛ®6лПД нХШнЦЙ л™®лУЬ");
            document.getElementById('step2-title').innerText = title;
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('step2-page').classList.add('active');
        }

        function goStep1() {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('step1-page').classList.add('active');
        }

        function goPrevStep() {
            if (currentIntervalMajor === 6) {
                document.getElementById('step2-page').classList.remove('active');
                document.getElementById('step1-5-page').classList.add('active');
            } else {
                goStep1();
            }
        }

        function goStep2() {
            document.getElementById('quiz-page').classList.remove('active');
            document.getElementById('step2-page').classList.add('active');
            document.getElementById('report-overlay').style.display = 'none';
        }

        function startQuiz(mode) {
            Tone.start();
            isSightReadingMode = (mode === 'sight');
            trialCount = 0; correctCount = 0; wrongList = [];
            updateOptionsArea();
            resetUI();
            visualNotes = generateProblem();
            document.getElementById('step2-page').classList.remove('active');
            document.getElementById('quiz-page').classList.add('active');
            setTimeout(() => { handlePlay(false); }, 300);
        }

        function generateProblem() {
            let n1Midi, n2Midi, n3Midi; const minMidi = 55; const maxMidi = 72;
            do { n1Midi = minMidi + Math.floor(Math.random() * (maxMidi - minMidi + 1)); } while (historyPool.includes(n1Midi));
            historyPool.push(n1Midi); if (historyPool.length > 5) historyPool.shift();
            const n1Idx = [0, 0, 1, 1, 2, 3, 3, 4, 4, 5, 5, 6][n1Midi % 12];

            if (currentIntervalMajor === 2) { 
                const p = pattern2D[Math.floor(Math.random() * pattern2D.length)];
                n2Midi = n1Midi + p.iv[0]; n3Midi = n2Midi + p.iv[1];
                const n2Idx = (n1Idx + (p.iv[0] > 0 ? 1 : -1) + 7) % 7; const n3Idx = (n2Idx + (p.iv[1] > 0 ? 1 : -1) + 7) % 7;
                matchedLyric = p.lyric; currentAns = p.ans; return [getSimplestNoteInfo(n1Midi, n1Idx), getSimplestNoteInfo(n2Midi, n2Idx), getSimplestNoteInfo(n3Midi, n3Idx)];
            } else {
                if (sub6Direction === 'up') {
                    const upMidi = n1Midi + 8; const upIdx = (n1Idx + 5) % 7; const downInt = 1 + Math.floor(Math.random() * 7);
                    const downMidi = upMidi - downInt; const downDeg = (downInt === 6) ? 3 : ({ 1:1, 2:1, 3:2, 4:2, 5:3, 7:4, 8:5, 9:5 }[downInt] || 1);
                    const downIdx = (upIdx - downDeg + 7) % 7; matchedLyric = patternM6Up[downInt].lyric; currentAns = patternM6Up[downInt].ans;
                    return [getSimplestNoteInfo(n1Midi, n1Idx), getSimplestNoteInfo(upMidi, upIdx), getSimplestNoteInfo(downMidi, downIdx)];
                } else {
                    const downMidi = n1Midi - 8; const downIdx = (n1Idx - 5 + 7) % 7; const upInt = 1 + Math.floor(Math.random() * 7);
                    const upMidi = downMidi + upInt; const upDeg = (upInt === 6) ? 3 : ({ 1:1, 2:1, 3:2, 4:2, 5:3, 7:4, 8:5, 9:5 }[upInt] || 1);
                    const upIdx = (downIdx + upDeg) % 7; matchedLyric = patternM6Down[upInt].lyric; currentAns = patternM6Down[upInt].ans;
                    return [getSimplestNoteInfo(n1Midi, n1Idx), getSimplestNoteInfo(downMidi, downIdx), getSimplestNoteInfo(upMidi, upIdx)];
                }
            }
        }

        function updateOptionsArea() {
            const area = document.getElementById('options-area'); const guide = document.getElementById('quiz-guide-text');
            area.innerHTML = "";
            if (isSightReadingMode) { area.style.display = 'none'; guide.innerText = ""; return; }

            if (currentIntervalMajor === 2) {
                area.style.display = 'grid'; guide.innerText = "1.лПДлФФл†И(лЛ®2вЖС+лЛ®2вЖС) 2.лѓЄнММмЖФ(лЛ®2вЖС+мЮ•2вЖС) 3.лЭЉмЛЬлПД 4.лПДл†ИлѓЄ\n5.лПДмЛЬмДЄ(лЛ®2вЖУ+лЛ®2вЖУ) 6.мЖФнММлѓЄ(мЮ•2вЖУ+лЛ®2вЖУ) 7.лПДмЛЬлЭЉ 8.лѓЄл†ИлПД";
                pattern2D.forEach((p, i) => {
                    const btn = document.createElement('button'); btn.className = "opt-btn"; btn.innerText = `${i+1}.${p.lyric}`;
                    btn.onclick = (e) => { e.preventDefault(); checkChoice(btn, p.lyric); }; area.appendChild(btn);
                });
            } else if (sub6Direction === 'up') {
                area.style.display = 'grid'; guide.innerText = "1.лѓЄлПДмЛЬ(лЛ®6вЖС+лЛ®2вЖУ) 2.мЛЬмЖФнММ(лЛ®6вЖС+мЮ•2вЖУ) 3.лѓЄлПДлЭЉ 4.лѓЄлПДмЖФ#\n5.лѓЄлПДмЖФ(лЛ®6вЖС+мЩД4вЖУ) 6.лЭЉнММмЛЬ(лЛ®6вЖС+м¶Э4вЖУ) 7.мЛЬмЖФлПД";
                Object.keys(patternM6Up).forEach((key) => {
                    const p = patternM6Up[key]; const btn = document.createElement('button'); btn.className = "opt-btn"; btn.innerText = `${key}.${p.lyric}`;
                    btn.onclick = (e) => { e.preventDefault(); checkChoice(btn, p.lyric); }; area.appendChild(btn);
                });
            } else {
                area.style.display = 'grid'; guide.innerText = "1.мЛЬлПДлѓЄ(лЛ®6вЖУ+лЛ®2вЖС) 2.нММмЖФмЛЬ(лЛ®6вЖУ+мЮ•2вЖС) 3.лЭЉлПДлѓЄ 4.мЖФ#лПДлѓЄ\n5.мЖФлПДлѓЄ(лЛ®6вЖУ+мЩД4вЖС) 6.мЛЬнММлЭЉ(лЛ®6вЖУ+м¶Э4вЖС) 7.лПДмЖФмЛЬ";
                Object.keys(patternM6Down).forEach((key) => {
                    const p = patternM6Down[key]; const btn = document.createElement('button'); btn.className = "opt-btn"; btn.innerText = `${key}.${p.lyric}`;
                    btn.onclick = (e) => { e.preventDefault(); checkChoice(btn, p.lyric); }; area.appendChild(btn);
                });
            }
        }

        function nextProblem() { resetUI(); visualNotes = generateProblem(); document.getElementById('quiz-status').innerText = "м§АлєДлРШмЧИмКµлЛИлЛ§."; setTimeout(() => { handlePlay(false); }, 100); }

        function resetUI() {
            document.getElementById('answer-text').style.display = 'none'; document.getElementById('lyric-match').style.display = 'none';
            document.getElementById('score-container').style.display = 'none'; document.getElementById('play-btn').disabled = false; document.getElementById('replay-btn').disabled = true;
            document.querySelectorAll('.opt-btn').forEach(b => { b.classList.remove('correct', 'wrong'); b.disabled = false; });
            document.getElementById('quiz-status').innerText = isSightReadingMode ? "м≤Ђ мЭМмЭД лУ£к≥† лЕЄлЮШнХШмДЄмЪФ." : "л∞©кЄИ лУ§мЭА к∞АмВђлКФ?";
        }

        function handlePlay(isReplay) {
            const bpmSec = 60 / currentBpm; const now = Tone.now();
            if (isSightReadingMode) { document.getElementById('lyric-match').innerText = `к∞АмВђ: ${matchedLyric}`; document.getElementById('lyric-match').style.display = 'block'; sampler.triggerAttackRelease(Tone.Frequency(visualNotes[0].midi, "midi"), 1.0); }
            else { visualNotes.forEach((n, i) => { sampler.triggerAttackRelease(Tone.Frequency(n.midi, "midi"), bpmSec, now + i * bpmSec); }); }
            document.getElementById('play-btn').disabled = true; document.getElementById('replay-btn').disabled = false;
        }

        function checkChoice(btn, choice) {
            if (isSightReadingMode) return; trialCount++; 
            if (choice === matchedLyric) { correctCount++; btn.classList.add('correct'); document.getElementById('quiz-status').innerText = "в≠Х м†ХлЛµ!"; document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true); showAns(); }
            else { btn.classList.add('wrong'); document.getElementById('quiz-status').innerText = "вЭМ мШ§лЛµ!"; if (!wrongList.includes(matchedLyric)) wrongList.push(matchedLyric); }
            if (trialCount > 0 && trialCount % 10 === 0) showReport();
        }

        function showReport() {
            const rate = ((trialCount - correctCount) / trialCount * 100).toFixed(1);
            let html = `<p>вЬЕ мЛЬлПД: ${trialCount}нЪМ</p><p>рЯОѓ м†ХлЛµ: ${correctCount}нЪМ</p><p>вЪ†пЄП мШ§лЛµл•†: ${rate}%</p>`;
            if (wrongList.length > 0) { html += `<p style="margin-top:10px; font-weight:bold;">рЯУЙ мЈ®мХљ нМ®нДі:</p><div style="font-size:12px;">${wrongList.join(', ')}</div>`; }
            document.getElementById('report-text').innerHTML = html; document.getElementById('report-overlay').style.display = 'flex';
        }

        function closeReport() { document.getElementById('report-overlay').style.display = 'none'; }

        function showAns() {
            if (!visualNotes.length) return;
            document.getElementById('answer-text').innerText = `м†ХлЛµ: ${currentAns}`; document.getElementById('answer-text').style.display = 'block';
            document.getElementById('lyric-match').innerText = `к∞АмВђ: ${matchedLyric}`; document.getElementById('lyric-match').style.display = 'block';
            drawScore();
        }

        function drawScore() {
            const container = document.getElementById('score-container'); container.innerHTML = ""; container.style.display = "flex";
            const renderer = new Renderer(container, Renderer.Backends.SVG); renderer.resize(260, 120);
            const ctx = renderer.getContext(); const stave = new Stave(0, 20, 250); stave.addClef("treble").setContext(ctx).draw();
            const notes = visualNotes.map(n => {
                const sn = new StaveNote({ clef: "treble", keys: [`${n.key}/${n.oct}`], duration: "q" });
                if (n.acc) sn.addModifier(new Accidental(n.acc)); return sn;
            });
            const voice = new Voice({ num_beats: visualNotes.length, beat_value: 4 }); voice.addTickables(notes);
            new Formatter().joinVoices([voice]).format([voice], 200); voice.draw(ctx, stave);
        }
    </script>
</body>
</html>
