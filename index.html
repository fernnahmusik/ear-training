<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>이어핏 음악 이론 학습 / 청음 훈련</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    <style>
        :root {
            --penna-pink: #FF9AA2;
            --penna-yellow: #FFE39F;
            --penna-green: #B5EAD7;
            --penna-blue: #C7CEEA;
            --primary: #2C3E50;
            --secondary: #34495E;
            --bg: #F9F9F9;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            touch-action: manipulation;
            overflow-x: hidden;
        }

        .app-card {
            background: white;
            width: 94%;
            max-width: 400px;
            padding: 12px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            height: auto;
            min-height: 520px;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
            box-sizing: border-box;
            border: 5px solid transparent;
            background-image: linear-gradient(#fff, #fff), linear-gradient(to bottom right, var(--penna-pink), var(--penna-yellow), var(--penna-green), var(--penna-blue));
            background-origin: border-box;
            background-clip: padding-box, border-box;
        }

        .app-logo {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 35px;
            height: 35px;
            border-radius: 8px;
            object-fit: cover;
            pointer-events: none;
            z-index: 100;
        }

        .page {
            display: none;
            flex-direction: column;
            flex-grow: 1;
            position: relative;
            z-index: 10;
        }

        .page.active {
            display: flex;
        }

        h2 {
            margin: 15px 0 5px 0;
            color: var(--primary);
            font-size: 1.2rem;
            line-height: 1.2;
        }

        .sub-title {
            font-size: 0.9rem;
            color: #7F8C8D;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .display-box {
            background: #ffffff;
            border: none;
            min-height: 90px;
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-bottom: 8px;
            padding: 10px;
            flex-shrink: 0;
            margin-top: 5px;
            position: relative;
            overflow: visible;
            z-index: 5;
        }

        .ans-header {
            display: none;
            width: 100%;
            justify-content: center;
            gap: 15px;
            margin-bottom: 2px;
        }

        #answer-text {
            font-size: 13px;
            color: var(--primary);
            font-weight: bold;
            margin: 0;
        }

        #lyric-match {
            font-size: 14px;
            color: #E74C3C;
            font-weight: 800;
            margin: 0;
        }

        #score-container {
            width: 100%;
            display: none;
            justify-content: center;
            transform: scale(0.85);
            margin-top: -10px;
            margin-bottom: -40px;
            overflow: visible;
        }

        #options-area {
            display: none;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
            margin-bottom: 12px;
            position: relative;
            z-index: 20;
            width: 100%;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: auto;
            padding-bottom: 4px;
            position: relative;
            z-index: 50;
        }

        button, .opt-btn {
            width: 100%;
            padding: 10px 6px;
            border: none;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            position: relative;
            z-index: 60;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .opt-btn {
            background: #fff;
            border: 1.5px solid #DCDFE6;
            color: #606266;
            font-size: 11px;
            line-height: 1.2;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            word-break: keep-all;
        }

        button:active {
            transform: scale(0.97);
            opacity: 0.9;
        }

        .btn-category {
            background: var(--secondary);
            color: white;
            padding: 14px;
            font-size: 0.95rem;
        }

        .btn-main {
            background: var(--primary);
            color: white;
        }

        .btn-play {
            background: #27AE60;
            color: white;
        }

        .btn-replay {
            background: #95A5A6;
            color: white;
        }

        .btn-next {
            background: #E67E22;
            color: white;
        }

        .btn-sub {
            background: white;
            color: var(--primary);
            border: 1.5px solid #DCDFE6;
        }

        .btn-back {
            background: transparent;
            color: #95A5A6;
            font-size: 11px;
            padding: 4px;
            z-index: 70;
        }

        .opt-btn.correct {
            background: var(--penna-green);
            color: white;
            border-color: #27AE60;
        }

        .opt-btn.wrong {
            background: #FFD1D1;
            color: #E74C3C;
            border-color: #E74C3C;
        }

        .tempo-container {
            background: #fff;
            padding: 6px 10px;
            border-radius: 12px;
            margin-bottom: 8px;
            border: 1px solid #eee;
            flex-shrink: 0;
            position: relative;
            z-index: 40;
        }

        .tempo-label {
            font-size: 10px;
            color: var(--secondary);
            font-weight: 600;
            margin-bottom: 2px;
            display: flex;
            justify-content: space-between;
        }

        #tempo-slider {
            width: 100%;
            cursor: pointer;
            accent-color: var(--secondary);
            margin: 0;
        }

        .error-message {
            background: #FFE6E6;
            color: #E74C3C;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
            font-size: 12px;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="app-card">
        <div id="step1-page" class="page active">
            <h2 style="margin-top:20px;">이어핏 음악 이론 학습</h2>
            <div class="sub-title">청음 / 시창 훈련 선택</div>
            <div class="btn-group">
                <button class="btn-category" onclick="selectMajor(2)">2도음 훈련</button>
                <button class="btn-category" onclick="goToStep1_3()" style="background: #455A64;">3도음 훈련</button>
                <button class="btn-category" onclick="goToStep1_4()" style="background: #5D6D7E;">4도음 훈련</button>
                <button class="btn-category" onclick="selectMajor(6)" style="background: #2C3E50;">6도음 훈련</button>
            </div>
        </div>

        <div id="step1-3-main-page" class="page">
            <h2>3도음 훈련 세부 선택</h2>
            <div class="btn-group">
                <button class="btn-category" onclick="selectSub3('2up')">3도음 2도음 상향 훈련</button>
                <button class="btn-category" onclick="selectSub3('2down')" style="background: #455A64;">3도음 2도음 하향 훈련</button>
                <button class="btn-category" onclick="selectSub3('3up')" style="background: #5D6D7E;">3도음 3도음 상향 훈련</button>
                <button class="btn-category" onclick="selectSub3('3down')" style="background: #5D6D7E;">3도음 3도음 하향 훈련</button>
                <button class="btn-back" onclick="goStep1()">◀ 돌아가기</button>
            </div>
        </div>

        <div id="step1-4-main-page" class="page">
            <h2>4도음 훈련 세부 선택</h2>
            <div class="btn-group" style="gap: 4px;">
                <button class="btn-category" onclick="selectSub4('up2')">4도음 상향 2도음 하향</button>
                <button class="btn-category" onclick="selectSub4('up3')">4도음 상향 3도음 하향</button>
                <button class="btn-category" onclick="selectSub4('upAll')" style="background: #2C3E50;">4도음 상향 2-4도음 하향</button>
                <button class="btn-category" onclick="selectSub4('down2')">4도음 하향 2도음 상향</button>
                <button class="btn-category" onclick="selectSub4('down3')">4도음 하향 3도음 상향</button>
                <button class="btn-category" onclick="selectSub4('downAll')" style="background: #2C3E50;">4도음 하향 2-4도음 상향</button>
                <button class="btn-back" onclick="goStep1()">◀ 돌아가기</button>
            </div>
        </div>

        <div id="step1-5-page" class="page">
            <h2>6도음 세부 선택</h2>
            <div class="btn-group">
                <button class="btn-category" onclick="selectSub6('up')">전체 6도음 상향 훈련</button>
                <button class="btn-category" onclick="selectSub6('down')" style="background: #2C3E50;">전체 6도음 하향 훈련</button>
                <button class="btn-back" onclick="goStep1()">◀ 돌아가기</button>
            </div>
        </div>

        <div id="step2-page" class="page">
            <h2 id="step2-title">훈련 모드 선택</h2>
            <div id="loading-status"></div>
            <div class="btn-group">
                <button id="mode-ear-btn" class="btn-main" onclick="startQuiz('ear')" disabled>청음 훈련 (Ear Training)</button>
                <button id="mode-sight-btn" class="btn-main" onclick="startQuiz('sight')" disabled style="background: #5D6D7E;">시창 훈련 (Sight Singing)</button>
                <button class="btn-back" onclick="goPrevStep()">◀ 이전 단계로</button>
            </div>
        </div>

        <div id="quiz-page" class="page">
            <div class="display-box">
                <div id="quiz-status"></div>
                <div class="ans-header" id="ans-header">
                    <p id="answer-text"></p>
                    <p id="lyric-match"></p>
                </div>
                <div id="score-container"></div>
            </div>
            <div id="options-area"></div>
            <div class="tempo-container">
                <div class="tempo-label"><span>템포</span><span id="tempo-val">BPM 80</span></div>
                <input type="range" id="tempo-slider" min="50" max="180" value="80" oninput="updateTempo(this.value)">
            </div>
            <div class="btn-group">
                <div style="display: flex; gap: 6px;">
                    <button id="play-btn" class="btn-play" style="flex: 1;" onclick="handlePlay(false)">음악 재생</button>
                    <button id="replay-btn" class="btn-replay" style="flex: 1;" onclick="handlePlay(true)" disabled>다시 청음</button>
                </div>
                <div style="display: flex; gap: 6px;">
                    <button id="ans-btn" class="btn-sub" style="flex: 1.2;" onclick="showAns()">정답 / 음악 재생</button>
                    <button id="next-btn" class="btn-next" style="flex: 1;" onclick="nextProblem()">다음 문제</button>
                </div>
                <button class="btn-back" onclick="resetStats(); showStep2();">훈련 모드 선택으로</button>
            </div>
        </div>

        <div id="result-page" class="page">
            <h2 style="margin-top:20px;">훈련 결과 분석</h2>
            <div class="display-box" style="min-height: 150px; padding: 15px;">
                <div id="res-rate" style="font-size: 1.4rem; color: #27AE60; font-weight: 700;">정답 율: 0%</div>
                <div id="res-counts" style="font-size: 0.9rem; font-weight: 700;">(정답 : 0 / 오답 : 0)</div>
                <div class="worst-pattern-box" style="background: #FFF0F0; border: 1px dashed #FF9AA2; padding: 12px; border-radius: 15px; margin-top: 10px; text-align: left;">
                    <div style="font-size: 11px; color: #E74C3C; font-weight: 800; margin-bottom: 5px;">⚠️ 가장 어려운 패턴</div>
                    <div id="worst-pattern-text" style="font-size: 13px; font-weight: 700;">어려운 패턴 ...</div>
                </div>
            </div>
            <div class="btn-group" style="margin-top: 20px;">
                <button class="btn-next" onclick="continueQuiz()">다음 10문제 계속 훈련</button>
                <button class="btn-sub" onclick="resetStats(); goStep1();">훈련 처음부터 (돌아가기)</button>
            </div>
        </div>
    </div>

    <script>
        // ========== 에러 수정: 전역 에러 핸들러 추가 ==========
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            console.error('에러 발생:', msg, error);
            return false;
        };

        const { Renderer, Stave, StaveNote, Voice, Formatter, Accidental } = Vex.Flow;

        // ========== 에러 수정: Sampler 로딩 에러 처리 추가 ==========
        let sampler = null;
        let samplerReady = false;

        const initSampler = () => {
            try {
                sampler = new Tone.Sampler({
                    urls: {
                        "A0": "A0.mp3", "C1": "C1.mp3", "D#1": "Ds1.mp3", "F#1": "Fs1.mp3",
                        "A1": "A1.mp3", "C2": "C2.mp3", "D#2": "Ds2.mp3", "F#2": "Fs2.mp3",
                        "A2": "A2.mp3", "C3": "C3.mp3", "D#3": "Ds3.mp3", "F#3": "Fs3.mp3",
                        "A3": "A3.mp3", "C4": "C4.mp3", "D#4": "Ds4.mp3", "F#4": "Fs4.mp3",
                        "A4": "A4.mp3", "C5": "C5.mp3", "D#5": "Ds5.mp3", "F#5": "Fs5.mp3",
                        "A5": "A5.mp3", "C6": "C6.mp3"
                    },
                    release: 0.5,
                    baseUrl: "https://tonejs.github.io/audio/salamander/",
                    onload: () => {
                        samplerReady = true;
                        document.getElementById('mode-ear-btn').disabled = false;
                        document.getElementById('mode-sight-btn').disabled = false;
                        const loadingStatus = document.getElementById('loading-status');
                        if (loadingStatus) {
                            loadingStatus.innerHTML = '';
                        }
                        console.log('Sampler 로딩 완료');
                    },
                    // ========== 에러 수정: onerror 핸들러 추가 ==========
                    onerror: (error) => {
                        console.error('Sampler 로딩 실패:', error);
                        const loadingStatus = document.getElementById('loading-status');
                        if (loadingStatus) {
                            loadingStatus.innerHTML = '<div class="error-message">오디오 파일 로딩에 실패했습니다. 인터넷 연결을 확인하세요.</div>';
                        }
                        // 오류에도 불구하고 버튼은 활성화 (MIDIs가 없으면 소리 안 나지만 앱은 작동)
                        document.getElementById('mode-ear-btn').disabled = false;
                        document.getElementById('mode-sight-btn').disabled = false;
                    }
                }).toDestination();
            } catch (error) {
                console.error('Sampler 초기화 중 에러:', error);
            }
        };

        // ========== 에러 수정: 로딩 상태 표시 ==========
        window.addEventListener('load', () => {
            const loadingStatus = document.getElementById('loading-status');
            if (loadingStatus) {
                loadingStatus.innerHTML = '<div style="font-size: 12px; color: #666;"><div class="loading-spinner"></div><br>오디오 파일 로딩 중...</div>';
            }
            initSampler();
        });

        // ========== 에러 수정: 터치 이벤트 안전 처리 ==========
        let audioContextResumed = false;
        window.addEventListener('touchstart', () => {
            if (!audioContextResumed && Tone.context.state !== 'running') {
                Tone.context.resume().catch(e => console.warn('오디오 컨텍스트 재개 실패:', e));
                audioContextResumed = true;
            }
        }, { once: true });

        // 전역 변수들
        let currentBpm = 80;
        let visualNotes = [];
        let currentAns = "";
        let matchedLyric = "";
        let isSightReadingMode = false;
        let currentIntervalMajor = 2;
        let sub6Direction = 'up';
        let sub3Type = '2up';
        let sub4Type = 'up2';
        let patternQueue = [];
        let stats = { correct: 0, wrong: 0, sessionCount: 0 };
        let errorTracker = {};

        // 상수
        const RANGE_MIN = 55;
        const SIGHT_MAX = 77;
        const EAR_MAX = 84;
        const MAX_LOOP_ATTEMPTS = 100; // ========== 에러 수정: 무한 루프 방지 ==========
        const baseScales = [
            { n: 'c', m: 0 }, { n: 'd', m: 2 }, { n: 'e', m: 4 },
            { n: 'f', m: 5 }, { n: 'g', m: 7 }, { n: 'a', m: 9 },
            { n: 'b', m: 11 }
        ];

        // 패턴 데이터
        const p4Up2 = [
            { lyric: "도 솔 미", ans: "솔 4 상 도 2 하", iv: [5, -1], deg: [3, -1] },
            { lyric: "라 시 솔", ans: "솔 4 상 라 2 하", iv: [5, -2], deg: [3, -1] },
            { lyric: "청음 솔 미", ans: "라 4 상 도 2 하", iv: [6, -1], deg: [3, -1] },
            { lyric: "솔 청음 파", ans: "라 4 상 라 2 하", iv: [6, -2], deg: [3, -1] }
        ];

        const p4Up3 = [
            { lyric: "도 솔 라", ans: "솔 4 상 도 3 하", iv: [5, -3], deg: [3, -2] },
            { lyric: "미 파 솔", ans: "솔 4 상 라 3 하", iv: [5, -4], deg: [3, -2] },
            { lyric: "청음 솔 라", ans: "라 4 상 도 3 하", iv: [6, -3], deg: [3, -2] },
            { lyric: "솔 청음 시", ans: "라 4 상 라 3 하", iv: [6, -4], deg: [3, -2] }
        ];

        const p4Down2 = [
            { lyric: "도 시 청음", ans: "솔 4 하 도 2 상", iv: [-5, 1], deg: [-3, 1] },
            { lyric: "라 시 솔", ans: "솔 4 하 라 2 상", iv: [-5, 2], deg: [-3, 1] },
            { lyric: "솔 청음 도", ans: "라 4 하 도 2 상", iv: [-6, 1], deg: [-3, 1] },
            { lyric: "청음 솔 시", ans: "라 4 하 라 2 상", iv: [-6, 2], deg: [-3, 1] }
        ];

        const p4Down3 = [
            { lyric: "도 파 미", ans: "솔 4 하 도 3 상", iv: [-5, 3], deg: [-3, 2] },
            { lyric: "도 시 청음", ans: "솔 4 하 라 3 상", iv: [-5, 4], deg: [-3, 2] },
            { lyric: "솔 청음 라", ans: "라 4 하 도 3 상", iv: [-6, 3], deg: [-3, 2] },
            { lyric: "청음 솔 파", ans: "라 4 하 라 3 상", iv: [-6, 4], deg: [-3, 2] }
        ];

        const p4UpExtra = { lyric: "청음 솔 도", ans: "라 4 상 솔 4 하", iv: [6, -5], deg: [3, -3] };
        const p4DownExtra = { lyric: "솔 청음 미", ans: "라 4 하 솔 4 상", iv: [-6, 5], deg: [-3, 3] };

        const pattern2D = [
            { lyric: "도 도 라", ans: "도 2 상 도 2 상", iv: [1, 1], deg: [1, 1] },
            { lyric: "미 솔 시", ans: "도 2 상 라 2 상", iv: [1, 2], deg: [1, 1] },
            { lyric: "파 청음 도", ans: "라 2 상 도 2 상", iv: [2, 1], deg: [1, 1] },
            { lyric: "도 라 미", ans: "라 2 상 라 2 상", iv: [2, 2], deg: [1, 1] },
            { lyric: "도 청음 파", ans: "도 2 하 도 2 하", iv: [-1, -1], deg: [-1, -1] },
            { lyric: "시 솔 미", ans: "라 2 하 도 2 하", iv: [-2, -1], deg: [-1, -1] },
            { lyric: "도 청음 파", ans: "도 2 하 라 2 하", iv: [-1, -2], deg: [-1, -1] },
            { lyric: "미 라 도", ans: "라 2 하 라 2 하", iv: [-2, -2], deg: [-1, -1] }
        ];

        const pattern3D2Up = [
            { lyric: "도 미 라", ans: "라 3 상 라 2 하", iv: [4, -2], deg: [2, -1] },
            { lyric: "도 미 도", ans: "라 3 상 도 2 하", iv: [4, -1], deg: [2, -1] },
            { lyric: "청음 라 도", ans: "도 3 상 라 2 하", iv: [3, -2], deg: [2, -1] },
            { lyric: "파 도 청음", ans: "도 3 상 도 2 하", iv: [3, -1], deg: [2, -1] },
            { lyric: "청음 라 시", ans: "시 3 상 도 2 하", iv: [2, -1], deg: [2, -1] }
        ];

        const pattern3D2Down = [
            { lyric: "미 도 라", ans: "라 3 하 라 2 상", iv: [-4, 2], deg: [-2, 1] },
            { lyric: "미 도 도", ans: "라 3 하 도 2 상", iv: [-4, 1], deg: [-2, 1] },
            { lyric: "라 청음 도", ans: "도 3 하 도 2 상", iv: [-3, 1], deg: [-2, 1] },
            { lyric: "도 파 청음", ans: "도 3 하 라 2 상", iv: [-3, 2], deg: [-2, 1] },
            { lyric: "라 시 도", ans: "시 3 하 도 2 상", iv: [-2, 1], deg: [-2, 1] }
        ];

        const pattern3D3Up = [
            { lyric: "도 미 시", ans: "라 3 상 도 3 상", iv: [4, 3], deg: [2, 2] },
            { lyric: "도 미 시#", ans: "라 3 상 라 3 상", iv: [4, 4], deg: [2, 2] },
            { lyric: "파 도 미", ans: "도 3 상 라 3 상", iv: [3, 4], deg: [2, 2] },
            { lyric: "청음 라 솔", ans: "도 3 상 도 3 상", iv: [3, 3], deg: [2, 2] }
        ];

        const pattern3D3Down = [
            { lyric: "시 미 도", ans: "도 3 하 라 3 하", iv: [-3, -4], deg: [-2, -2] },
            { lyric: "도 시#미", ans: "라 3 하 라 3 하", iv: [-4, -4], deg: [-2, -2] },
            { lyric: "미 도 파", ans: "라 3 하 도 3 하", iv: [-4, -3], deg: [-2, -2] },
            { lyric: "솔 라 청음", ans: "도 3 하 도 3 하", iv: [-3, -3], deg: [-2, -2] }
        ];

        const patternM6Up = [
            { lyric: "미 도 청음", ans: "도 6 상 도 2 하", iv: [8, -1], deg: [5, -1] },
            { lyric: "청음 시 솔", ans: "도 6 상 라 2 하", iv: [8, -2], deg: [5, -1] },
            { lyric: "미 도 파", ans: "도 6 상 도 3 하", iv: [8, -3], deg: [5, -2] },
            { lyric: "미 도 시#", ans: "도 6 상 라 3 하", iv: [8, -4], deg: [5, -2] },
            { lyric: "미 도 시", ans: "도 6 상 솔 4 하", iv: [8, -5], deg: [5, -3] },
            { lyric: "파 솔 청음", ans: "도 6 상 라 4 하", iv: [8, -6], deg: [5, -4] },
            { lyric: "청음 시 도", ans: "도 6 상 솔 5 하", iv: [8, -7], deg: [5, -4] }
        ];

        const patternM6Down = [
            { lyric: "시 청음 도", ans: "도 6 하 도 2 상", iv: [-8, 1], deg: [-5, 1] },
            { lyric: "솔 파 청음", ans: "도 6 하 라 2 상", iv: [-8, 2], deg: [-5, 1] },
            { lyric: "도 미 시", ans: "도 6 하 도 3 상", iv: [-8, 3], deg: [-5, 2] },
            { lyric: "도 미 시#", ans: "도 6 하 라 3 상", iv: [-8, 4], deg: [-5, 2] },
            { lyric: "도 미 파", ans: "도 6 하 솔 4 상", iv: [-8, 5], deg: [-5, 3] },
            { lyric: "시 청음 솔", ans: "도 6 하 라 4 상", iv: [-8, 6], deg: [-5, 4] },
            { lyric: "도 미 청음", ans: "도 6 하 솔 5 상", iv: [-8, 7], deg: [-5, 5] }
        ];

        // UI 함수들
        function hideAllPages() {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        }

        function goStep1() {
            hideAllPages();
            document.getElementById('step1-page').classList.add('active');
        }

        function goToStep1_3() {
            hideAllPages();
            document.getElementById('step1-3-main-page').classList.add('active');
        }

        function goToStep1_4() {
            hideAllPages();
            document.getElementById('step1-4-main-page').classList.add('active');
        }

        function selectMajor(major) {
            hideAllPages();
            currentIntervalMajor = major;
            if (major === 6) {
                document.getElementById('step1-5-page').classList.add('active');
            } else {
                showStep2();
            }
        }

        function selectSub6(dir) {
            sub6Direction = dir;
            showStep2();
        }

        function selectSub3(type) {
            currentIntervalMajor = 3;
            sub3Type = type;
            showStep2();
        }

        function selectSub4(type) {
            currentIntervalMajor = 4;
            sub4Type = type;
            showStep2();
        }

        function showStep2() {
            hideAllPages();
            document.getElementById('step2-page').classList.add('active');
        }

        function goPrevStep() {
            hideAllPages();
            if (currentIntervalMajor === 6) {
                document.getElementById('step1-5-page').classList.add('active');
            } else if (currentIntervalMajor === 4) {
                document.getElementById('step1-4-main-page').classList.add('active');
            } else if (currentIntervalMajor === 3) {
                document.getElementById('step1-3-main-page').classList.add('active');
            } else {
                goStep1();
            }
        }

        // ========== 메인 퀴즈 함수들 ==========
        async function startQuiz(mode) {
            try {
                await Tone.start();
                isSightReadingMode = (mode === 'sight');
                patternQueue = [];
                updateOptionsArea();
                resetStats();
                resetUI();
                visualNotes = generateProblem();

                requestAnimationFrame(() => {
                    hideAllPages();
                    document.getElementById('quiz-page').classList.add('active');
                    setTimeout(() => { handlePlay(false); }, 350);
                });
            } catch (error) {
                console.error('퀴즈 시작 중 에러:', error);
                alert('퀴즈를 시작하는 중에 오류가 발생했습니다.');
            }
        }

        function generateProblem() {
            // ========== 에러 수정: 무한 루프 방지 ==========
            if (patternQueue.length === 0) {
                if (currentIntervalMajor === 2) {
                    patternQueue = shuffle([...pattern2D]);
                } else if (currentIntervalMajor === 3) {
                    if (sub3Type === '2up') patternQueue = shuffle([...pattern3D2Up]);
                    else if (sub3Type === '2down') patternQueue = shuffle([...pattern3D2Down]);
                    else if (sub3Type === '3up') patternQueue = shuffle([...pattern3D3Up]);
                    else if (sub3Type === '3down') patternQueue = shuffle([...pattern3D3Down]);
                } else if (currentIntervalMajor === 4) {
                    if (sub4Type === 'up2') patternQueue = shuffle([...p4Up2]);
                    else if (sub4Type === 'up3') patternQueue = shuffle([...p4Up3]);
                    else if (sub4Type === 'upAll') patternQueue = shuffle([...p4Up2, ...p4Up3, p4UpExtra]);
                    else if (sub4Type === 'down2') patternQueue = shuffle([...p4Down2]);
                    else if (sub4Type === 'down3') patternQueue = shuffle([...p4Down3]);
                    else if (sub4Type === 'downAll') patternQueue = shuffle([...p4Down2, ...p4Down3, p4DownExtra]);
                } else {
                    patternQueue = shuffle([...(sub6Direction === 'up' ? patternM6Up : patternM6Down)]);
                }
            }

            const p = patternQueue.shift();
            const CURRENT_MAX = isSightReadingMode ? SIGHT_MAX : EAR_MAX;
            let attempts = 0; // ========== 에러 수정: 루프 카운터 추가 ==========

            while (attempts < MAX_LOOP_ATTEMPTS) {
                attempts++;
                let n1Midi = RANGE_MIN + Math.floor(Math.random() * (CURRENT_MAX - RANGE_MIN - 10));
                let n2Midi = n1Midi + p.iv[0];
                let n3Midi = n2Midi + p.iv[1];

                if (n1Midi < RANGE_MIN || n2Midi < RANGE_MIN || n3Midi < RANGE_MIN ||
                    n1Midi > CURRENT_MAX || n2Midi > CURRENT_MAX || n3Midi > CURRENT_MAX) {
                    continue;
                }

                const n1Options = getAllNotationOptions(n1Midi);
                for (let n1 of n1Options) {
                    const n2 = getNoteByDegree(n2Midi, n1, p.deg[0]);
                    const n3 = getNoteByDegree(n3Midi, n2, p.deg[1]);

                    if (!n1.acc.includes('##') && !n1.acc.includes('bb') &&
                        !n2.acc.includes('##') && !n2.acc.includes('bb') &&
                        !n3.acc.includes('##') && !n3.acc.includes('bb')) {
                        matchedLyric = p.lyric;
                        currentAns = p.ans;
                        return [n1, n2, n3];
                    }
                }
            }

            // ========== 에러 수정: 루프 실패 시 기본값 반환 ==========
            console.warn('문제 생성 실패, 기본값 사용');
            matchedLyric = p.lyric;
            currentAns = p.ans;
            return [
                { midi: 60, key: 'c', acc: '', oct: 4 },
                { midi: 65, key: 'f', acc: '', oct: 4 },
                { midi: 67, key: 'g', acc: '', oct: 4 }
            ];
        }

        function updateOptionsArea() {
            const area = document.getElementById('options-area');
            area.innerHTML = "";
            if (isSightReadingMode) {
                area.style.display = 'none';
                return;
            }
            area.style.display = 'grid';

            let list = [];
            if (currentIntervalMajor === 2) {
                list = pattern2D;
            } else if (currentIntervalMajor === 3) {
                if (sub3Type === '2up') list = pattern3D2Up;
                else if (sub3Type === '2down') list = pattern3D2Down;
                else if (sub3Type === '3up') list = pattern3D3Up;
                else list = pattern3D3Down;
            } else if (currentIntervalMajor === 4) {
                if (sub4Type === 'up2') list = p4Up2;
                else if (sub4Type === 'up3') list = p4Up3;
                else if (sub4Type === 'upAll') list = [...p4Up2, ...p4Up3, p4UpExtra];
                else if (sub4Type === 'down2') list = p4Down2;
                else if (sub4Type === 'down3') list = p4Down3;
                else list = [...p4Down2, ...p4Down3, p4DownExtra];
            } else {
                list = (sub6Direction === 'up' ? patternM6Up : patternM6Down);
            }

            list.forEach((p, i) => {
                const btn = document.createElement('button');
                btn.className = "opt-btn";
                btn.innerText = `${i + 1}.${p.lyric}\n(${p.ans})`;
                btn.onclick = (e) => {
                    e.preventDefault();
                    checkChoice(btn, p.lyric);
                };
                area.appendChild(btn);
            });
        }

        function checkChoice(btn, choice) {
            stats.sessionCount++;
            if (choice === matchedLyric) {
                btn.classList.add('correct');
                stats.correct++;
                document.getElementById('quiz-status').innerText = "✅ 정답!";
                document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
                showAns();
            } else {
                btn.classList.add('wrong');
                stats.wrong++;
                errorTracker[matchedLyric] = (errorTracker[matchedLyric] || 0) + 1;
                document.getElementById('quiz-status').innerText = "❌ 오답!";
            }
        }

        async function nextProblem() {
            try {
                await Tone.start();
                if (!isSightReadingMode && stats.sessionCount >= 10) {
                    showResults();
                    return;
                }
                resetUI();
                visualNotes = generateProblem();
                setTimeout(() => { handlePlay(false); }, 150);
            } catch (error) {
                console.error('다음 문제 이동 중 에러:', error);
            }
        }

        function showResults() {
            hideAllPages();
            document.getElementById('result-page').classList.add('active');
            document.getElementById('res-counts').innerText = `(정답 : ${stats.correct} / 오답 : ${stats.wrong})`;

            const total = stats.correct + stats.wrong;
            const rate = total > 0 ? Math.round((stats.correct / total) * 100) : 0;
            document.getElementById('res-rate').innerText = `정답 율: ${rate}%`;

            let wp = "패턴 없음";
            let maxE = 0;
            for (let l in errorTracker) {
                if (errorTracker[l] > maxE) {
                    maxE = errorTracker[l];
                    wp = `${l} (${maxE}회)`;
                }
            }
            document.getElementById('worst-pattern-text').innerText = wp;
        }

        function continueQuiz() {
            stats.sessionCount = 0;
            hideAllPages();
            document.getElementById('quiz-page').classList.add('active');
            nextProblem();
        }

        function resetStats() {
            stats = { correct: 0, wrong: 0, sessionCount: 0 };
            errorTracker = {};
        }

        function resetUI() {
            document.getElementById('ans-header').style.display = 'none';
            document.getElementById('score-container').style.display = 'none';
            document.getElementById('play-btn').disabled = false;
            document.getElementById('replay-btn').disabled = true;
            document.querySelectorAll('.opt-btn').forEach(b => {
                b.classList.remove('correct', 'wrong');
                b.disabled = false;
            });

            const s = document.getElementById('quiz-status');
            if (isSightReadingMode) {
                s.innerText = "악보를 보고 음악적으로 부르기!";
            } else {
                s.innerText = "";
            }
        }

        // ========== 에러 수정: 사운드 재생 개선 ==========
        async function handlePlay(isReplay) {
            try {
                await Tone.start();

                if (!sampler || !samplerReady) {
                    console.warn('Sampler이 준비되지 않았습니다.');
                    return;
                }

                const bpmSec = 60 / currentBpm;
                const now = Tone.now();

                if (isSightReadingMode) {
                    document.getElementById('ans-header').style.display = 'flex';
                    document.getElementById('lyric-match').innerText = `가사 : ${matchedLyric}`;
                    // ========== 에러 수정: 첫 음을 더 오래 재생 ==========
                    sampler.triggerAttackRelease(Tone.Frequency(visualNotes[0].midi, "midi"), bpmSec * 2);
                } else {
                    // 모든 음을 순차적으로 재생
                    visualNotes.forEach((n, i) => {
                        sampler.triggerAttackRelease(Tone.Frequency(n.midi, "midi"), bpmSec, now + i * bpmSec);
                    });
                }

                document.getElementById('play-btn').disabled = true;
                document.getElementById('replay-btn').disabled = false;
            } catch (error) {
                console.error('음성 재생 중 에러:', error);
                alert('음성 재생 중 오류가 발생했습니다.');
            }
        }

        function updateTempo(val) {
            currentBpm = val;
            document.getElementById('tempo-val').innerText = `BPM ${val}`;
        }

        function shuffle(a) {
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function showAns() {
            document.getElementById('ans-header').style.display = 'flex';
            document.getElementById('answer-text').innerText = `정답 : ${currentAns}`;
            document.getElementById('lyric-match').innerText = `가사 : ${matchedLyric}`;
            if (isSightReadingMode) {
                document.getElementById('quiz-status').innerText = "";
            }
            drawScore();

            // ========== 에러 수정: 정답 재생 ==========
            if (sampler && samplerReady) {
                const b = 60 / currentBpm;
                const n = Tone.now();
                visualNotes.forEach((v, i) => {
                    sampler.triggerAttackRelease(Tone.Frequency(v.midi, "midi"), b, n + i * b);
                });
            }
        }

        function drawScore() {
            const c = document.getElementById('score-container');
            c.innerHTML = "";
            c.style.display = "flex";

            const r = new Renderer(c, Renderer.Backends.SVG);
            r.resize(260, 150);
            const ctx = r.getContext();
            const s = new Stave(0, 0, 250);
            s.addClef("treble").setContext(ctx).draw();

            const at = {};
            const notes = visualNotes.map(n => {
                const sn = new StaveNote({ clef: "treble", keys: [`${n.key}/${n.oct}`], duration: "q" });
                const ca = n.acc || "";
                const pa = at[n.key];
                if (ca === "") {
                    if (pa !== undefined && pa !== "") {
                        sn.addModifier(new Accidental("n"));
                    }
                } else {
                    if (pa !== ca) {
                        sn.addModifier(new Accidental(ca));
                    }
                }
                at[n.key] = ca;
                return sn;
            });

            const voice = new Voice({ num_beats: visualNotes.length, beat_value: 4 });
            voice.addTickables(notes);
            new Formatter().joinVoices([voice]).format([voice], 200);
            voice.draw(ctx, s);
        }

        function getNoteByDegree(midi, baseNote, degreeDiff) {
            const chroma = (midi % 12 + 12) % 12;
            const baseIdx = baseScales.findIndex(s => s.n === baseNote.key);
            let targetIdx = (baseIdx + degreeDiff) % 7;
            if (targetIdx < 0) targetIdx += 7;
            const targetScale = baseScales[targetIdx];
            let octave = baseNote.oct + Math.floor((baseIdx + degreeDiff) / 7);
            let diff = chroma - targetScale.m;
            if (diff > 6) diff -= 12;
            else if (diff < -6) diff += 12;
            let acc = diff === 1 ? "#" : (diff === 2 ? "##" : (diff === -1 ? "b" : (diff === -2 ? "bb" : "")));
            return { midi, key: targetScale.n, acc, oct: octave };
        }

        function getAllNotationOptions(midi) {
            const chroma = (midi % 12 + 12) % 12;
            const options = [];
            baseScales.forEach((s) => {
                let diff = chroma - s.m;
                if (diff > 6) diff -= 12;
                else if (diff < -6) diff += 12;
                if (Math.abs(diff) <= 1) {
                    options.push({
                        midi,
                        key: s.n,
                        acc: diff === 1 ? "#" : (diff === -1 ? "b" : ""),
                        oct: Math.floor(midi / 12) - 1
                    });
                }
            });
            return options;
        }
    </script>
