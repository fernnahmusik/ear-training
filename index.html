<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>펜나뮤직 이어핏 시창/청음</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    <style>
        :root { 
            --penna-pink: #FF9AA2; --penna-yellow: #FFE39F; --penna-green: #B5EAD7; --penna-blue: #C7CEEA;    
            --primary: #2C3E50; --secondary: #34495E; --bg: #F9F9F9; 
        }
        
        body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; touch-action: pan-x pan-y; }
        
        .app-card { 
            background: white; width: 94%; max-width: 400px; padding: 12px; border-radius: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; height: auto; min-height: 520px;
            display: flex; flex-direction: column; position: relative; box-sizing: border-box;
            border: 5px solid transparent;
            background-image: linear-gradient(#fff, #fff), linear-gradient(to bottom right, var(--penna-pink), var(--penna-yellow), var(--penna-green), var(--penna-blue));
            background-origin: border-box; background-clip: padding-box, border-box;
        }
        
        /* 로고 레이어 순위 조정 (상자와 겹침 허용) */
        .app-logo { position: absolute; top: 15px; right: 15px; width: 35px; height: 35px; border-radius: 8px; object-fit: cover; pointer-events: none; z-index: 20; }
        
        .page { display: none; flex-direction: column; flex-grow: 1; position: relative; z-index: 10; }
        .page.active { display: flex; }
        
        h2 { margin: 15px 0 15px 0; color: var(--primary); font-size: 1.2rem; line-height: 1.2; }
        
        /* [수정] 회색 상자를 최상단으로 올림 */
        .display-box { background: #F2F4F6; min-height: 80px; border-radius: 18px; display: flex; flex-direction: column; justify-content: center; align-items: center; margin-bottom: 8px; padding: 10px; flex-shrink: 0; margin-top: 5px; }
        
        #quiz-status { font-size: 14px; color: #7F8C8D; margin-bottom: 4px; font-weight: 800; }
        
        /* [수정] 가이드 텍스트 최적화 */
        #quiz-guide-text { font-size: 13.5px; color: #2C3E50; line-height: 1.6; font-weight: 700; white-space: pre-wrap; background: rgba(255,255,255,0.8); padding: 10px; border-radius: 12px; width: 95%; box-shadow: inset 0 0 5px rgba(0,0,0,0.05); text-align: left; box-sizing: border-box; }
        
        #answer-text { font-size: 13px; color: var(--primary); font-weight: bold; margin-bottom: 2px; display: none; }
        #lyric-match { font-size: 14px; color: #E74C3C; font-weight: 800; margin-bottom: 4px; display: none; }
        
        #score-container { width: 100%; display: none; justify-content: center; transform: scale(0.75); margin-top: -30px; margin-bottom: -10px; }

        #options-area { display: none; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 12px; }
        .opt-btn { background: #fff; border: 1.5px solid #DCDFE6; color: #606266; padding: 12px 2px; font-size: 13.5px; border-radius: 12px; font-weight: 700; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .opt-btn.correct { background: #E1F3D8; border-color: #67C23A; color: #67C23A; }
        .opt-btn.wrong { background: #FDE2E2; border-color: #F56C6C; color: #F56C6C; }

        .tempo-container { background: #fff; padding: 6px 10px; border-radius: 12px; margin-bottom: 8px; border: 1px solid #eee; flex-shrink: 0; }
        .tempo-label { font-size: 10px; color: var(--secondary); font-weight: 600; margin-bottom: 2px; display: flex; justify-content: space-between; }
        #tempo-slider { width: 100%; cursor: pointer; accent-color: var(--secondary); margin: 0; }

        .btn-group { display: flex; flex-direction: column; gap: 6px; margin-top: auto; padding-bottom: 4px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 14px; font-size: 13px; font-weight: 600; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        button:active { transform: scale(0.97); opacity: 0.9; }
        
        .btn-category { background: var(--secondary); color: white; padding: 20px; font-size: 1.1rem; }
        .btn-main { background: var(--primary); color: white; }
        .btn-play { background: #27AE60; color: white; } 
        .btn-replay { background: #95A5A6; color: white; } 
        .btn-next { background: #E67E22; color: white; } 
        .btn-sub { background: white; color: var(--primary); border: 1.5px solid #DCDFE6; }
        .btn-back { background: transparent; color: #95A5A6; font-size: 11px; padding: 4px; }
        
        #report-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background:white; border-radius: 25px; display:none; flex-direction:column; justify-content:center; align-items:center; z-index:1000; padding:20px; box-sizing:border-box; }
    </style>
</head>
<body>
    <div class="app-card">
        <img src="logo.jpeg" alt="펜나뮤직 로고" class="app-logo">

        <div id="report-overlay">
            <div style="font-size:16px; font-weight:bold; margin-bottom:15px;">📊 훈련 리포트 (최근 10회)</div>
            <div id="report-text" style="text-align:left; font-size:13px; width:100%;"></div>
            <button class="btn-play" style="margin-top:20px; width:80%;" onclick="closeReport()">계속하기</button>
        </div>

        <div id="step1-page" class="page active">
            <h2>펜나뮤직 이어핏</h2>
            <div class="btn-group" style="margin-top:20px;">
                <button class="btn-category" onclick="selectMajor(2)">2도 훈련</button>
                <button class="btn-category" onclick="selectMajor(6)" style="background: #2C3E50;">6도 훈련</button>
            </div>
        </div>

        <div id="step1-5-page" class="page">
            <h2>6도 세부 선택</h2>
            <div class="btn-group">
                <button class="btn-category" onclick="selectSub6('up')">단6도 상행 훈련<br><small>(2~5도 하행)</small></button>
                <button class="btn-category" onclick="selectSub6('down')" style="background: #2C3E50;">단6도 하행 훈련<br><small>(2~5도 상행)</small></button>
                <button class="btn-back" onclick="goStep1()">⬅ 처음으로</button>
            </div>
        </div>

        <div id="step2-page" class="page">
            <h2 id="step2-title">모드 선택</h2>
            <div class="btn-group">
                <button id="mode-ear-btn" class="btn-main" onclick="startQuiz('ear')" disabled>청음 훈련 (Ear Training)</button>
                <button id="mode-sight-btn" class="btn-main" onclick="startQuiz('sight')" disabled style="background: #5D6D7E;">시창 훈련 (Sight Singing)</button>
                <button class="btn-back" id="back-to-prev" onclick="goPrevStep()">⬅ 뒤로 가기</button>
            </div>
        </div>

        <div id="quiz-page" class="page">
            <div class="display-box">
                <div id="quiz-status"></div> 
                <div id="answer-text">정답 표시</div>
                <div id="lyric-match">가사 매칭</div>
                <div id="score-container"></div>
                <div id="quiz-guide-text"></div> 
            </div>
            
            <div id="options-area"></div>
            
            <div class="tempo-container">
                <div class="tempo-label"><span>속도</span><span id="tempo-val">BPM 80</span></div>
                <input type="range" id="tempo-slider" min="50" max="180" value="80" oninput="updateTempo(this.value)">
            </div>
            
            <div class="btn-group">
                <div style="display: flex; gap: 6px;">
                    <button id="play-btn" class="btn-play" style="flex: 1;" onclick="handlePlay(false)">재생</button>
                    <button id="replay-btn" class="btn-replay" style="flex: 1;" onclick="handlePlay(true)" disabled>다시듣기</button>
                </div>
                <div style="display: flex; gap: 6px;">
                    <button id="ans-btn" class="btn-sub" style="flex: 1.2;" onclick="showAns()">정답/악보 확인</button>
                    <button id="next-btn" class="btn-next" style="flex: 1;" onclick="nextProblem()">다음 문제</button>
                </div>
                <button class="btn-back" onclick="goStep2()">🏠 모드 선택으로</button>
            </div>
        </div>
    </div>

    <script>
        const { Renderer, Stave, StaveNote, Voice, Formatter, Accidental } = Vex.Flow;
        const sampler = new Tone.Sampler({
            urls: { "A0": "A0.mp3", "C1": "C1.mp3", "D#1": "Ds1.mp3", "F#1": "Fs1.mp3", "A1": "A1.mp3", "C2": "C2.mp3", "D#2": "Ds2.mp3", "F#2": "Fs2.mp3", "A2": "A2.mp3", "C3": "C3.mp3", "D#3": "Ds3.mp3", "F#3": "Fs3.mp3", "A3": "A3.mp3", "C4": "C4.mp3", "D#4": "Ds4.mp3", "F#4": "Fs4.mp3", "A4": "A4.mp3", "C5": "C5.mp3", "D#5": "Ds5.mp3", "F#5": "Fs5.mp3", "A5": "A5.mp3", "C6": "C6.mp3" },
            release: 0.5, baseUrl: "https://tonejs.github.io/audio/salamander/",
            onload: () => { 
                document.getElementById('mode-ear-btn').disabled = false; 
                document.getElementById('mode-sight-btn').disabled = false;
            }
        }).toDestination();

        let currentBpm = 80; let visualNotes = []; let historyPool = []; let currentAns = "", matchedLyric = "";
        let isSightReadingMode = false; let currentIntervalMajor = 2; let sub6Direction = 'up'; 
        let trialCount = 0; let correctCount = 0; let wrongList = [];

        function updateTempo(val) { currentBpm = val; document.getElementById('tempo-val').innerText = `BPM ${val}`; }

        const baseScales = [{ n: 'c', m: 0 }, { n: 'd', m: 2 }, { n: 'e', m: 4 }, { n: 'f', m: 5 }, { n: 'g', m: 7 }, { n: 'a', m: 9 }, { n: 'b', m: 11 }];
        function getSimplestNoteInfo(midi, preferredBaseIdx) {
            let octave = Math.floor(midi / 12) - 1; let chroma = midi % 12; if (chroma < 0) chroma += 12;
            for (let i = 0; i < baseScales.length; i++) { if (baseScales[i].m === chroma) return { midi, key: baseScales[i].n, acc: "", oct: octave }; }
            const targetNatural = baseScales[preferredBaseIdx].m; let diff = chroma - targetNatural;
            if (diff > 6) diff -= 12; else if (diff < -6) diff += 12;
            for (let i = 0; i < baseScales.length; i++) {
                let nDiff = chroma - baseScales[i].m; if (nDiff > 6) nDiff -= 12; else if (nDiff < -6) nDiff += 12;
                if (Math.abs(nDiff) === 1) return { midi, key: baseScales[i].n, acc: (nDiff === 1 ? "#" : "b"), oct: octave };
            }
            return { midi, key: baseScales[preferredBaseIdx].n, acc: (diff > 0 ? "#" : "b"), oct: octave };
        }

        const pattern2D = [
            { lyric: "도-디-레", ans: "단2↑+단2↑", iv: [1, 1] }, { lyric: "미-파-솔", ans: "단2↑+장2↑", iv: [1, 2] }, { lyric: "라-시-도", ans: "장2↑+단2↑", iv: [2, 1] }, { lyric: "도-레-미", ans: "장2↑+장2↑", iv: [2, 2] },
            { lyric: "도-시-세", ans: "단2↓+단2↓", iv: [-1, -1] }, { lyric: "솔-파-미", ans: "장2↓+단2↓", iv: [-2, -1] }, { lyric: "도-시-라", ans: "단2↓+장2↓", iv: [-1, -2] }, { lyric: "미-레-도", ans: "장2↓+장2↓", iv: [-2, -2] }
        ];

        const patternM6Up = {
            1: { lyric: "미-도-시", ans: "단6↑+단2↓" }, 2: { lyric: "시-솔-파", ans: "단6↑+장2↓" }, 3: { lyric: "미-도-라", ans: "단6↑+단3↓" }, 4: { lyric: "미-도-솔#", ans: "단6↑+장3↓" },
            5: { lyric: "미-도-솔", ans: "단6↑+완4↓" }, 6: { lyric: "라-파-시", ans: "단6↑+증4/감5↓" }, 7: { lyric: "시-솔-도", ans: "단6↑+완5↓" }
        };

        const patternM6Down = {
            1: { lyric: "솔-시-도", ans: "단6↓+단2↑" }, 2: { lyric: "파-라-시", ans: "단6↓+장2↑" }, 3: { lyric: "도-미-솔", ans: "단6↓+단3↑" }, 4: { lyric: "도-미-솔#", ans: "단6↓+장3↑" },
            5: { lyric: "도-미-라", ans: "단6↓+완4↑" }, 6: { lyric: "솔-시-파", ans: "단6↓+증4/감5↑" }, 7: { lyric: "도-미-시", ans: "단6↓+완5↑" }
        };

        function selectMajor(major) { currentIntervalMajor = major; if (major === 6) { document.getElementById('step1-page').classList.remove('active'); document.getElementById('step1-5-page').classList.add('active'); } else { showStep2(); } }
        function selectSub6(dir) { sub6Direction = dir; showStep2(); }
        function showStep2() { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById('step2-page').classList.add('active'); }
        function goStep1() { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById('step1-page').classList.add('active'); }
        function goPrevStep() { if (currentIntervalMajor === 6) { document.getElementById('step2-page').classList.remove('active'); document.getElementById('step1-5-page').classList.add('active'); } else { goStep1(); } }
        function goStep2() { document.getElementById('quiz-page').classList.remove('active'); document.getElementById('step2-page').classList.add('active'); document.getElementById('report-overlay').style.display = 'none'; }

        function startQuiz(mode) {
            Tone.start(); isSightReadingMode = (mode === 'sight'); trialCount = 0; correctCount = 0; wrongList = [];
            updateOptionsArea(); resetUI(); visualNotes = generateProblem();
            document.getElementById('step2-page').classList.remove('active'); document.getElementById('quiz-page').classList.add('active');
            setTimeout(() => { handlePlay(false); }, 300);
        }

        function generateProblem() {
            let n1Midi, n2Midi, n3Midi; const minMidi = 55; const maxMidi = 72;
            do { n1Midi = minMidi + Math.floor(Math.random() * (maxMidi - minMidi + 1)); } while (historyPool.includes(n1Midi));
            historyPool.push(n1Midi); if (historyPool.length > 5) historyPool.shift();
            const n1Idx = [0, 0, 1, 1, 2, 3, 3, 4, 4, 5, 5, 6][n1Midi % 12];
            if (currentIntervalMajor === 2) { 
                const p = pattern2D[Math.floor(Math.random() * pattern2D.length)];
                n2Midi = n1Midi + p.iv[0]; n3Midi = n2Midi +
