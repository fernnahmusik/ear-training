<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>펜나뮤직 이어핏 시창/청음</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    <style>
        :root { --primary: #2C3E50; --secondary: #34495E; --bg: #F9F9F9; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-card { background: white; width: 95%; max-width: 420px; padding: 35px 20px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); text-align: center; border-top: 5px solid var(--primary); min-height: 520px; display: flex; flex-direction: column; }
        
        .page { display: none; flex-direction: column; flex-grow: 1; animation: fadeIn 0.3s ease-out; }
        .page.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h2 { margin-top: 0; color: var(--primary); margin-bottom: 25px; }
        .display-box { background: #F2F4F6; min-height: 200px; border-radius: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; margin-bottom: 20px; padding: 15px; }
        
        #quiz-status { font-size: 14px; color: #7F8C8D; font-weight: 500; margin-bottom: 10px; }
        #answer-text { font-size: 16px; color: var(--primary); font-weight: bold; margin-bottom: 5px; display: none; }
        #lyric-match { font-size: 18px; color: #E74C3C; font-weight: 800; margin-bottom: 10px; display: none; }
        #score-container { width: 100%; display: none; justify-content: center; }

        .tempo-container { background: #fff; padding: 15px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #eee; }
        .tempo-label { font-size: 13px; color: var(--secondary); font-weight: 600; margin-bottom: 8px; display: flex; justify-content: space-between; }
        #tempo-slider { width: 100%; cursor: pointer; accent-color: var(--primary); }

        .btn-group { display: flex; flex-direction: column; gap: 8px; margin-top: auto; }
        button { width: 100%; padding: 16px; border: none; border-radius: 15px; font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        .btn-main { background: var(--primary); color: white; }
        .btn-secondary { background: var(--secondary); color: white; }
        .btn-play { background: #27AE60; color: white; } 
        .btn-replay { background: #95A5A6; color: white; } 
        .btn-sub { background: white; color: var(--primary); border: 2px solid var(--primary); }
        .btn-back { background: transparent; color: #95A5A6; font-size: 13px; padding: 8px; margin-top: 5px; border: none; }

        #lyric-guide { margin-top: 20px; padding: 15px; background: #fff; border: 1px dashed #BDC3C7; border-radius: 15px; text-align: left; }
        .guide-title { font-size: 13px; font-weight: bold; color: var(--primary); margin-bottom: 5px; }
        .guide-list { font-size: 12px; color: #7F8C8D; line-height: 1.5; }
        
        button:disabled { background: #BDC3C7; cursor: not-allowed; opacity: 0.6; }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="app-card">
        <div id="main-page" class="page active">
            <h2>펜나뮤직 이어핏</h2>
            <div style="flex-grow: 1; display: flex; flex-direction: column; justify-content: center;">
                <p style="color: #7F8C8D; font-size: 14px; margin-bottom: 30px;">연습 모드를 선택하세요.</p>
                <div class="btn-group">
                    <button id="p1-load-btn" class="btn-main" onclick="startQuiz(1)" disabled>연습 1: 단6도 청음 훈련</button>
                    <button id="p2-load-btn" class="btn-secondary" onclick="startQuiz(2)" disabled>연습 2: 단6도 시창 훈련</button>
                </div>
            </div>
            <div id="lyric-guide">
                <div class="guide-title">💡 음정별 가사 참고</div>
                <div class="guide-list">미-도-시 / 시-솔-파 / 미-도-라 / 미-도-솔#<br>미-도-솔 / 라-파-시 / 시-솔-도</div>
            </div>
        </div>

        <div id="quiz-page" class="page">
            <h2 id="quiz-title" style="font-size: 1.2rem;">연습 진행 중</h2>
            
            <div class="display-box">
                <div id="quiz-status">문제가 준비되었습니다.</div>
                <div id="answer-text">정답 표시</div>
                <div id="lyric-match">가사 매칭</div>
                <div id="score-container"></div>
            </div>

            <div class="tempo-container">
                <div class="tempo-label"><span>재생 속도 (Tempo)</span><span id="tempo-val">BPM 80</span></div>
                <input type="range" id="tempo-slider" min="50" max="180" value="80" oninput="updateTempo(this.value)">
            </div>

            <div class="btn-group">
                <button id="play-btn" class="btn-play" onclick="handlePlay(false)">문제 재생</button>
                <button id="replay-btn" class="btn-replay" onclick="handlePlay(true)" disabled>다시 듣기</button>
                <button id="ans-btn" class="btn-sub" onclick="showAns()">정답 및 악보 확인</button>
                <button class="btn-back" onclick="goBack()">🏠 처음으로 돌아가기</button>
            </div>
        </div>
    </div>

    <script>
        const { Renderer, Stave, StaveNote, Voice, Formatter, Accidental } = Vex.Flow;
        const sampler = new Tone.Sampler({
            urls: {
                "A0": "A0.mp3", "C1": "C1.mp3", "D#1": "Ds1.mp3", "F#1": "Fs1.mp3",
                "A1": "A1.mp3", "C2": "C2.mp3", "D#2": "Ds2.mp3", "F#2": "Fs2.mp3",
                "A2": "A2.mp3", "C3": "C3.mp3", "D#3": "Ds3.mp3", "F#3": "Fs3.mp3",
                "A3": "A3.mp3", "C4": "C4.mp3", "D#4": "Ds4.mp3", "F#4": "Fs4.mp3",
                "A4": "A4.mp3", "C5": "C5.mp3", "D#5": "Ds5.mp3", "F#5": "Fs5.mp3",
                "A5": "A5.mp3", "C6": "C6.mp3"
            },
            release: 0.5,
            baseUrl: "https://tonejs.github.io/audio/salamander/",
            onload: () => {
                document.getElementById('p1-load-btn').disabled = false;
                document.getElementById('p2-load-btn').disabled = false;
                document.querySelector('#main-page p').innerText = "준비 완료! 모드를 선택하세요.";
            }
        }).toDestination();

        let currentBpm = 80;
        let visualNotes = [];
        let p1History = [], p2History = [];
        let currentAns = "", matchedLyric = "";
        let isSightReadingMode = false;

        function updateTempo(val) {
            currentBpm = val;
            document.getElementById('tempo-val').innerText = `BPM ${val}`;
        }

        const baseScales = [{ n: 'c', m: 0 }, { n: 'd', m: 2 }, { n: 'e', m: 4 }, { n: 'f', m: 5 }, { n: 'g', m: 7 }, { n: 'a', m: 9 }, { n: 'b', m: 11 }];

        function getSimplestNoteInfo(midi, preferredBaseIdx) {
            let octave = Math.floor(midi / 12) - 1;
            let chroma = midi % 12;
            if (chroma < 0) chroma += 12;
            for (let i = 0; i < baseScales.length; i++) {
                if (baseScales[i].m === chroma) return { midi, key: baseScales[i].n, acc: "", oct: octave };
            }
            const targetNatural = baseScales[preferredBaseIdx].m;
            let diff = chroma - targetNatural;
            if (diff > 6) diff -= 12; else if (diff < -6) diff += 12;
            for (let i = 0; i < baseScales.length; i++) {
                let nDiff = chroma - baseScales[i].m;
                if (nDiff > 6) nDiff -= 12; else if (nDiff < -6) nDiff += 12;
                if (Math.abs(nDiff) === 1) return { midi, key: baseScales[i].n, acc: (nDiff === 1 ? "#" : "b"), oct: octave };
            }
            return { midi, key: baseScales[preferredBaseIdx].n, acc: (diff > 0 ? "#" : "b"), oct: octave };
        }

        function generateProblem(type) {
            let rMidi;
            const history = (type === 1) ? p1History : p2History;
            const minMidi = 55;
            const maxRoot = (type === 2) ? 69 : 72; 
            do { rMidi = minMidi + Math.floor(Math.random() * (maxRoot - minMidi + 1)); } while (history.includes(rMidi));
            history.push(rMidi); if (history.length > 5) history.shift();

            const rBaseIdx = [0, 0, 1, 1, 2, 3, 3, 4, 4, 5, 5, 6][rMidi % 12];
            const upMidi = rMidi + 8;
            const upBaseIdx = (rBaseIdx + 5) % 7;
            const downInt = 1 + Math.floor(Math.random() * 7);
            const downMidi = upMidi - downInt;
            const downDeg = (downInt === 6) ? 3 : ({ 1:1, 2:1, 3:2, 4:2, 5:3, 7:4, 8:5, 9:5 }[downInt] || 1);
            const downBaseIdx = (upBaseIdx - downDeg + 7) % 7;

            const lyrics = { 1: "미-도-시", 2: "시-솔-파", 3: "미-도-라", 4: "미-도-솔#", 5: "미-도-솔", 6: "라-파-시", 7: "시-솔-도" };
            matchedLyric = lyrics[downInt] || "";
            currentAns = `단6도 상행 → ${ {1:"단2", 2:"장2", 3:"단3", 4:"장3", 5:"완4", 6:"증4/감5", 7:"완5"}[downInt] } 하행`;

            return [ getSimplestNoteInfo(rMidi, rBaseIdx), getSimplestNoteInfo(upMidi, upBaseIdx), getSimplestNoteInfo(downMidi, downBaseIdx) ];
        }

        function startQuiz(type) {
            Tone.start();
            isSightReadingMode = (type === 2);
            visualNotes = generateProblem(type);
            
            document.getElementById('quiz-title').innerText = isSightReadingMode ? "연습 2: 시창 훈련" : "연습 1: 청음 훈련";
            document.getElementById('quiz-status').innerText = "문제가 준비되었습니다.";
            document.getElementById('answer-text').style.display = 'none';
            document.getElementById('lyric-match').style.display = 'none';
            document.getElementById('score-container').style.display = 'none';
            
            document.getElementById('play-btn').disabled = false;
            document.getElementById('replay-btn').disabled = true;
            
            document.getElementById('main-page').classList.remove('active');
            document.getElementById('quiz-page').classList.add('active');
        }

        function handlePlay(isReplay) {
            if (isSightReadingMode) {
                document.getElementById('quiz-status').innerText = isReplay ? "다시 노래해보세요!" : "가사를 보고 노래하세요!";
                document.getElementById('lyric-match').innerText = `가사: ${matchedLyric}`;
                document.getElementById('lyric-match').style.display = 'block';
                sampler.triggerAttackRelease(Tone.Frequency(visualNotes[0].midi, "midi"), 1.0);
            } else {
                const bpmSec = 60 / currentBpm;
                visualNotes.forEach((n, i) => {
                    sampler.triggerAttackRelease(Tone.Frequency(n.midi, "midi"), bpmSec, Tone.now() + i * bpmSec);
                });
                document.getElementById('quiz-status').innerText = "연주 중...";
                setTimeout(() => { document.getElementById('quiz-status').innerText = "방금 들은 음정은?"; }, (bpmSec * 3) * 1000);
            }
            
            document.getElementById('play-btn').disabled = true;
            document.getElementById('replay-btn').disabled = false;
        }

        function showAns() {
            if (!visualNotes.length) return;
            
            // 시창 모드이거나 재생 전이면 전체 소리 재생
            if (isSightReadingMode || document.getElementById('play-btn').disabled === false) {
                const bpmSec = 60 / currentBpm;
                visualNotes.forEach((n, i) => {
                    sampler.triggerAttackRelease(Tone.Frequency(n.midi, "midi"), bpmSec, Tone.now() + i * bpmSec);
                });
            }

            document.getElementById('quiz-status').innerText = "정답 확인";
            document.getElementById('answer-text').innerText = currentAns;
            document.getElementById('answer-text').style.display = 'block';
            document.getElementById('lyric-match').innerText = `가사: ${matchedLyric}`;
            document.getElementById('lyric-match').style.display = 'block';
            
            drawScore();
        }

        function drawScore() {
            const container = document.getElementById('score-container');
            container.innerHTML = ""; container.style.display = "flex";
            const renderer = new Renderer(container, Renderer.Backends.SVG);
            renderer.resize(300, 180);
            const ctx = renderer.getContext();
            const stave = new Stave(10, 60, 260);
            stave.addClef("treble").setContext(ctx).draw();
            const notes = visualNotes.map(n => {
                const sn = new StaveNote({ clef: "treble", keys: [`${n.key}/${n.oct}`], duration: "q" });
                if (n.acc) sn.addModifier(new Accidental(n.acc));
                return sn;
            });
            const voice = new Voice({ num_beats: 3, beat_value: 4 });
            voice.addTickables(notes);
            new Formatter().joinVoices([voice]).format([voice], 200);
            voice.draw(ctx, stave);
        }

        function goBack() {
            document.getElementById('quiz-page').classList.remove('active');
            document.getElementById('main-page').classList.add('active');
        }
    </script>
</body>
</html>
