<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>нҺңлӮҳл®Өм§Ғ мқҙм–ҙн•Ҹ мӢңм°Ҫ/мІӯмқҢ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    <style>
        :root { 
            --penna-pink: #FF9AA2; --penna-yellow: #FFE39F; --penna-green: #B5EAD7; --penna-blue: #C7CEEA;    
            --primary: #2C3E50; --secondary: #34495E; --bg: #F9F9F9; 
        }
        
        body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; touch-action: pan-x pan-y; overflow-x: hidden; }
        
        .app-card { 
            background: white; width: 94%; max-width: 400px; padding: 12px; border-radius: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; height: auto; min-height: 520px;
            display: flex; flex-direction: column; position: relative; box-sizing: border-box;
            border: 5px solid transparent;
            background-image: linear-gradient(#fff, #fff), linear-gradient(to bottom right, var(--penna-pink), var(--penna-yellow), var(--penna-green), var(--penna-blue));
            background-origin: border-box; background-clip: padding-box, border-box;
        }
        
        .app-logo { position: absolute; top: 15px; right: 15px; width: 35px; height: 35px; border-radius: 8px; object-fit: cover; pointer-events: none; z-index: 50; }
        .page { display: none; flex-direction: column; flex-grow: 1; position: relative; z-index: 10; }
        .page.active { display: flex; }
        
        h2 { margin: 15px 0 15px 0; color: var(--primary); font-size: 1.2rem; line-height: 1.2; }
        
        .display-box { background: #F2F4F6; min-height: 90px; border-radius: 18px; display: flex; flex-direction: column; justify-content: center; align-items: center; margin-bottom: 8px; padding: 10px; flex-shrink: 0; margin-top: 5px; position: relative; overflow: visible; }
        
        .ans-header { display: none; width: 100%; justify-content: center; gap: 15px; margin-bottom: 2px; z-index: 30; }
        #answer-text { font-size: 13px; color: var(--primary); font-weight: bold; margin: 0; }
        #lyric-match { font-size: 14px; color: #E74C3C; font-weight: 800; margin: 0; }
        
        #score-container { 
            width: 100%; display: none; justify-content: center; 
            transform: scale(0.85); margin-top: -10px; margin-bottom: -40px; 
            z-index: 20; overflow: visible;
        }
        
        #quiz-status { font-size: 14px; color: #7F8C8D; margin-bottom: 4px; font-weight: 800; }
        #quiz-guide-text { font-size: 13.5px; color: #2C3E50; line-height: 1.6; font-weight: 700; white-space: pre-wrap; background: rgba(255,255,255,0.8); padding: 10px; border-radius: 12px; width: 95%; box-shadow: inset 0 0 5px rgba(0,0,0,0.05); text-align: left; box-sizing: border-box; }
        
        #options-area { display: none; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 12px; position: relative; z-index: 20; }
        .opt-btn, button { cursor: pointer; -webkit-tap-highlight-color: transparent; position: relative; z-index: 30; }
        .opt-btn { background: #fff; border: 1.5px solid #DCDFE6; color: #606266; padding: 12px 2px; font-size: 13.5px; border-radius: 12px; font-weight: 700; }
        .opt-btn.correct { background: #E1F3D8; border-color: #67C23A; color: #67C23A; }
        .opt-btn.wrong { background: #FDE2E2; border-color: #F56C6C; color: #F56C6C; }

        .tempo-container { background: #fff; padding: 6px 10px; border-radius: 12px; margin-bottom: 8px; border: 1px solid #eee; flex-shrink: 0; }
        .tempo-label { font-size: 10px; color: var(--secondary); font-weight: 600; margin-bottom: 2px; display: flex; justify-content: space-between; }
        #tempo-slider { width: 100%; cursor: pointer; accent-color: var(--secondary); margin: 0; }

        .btn-group { display: flex; flex-direction: column; gap: 6px; margin-top: auto; padding-bottom: 4px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 14px; font-size: 13px; font-weight: 600; }
        button:active { transform: scale(0.97); opacity: 0.9; }
        
        .btn-category { background: var(--secondary); color: white; padding: 20px; font-size: 1.1rem; }
        .btn-main { background: var(--primary); color: white; }
        .btn-play { background: #27AE60; color: white; } 
        .btn-replay { background: #95A5A6; color: white; } 
        .btn-next { background: #E67E22; color: white; } 
        .btn-sub { background: white; color: var(--primary); border: 1.5px solid #DCDFE6; }
        .btn-back { background: transparent; color: #95A5A6; font-size: 11px; padding: 4px; }
    </style>
</head>
<body>
    <div class="app-card">
        <img src="logo.jpeg" alt="нҺңлӮҳл®Өм§Ғ лЎңкі " class="app-logo">

        <div id="step1-page" class="page active">
            <h2 style="margin-top:20px;">нҺңлӮҳл®Өм§Ғ мқҙм–ҙн•Ҹ</h2>
            <div class="btn-group" style="margin-top:20px;">
                <button class="btn-category" onclick="selectMajor(2)">2лҸ„ нӣҲл Ё</button>
                <button class="btn-category" onclick="selectMajor(6)" style="background: #2C3E50;">6лҸ„ нӣҲл Ё</button>
            </div>
        </div>

        <div id="step1-5-page" class="page">
            <h2>6лҸ„ м„ёл¶Җ м„ нғқ</h2>
            <div class="btn-group">
                <button class="btn-category" onclick="selectSub6('up')">лӢЁ6лҸ„ мғҒн–ү нӣҲл Ё<br><small>(2~5лҸ„ н•ҳн–ү)</small></button>
                <button class="btn-category" onclick="selectSub6('down')" style="background: #2C3E50;">лӢЁ6лҸ„ н•ҳн–ү нӣҲл Ё<br><small>(2~5лҸ„ мғҒн–ү)</small></button>
                <button class="btn-back" onclick="goStep1()">в¬… мІҳмқҢмңјлЎң</button>
            </div>
        </div>

        <div id="step2-page" class="page">
            <h2 id="step2-title">лӘЁл“ң м„ нғқ</h2>
            <div class="btn-group">
                <button id="mode-ear-btn" class="btn-main" onclick="startQuiz('ear')" disabled>мІӯмқҢ нӣҲл Ё (Ear Training)</button>
                <button id="mode-sight-btn" class="btn-main" onclick="startQuiz('sight')" disabled style="background: #5D6D7E;">мӢңм°Ҫ нӣҲл Ё (Sight Singing)</button>
                <button class="btn-back" id="back-to-prev" onclick="goPrevStep()">в¬… л’ӨлЎң к°Җкё°</button>
            </div>
        </div>

        <div id="quiz-page" class="page">
            <div class="display-box">
                <div id="quiz-status"></div>
                <div class="ans-header" id="ans-header">
                    <p id="answer-text"></p>
                    <p id="lyric-match"></p>
                </div>
                <div id="score-container"></div>
                <div id="quiz-guide-text"></div> 
            </div>
            
            <div id="options-area"></div>
            
            <div class="tempo-container">
                <div class="tempo-label"><span>мҶҚлҸ„</span><span id="tempo-val">BPM 80</span></div>
                <input type="range" id="tempo-slider" min="50" max="180" value="80" oninput="updateTempo(this.value)">
            </div>
            
            <div class="btn-group">
                <div style="display: flex; gap: 6px;">
                    <button id="play-btn" class="btn-play" style="flex: 1;" onclick="handlePlay(false)">мһ¬мғқ</button>
                    <button id="replay-btn" class="btn-replay" style="flex: 1;" onclick="handlePlay(true)" disabled>лӢӨмӢңл“Јкё°</button>
                </div>
                <div style="display: flex; gap: 6px;">
                    <button id="ans-btn" class="btn-sub" style="flex: 1.2;" onclick="showAns()">м •лӢө/м•…ліҙ нҷ•мқё</button>
                    <button id="next-btn" class="btn-next" style="flex: 1;" onclick="nextProblem()">лӢӨмқҢ л¬ём ң</button>
                </div>
                <button class="btn-back" onclick="goStep2()">рҹҸ  лӘЁл“ң м„ нғқмңјлЎң</button>
            </div>
        </div>
    </div>

    <script>
        const { Renderer, Stave, StaveNote, Voice, Formatter, Accidental } = Vex.Flow;
        const sampler = new Tone.Sampler({
            urls: { "A0": "A0.mp3", "C1": "C1.mp3", "D#1": "Ds1.mp3", "F#1": "Fs1.mp3", "A1": "A1.mp3", "C2": "C2.mp3", "D#2": "Ds2.mp3", "F#2": "Fs2.mp3", "A2": "A2.mp3", "C3": "C3.mp3", "D#3": "Ds3.mp3", "F#3": "Fs3.mp3", "A3": "A3.mp3", "C4": "C4.mp3", "D#4": "Ds4.mp3", "F#4": "Fs4.mp3", "A4": "A4.mp3", "C5": "C5.mp3", "D#5": "Ds5.mp3", "F#5": "Fs5.mp3", "A5": "A5.mp3", "C6": "C6.mp3" },
            release: 0.5, baseUrl: "https://tonejs.github.io/audio/salamander/",
            onload: () => { document.querySelectorAll('.btn-main').forEach(b => b.disabled = false); }
        }).toDestination();

        let currentBpm = 80; let visualNotes = []; let historyPool = []; let currentAns = "", matchedLyric = "";
        let isSightReadingMode = false; let currentIntervalMajor = 2; let sub6Direction = 'up'; 

        // [м¶”к°Җ] мӨ‘ліө м¶ңм ң л°©м§Җмҡ© нҒҗ
        let patternQueue = [];

        function updateTempo(val) { currentBpm = val; document.getElementById('tempo-val').innerText = `BPM ${val}`; }

        const baseScales = [{ n: 'c', m: 0 }, { n: 'd', m: 2 }, { n: 'e', m: 4 }, { n: 'f', m: 5 }, { n: 'g', m: 7 }, { n: 'a', m: 9 }, { n: 'b', m: 11 }];
        function getSimplestNoteInfo(midi, preferredBaseIdx) {
            let octave = Math.floor(midi / 12) - 1; let chroma = midi % 12; if (chroma < 0) chroma += 12;
            for (let i = 0; i < baseScales.length; i++) { if (baseScales[i].m === chroma) return { midi, key: baseScales[i].n, acc: "", oct: octave }; }
            const targetNatural = baseScales[preferredBaseIdx].m; let diff = chroma - targetNatural;
            if (diff > 6) diff -= 12; else if (diff < -6) diff += 12;
            for (let i = 0; i < baseScales.length; i++) {
                let nDiff = chroma - baseScales[i].m; if (nDiff > 6) nDiff -= 12; else if (nDiff < -6) nDiff += 12;
                if (Math.abs(nDiff) === 1) return { midi, key: baseScales[i].n, acc: (nDiff === 1 ? "#" : "b"), oct: octave };
            }
            return { midi, key: baseScales[preferredBaseIdx].n, acc: (diff > 0 ? "#" : "b"), oct: octave };
        }

        const pattern2D = [
            { id: 1, lyric: "лҸ„-л””-л Ҳ", ans: "лӢЁ2вҶ‘+лӢЁ2вҶ‘", iv: [1, 1] }, { id: 2, lyric: "лҜё-нҢҢ-мҶ”", ans: "лӢЁ2вҶ‘+мһҘ2вҶ‘", iv: [1, 2] }, { id: 3, lyric: "лқј-мӢң-лҸ„", ans: "мһҘ2вҶ‘+лӢЁ2вҶ‘", iv: [2, 1] }, { id: 4, lyric: "лҸ„-л Ҳ-лҜё", ans: "мһҘ2вҶ‘+мһҘ2вҶ‘", iv: [2, 2] },
            { id: 5, lyric: "лҸ„-мӢң-м„ё", ans: "лӢЁ2вҶ“+лӢЁ2вҶ“", iv: [-1, -1] }, { id: 6, lyric: "мҶ”-нҢҢ-лҜё", ans: "мһҘ2вҶ“+лӢЁ2вҶ“", iv: [-2, -1] }, { id: 7, lyric: "лҸ„-мӢң-лқј", ans: "лӢЁ2вҶ“+мһҘ2вҶ“", iv: [-1, -2] }, { id: 8, lyric: "лҜё-л Ҳ-лҸ„", ans: "мһҘ2вҶ“+мһҘ2вҶ“", iv: [-2, -2] }
        ];

        const patternM6Up = { 1: { id: 1, lyric: "лҜё-лҸ„-мӢң", ans: "лӢЁ6вҶ‘+лӢЁ2вҶ“", iv: [8, -1] }, 2: { id: 2, lyric: "мӢң-мҶ”-нҢҢ", ans: "лӢЁ6вҶ‘+мһҘ2вҶ“", iv: [8, -2] }, 3: { id: 3, lyric: "лҜё-лҸ„-лқј", ans: "лӢЁ6вҶ‘+лӢЁ3вҶ“", iv: [8, -3] }, 4: { id: 4, lyric: "лҜё-лҸ„-мҶ”#", ans: "лӢЁ6вҶ‘+мһҘ3вҶ“", iv: [8, -4] }, 5: { id: 5, lyric: "лҜё-лҸ„-мҶ”", ans: "лӢЁ6вҶ‘+мҷ„4вҶ“", iv: [8, -5] }, 6: { id: 6, lyric: "лқј-нҢҢ-мӢң", ans: "лӢЁ6вҶ‘+мҰқ4/к°җ5вҶ“", iv: [8, -6] }, 7: { id: 7, lyric: "мӢң-мҶ”-лҸ„", ans: "лӢЁ6вҶ‘+мҷ„5вҶ“", iv: [8, -7] } };
        const patternM6Down = { 1: { id: 1, lyric: "мҶ”-мӢң-лҸ„", ans: "лӢЁ6вҶ“+лӢЁ2вҶ‘", iv: [-8, 1] }, 2: { id: 2, lyric: "нҢҢ-лқј-мӢң", ans: "лӢЁ6вҶ“+мһҘ2вҶ‘", iv: [-8, 2] }, 3: { id: 3, lyric: "лҸ„-лҜё-мҶ”", ans: "лӢЁ6вҶ“+лӢЁ3вҶ‘", iv: [-8, 3] }, 4: { id: 4, lyric: "лҸ„-лҜё-мҶ”#", ans: "лӢЁ6вҶ“+мһҘ3вҶ‘", iv: [-8, 4] }, 5: { id: 5, lyric: "лҸ„-лҜё-лқј", ans: "лӢЁ6вҶ“+мҷ„4вҶ‘", iv: [-8, 5] }, 6: { id: 6, lyric: "мҶ”-мӢң-нҢҢ", ans: "лӢЁ6вҶ“+мҰқ4/к°җ5вҶ‘", iv: [-8, 6] }, 7: { id: 7, lyric: "лҸ„-лҜё-мӢң", ans: "лӢЁ6вҶ“+мҷ„5вҶ‘", iv: [-8, 7] } };

        function selectMajor(major) { currentIntervalMajor = major; patternQueue = []; if (major === 6) { document.getElementById('step1-page').classList.remove('active'); document.getElementById('step1-5-page').classList.add('active'); } else { showStep2(); } }
        function selectSub6(dir) { sub6Direction = dir; patternQueue = []; showStep2(); }
        function showStep2() { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById('step2-page').classList.add('active'); }
        function goStep1() { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById('step1-page').classList.add('active'); }
        function goPrevStep() { if (currentIntervalMajor === 6) { document.getElementById('step2-page').classList.remove('active'); document.getElementById('step1-5-page').classList.add('active'); } else { goStep1(); } }
        function goStep2() { document.getElementById('quiz-page').classList.remove('active'); document.getElementById('step2-page').classList.add('active'); }

        function startQuiz(mode) {
            Tone.start(); isSightReadingMode = (mode === 'sight'); updateOptionsArea(); resetUI(); visualNotes = generateProblem();
            document.getElementById('step2-page').classList.remove('active'); document.getElementById('quiz-page').classList.add('active');
            setTimeout(() => { handlePlay(false); }, 300);
        }

        // м…”н”Ң н•ЁмҲҳ (Fisher-Yates)
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function generateProblem() {
            // нҢЁн„ҙ нҒҗк°Җ л№„м—Ҳмқ„ кІҪмҡ° мғҲлЎң мғқм„ұ л°Ҹ м…”н”Ң
            if (patternQueue.length === 0) {
                if (currentIntervalMajor === 2) {
                    patternQueue = shuffle([...pattern2D]);
                } else {
                    const dict = (sub6Direction === 'up') ? patternM6Up : patternM6Down;
                    patternQueue = shuffle(Object.values(dict));
                }
            }

            const p = patternQueue.shift(); // нҒҗм—җм„ң н•ҳлӮҳ кәјлғ„
            const ivs = p.iv;
            
            let n1Midi, n2Midi, n3Midi;
            const minMidi = 55; 
            const maxMidi = isSightReadingMode ? 77 : 84; 

            let isValid = false;
            while (!isValid) {
                n1Midi = minMidi + Math.floor(Math.random() * (maxMidi - minMidi - 8)); 
                const n1Idx = [0, 0, 1, 1, 2, 3, 3, 4, 4, 5, 5, 6][n1Midi % 12];
                n2Midi = n1Midi + ivs[0];
                n3Midi = n2Midi + ivs[1];

                if (n1Midi >= minMidi && n1Midi <= maxMidi &&
                    n2Midi >= minMidi && n2Midi <= maxMidi &&
                    n3Midi >= minMidi && n3Midi <= maxMidi) {
                    isValid = true;
                    matchedLyric = p.lyric;
                    currentAns = p.ans;
                    
                    const n2Idx = (n1Idx + (ivs[0] > 0 ? 5 : -5) + 7) % 7; 
                    const n3Idx = (n2Idx + (ivs[1] > 0 ? 1 : -1) + 7) % 7;
                    return [getSimplestNoteInfo(n1Midi, n1Idx), getSimplestNoteInfo(n2Midi, n2Idx), getSimplestNoteInfo(n3Midi, n3Idx)];
                }
            }
        }

        function updateOptionsArea() {
            const area = document.getElementById('options-area'); const guide = document.getElementById('quiz-guide-text'); area.innerHTML = "";
            if (isSightReadingMode) { area.style.display = 'none'; guide.innerText = ""; return; }
            area.style.display = 'grid';
            if (currentIntervalMajor === 2) {
                guide.innerText = "1. лҸ„л””л Ҳ (лӢЁ2вҶ‘+лӢЁ2вҶ‘)\n2. лҜёнҢҢмҶ” (лӢЁ2вҶ‘+мһҘ2вҶ‘)\n3. лқјмӢңлҸ„ (мһҘ2вҶ‘+лӢЁ2вҶ‘)\n4. лҸ„л ҲлҜё (мһҘ2вҶ‘+мһҘ2вҶ‘)\n\n5. лҸ„мӢңм„ё (лӢЁ2вҶ“+лӢЁ2вҶ“)\n6. мҶ”нҢҢлҜё (мһҘ2вҶ“+лӢЁ2вҶ“)\n7. лҸ„мӢңлқј (лӢЁ2вҶ“+мһҘ2вҶ“)\n8. лҜёл ҲлҸ„ (мһҘ2вҶ“+мһҘ2вҶ“)";
                pattern2D.forEach((p, i) => { const btn = document.createElement('button'); btn.className = "opt-btn"; btn.innerText = `${i+1}.${p.lyric}`; btn.onclick = (e) => { e.preventDefault(); checkChoice(btn, p.lyric); }; area.appendChild(btn); });
            } else if (sub6Direction === 'up') {
                guide.innerText = "1. лҜёлҸ„мӢң (лӢЁ6вҶ‘+лӢЁ2вҶ“)\n2. мӢңмҶ”нҢҢ (лӢЁ6вҶ‘+мһҘ2вҶ“)\n3. лҜёлҸ„лқј (лӢЁ6вҶ‘+лӢЁ3вҶ“)\n4. лҜёлҸ„мҶ”# (лӢЁ6вҶ‘+мһҘ3вҶ“)\n5. лҜёлҸ„мҶ” (лӢЁ6вҶ‘+мҷ„4вҶ“)\n6. лқјнҢҢмӢң (лӢЁ6вҶ‘+мҰқ4/к°җ5вҶ“)\n7. мӢңмҶ”лҸ„ (лӢЁ6вҶ‘+мҷ„5вҶ“)";
                Object.keys(patternM6Up).forEach((key) => { const p = patternM6Up[key]; const btn = document.createElement('button'); btn.className = "opt-btn"; btn.innerText = `${key}.${p.lyric}`; btn.onclick = (e) => { e.preventDefault(); checkChoice(btn, p.lyric); }; area.appendChild(btn); });
            } else {
                guide.innerText = "1. мҶ”мӢңлҸ„ (лӢЁ6вҶ“+лӢЁ2вҶ‘)\n2. нҢҢлқјмӢң (лӢЁ6вҶ“+мһҘ2вҶ‘)\n3. лҸ„лҜёмҶ” (лӢЁ6вҶ“+лӢЁ3вҶ‘)\n4. лҸ„лҜёмҶ”# (лӢЁ6вҶ“+мһҘ3вҶ‘)\n5. лҸ„лҜёлқј (лӢЁ6вҶ“+мҷ„4вҶ‘)\n6. мҶ”мӢңнҢҢ (лӢЁ6вҶ“+мҰқ4/к°җ5вҶ‘)\n7. лҸ„лҜёмӢң (лӢЁ6вҶ“+мҷ„5вҶ‘)";
                Object.keys(patternM6Down).forEach((key) => { const p = patternM6Down[key]; const btn = document.createElement('button'); btn.className = "opt-btn"; btn.innerText = `${key}.${p.lyric}`; btn.onclick = (e) => { e.preventDefault(); checkChoice(btn, p.lyric); }; area.appendChild(btn); });
            }
        }

        function nextProblem() { resetUI(); visualNotes = generateProblem(); setTimeout(() => { handlePlay(false); }, 100); }
        function resetUI() { 
            document.getElementById('ans-header').style.display = 'none';
            document.getElementById('score-container').style.display = 'none'; 
            document.getElementById('quiz-guide-text').style.display = 'block'; 
            document.getElementById('play-btn').disabled = false; document.getElementById('replay-btn').disabled = true; 
            document.querySelectorAll('.opt-btn').forEach(b => { b.classList.remove('correct', 'wrong'); b.disabled = false; }); 
            const status = document.getElementById('quiz-status');
            if (isSightReadingMode) { status.innerText = "мІ« мқҢмқ„ л“Јкі  л…ёлһҳн•ҳм„ёмҡ”!"; } else { status.innerText = ""; }
        }

        function handlePlay(isReplay) {
            const bpmSec = 60 / currentBpm; const now = Tone.now();
            if (isSightReadingMode) { 
                document.getElementById('ans-header').style.display = 'flex';
                document.getElementById('answer-text').style.display = 'none';
                document.getElementById('lyric-match').innerText = `к°ҖмӮ¬ : ${matchedLyric}`; 
                document.getElementById('lyric-match').style.display = 'block'; 
                sampler.triggerAttackRelease(Tone.Frequency(visualNotes[0].midi, "midi"), 1.0); 
            }
            else { visualNotes.forEach((n, i) => { sampler.triggerAttackRelease(Tone.Frequency(n.midi, "midi"), bpmSec, now + i * bpmSec); }); }
            document.getElementById('play-btn').disabled = true; document.getElementById('replay-btn').disabled = false;
        }

        function checkChoice(btn, choice) { if (isSightReadingMode) return; if (choice === matchedLyric) { btn.classList.add('correct'); document.getElementById('quiz-status').innerText = "вӯ• м •лӢө!"; document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true); showAns(); } else { btn.classList.add('wrong'); document.getElementById('quiz-status').innerText = "вқҢ мҳӨлӢө!"; } }

        function showAns() {
            if (!visualNotes.length) return;
            document.getElementById('ans-header').style.display = 'flex';
            document.getElementById('answer-text').innerText = `м •лӢө : ${currentAns}`; 
            document.getElementById('answer-text').style.display = 'block';
            document.getElementById('lyric-match').innerText = `к°ҖмӮ¬ : ${matchedLyric}`; 
            document.getElementById('quiz-guide-text').style.display = 'none'; 
            drawScore();
            const bpmSec = 60 / currentBpm; const now = Tone.now();
            visualNotes.forEach((n, i) => { sampler.triggerAttackRelease(Tone.Frequency(n.midi, "midi"), bpmSec, now + i * bpmSec); });
        }

        function drawScore() {
            const container = document.getElementById('score-container'); container.innerHTML = ""; container.style.display = "flex";
            const renderer = new Renderer(container, Renderer.Backends.SVG); 
            renderer.resize(260, 150);
            const ctx = renderer.getContext(); 
            const stave = new Stave(0, 0, 250); stave.addClef("treble").setContext(ctx).draw();
            const notes = visualNotes.map(n => { 
                const sn = new StaveNote({ clef: "treble", keys: [`${n.key}/${n.oct}`], duration: "q" }); 
                if (n.acc) sn.addModifier(new Accidental(n.acc)); 
                return sn; 
            });
            const voice = new Voice({ num_beats: visualNotes.length, beat_value: 4 }); voice.addTickables(notes);
            new Formatter().joinVoices([voice]).format([voice], 200); voice.draw(ctx, stave);
        }
    </script>
</body>
</html>
