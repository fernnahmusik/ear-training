<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>펜나뮤직 이어핏 시창/청음</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    <style>
        :root { 
            --penna-pink: #FF9AA2;    
            --penna-yellow: #FFE39F;  
            --penna-green: #B5EAD7;   
            --penna-blue: #C7CEEA;    
            --primary: #2C3E50;       
            --secondary: #34495E;
            --bg: #F9F9F9; 
        }
        
        body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; touch-action: manipulation; }
        
        .app-card { 
            background: white; width: 95%; max-width: 420px; padding: 25px 20px; border-radius: 30px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); text-align: center; min-height: 600px; 
            display: flex; flex-direction: column; position: relative; box-sizing: border-box;
            border: 6px solid transparent;
            background-image: linear-gradient(#fff, #fff), 
                              linear-gradient(to bottom right, var(--penna-pink), var(--penna-yellow), var(--penna-green), var(--penna-blue));
            background-origin: border-box;
            background-clip: content-box, border-box;
        }
        
        .app-logo { position: absolute; top: 15px; right: 15px; width: 40px; height: 40px; border-radius: 8px; object-fit: cover; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .page { display: none; flex-direction: column; flex-grow: 1; animation: fadeIn 0.3s ease-out; }
        .page.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h2 { margin-top: 10px; color: var(--primary); margin-bottom: 20px; font-size: 1.4rem; word-break: keep-all; line-height: 1.3; }
        .display-box { background: #F2F4F6; min-height: 180px; border-radius: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; margin-bottom: 15px; padding: 15px; }
        
        #quiz-status { font-size: 14px; color: #7F8C8D; font-weight: 500; margin-bottom: 8px; }
        #quiz-guide-text { font-size: 14px; color: #2C3E50; line-height: 1.5; margin-bottom: 12px; font-weight: 600; white-space: pre-wrap; background: rgba(255,255,255,0.5); padding: 8px; border-radius: 12px; width: 90%; }
        
        #answer-text { font-size: 16px; color: var(--primary); font-weight: bold; margin-bottom: 5px; display: none; }
        #lyric-match { font-size: 18px; color: #E74C3C; font-weight: 800; margin-bottom: 10px; display: none; }
        #score-container { width: 100%; display: none; justify-content: center; }

        #options-area { display: none; grid-template-columns: repeat(2, 1fr); gap: 6px; margin-bottom: 15px; }
        .opt-btn { background: #fff; border: 1.5px solid #DCDFE6; color: #606266; padding: 10px 4px; font-size: 12px; border-radius: 10px; cursor: pointer; -webkit-tap-highlight-color: transparent; font-weight: 600; }
        .opt-btn.correct { background: #E1F3D8; border-color: #67C23A; color: #67C23A; }
        .opt-btn.wrong { background: #FDE2E2; border-color: #F56C6C; color: #F56C6C; }

        .tempo-container { background: #fff; padding: 10px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #eee; }
        .tempo-label { font-size: 11px; color: var(--secondary); font-weight: 600; margin-bottom: 5px; display: flex; justify-content: space-between; }
        #tempo-slider { width: 100%; cursor: pointer; accent-color: var(--secondary); }

        .btn-group { display: flex; flex-direction: column; gap: 8px; margin-top: auto; }
        button { width: 100%; padding: 14px; border: none; border-radius: 15px; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        .btn-main { background: var(--secondary); color: white; }
        .btn-play { background: #27AE60; color: white; } 
        .btn-replay { background: #95A5A6; color: white; } 
        .btn-next { background: #E67E22; color: white; } 
        .btn-sub { background: white; color: var(--primary); border: 2px solid #DCDFE6; }
        .btn-back { background: transparent; color: #95A5A6; font-size: 12px; padding: 5px; margin-top: 5px; border: none; }
        
        button:disabled { background: #BDC3C7; cursor: not-allowed; opacity: 0.6; }
    </style>
</head>
<body>
    <div class="app-card">
        <img src="logo.jpeg" alt="펜나뮤직 로고" class="app-logo">

        <div id="main-page" class="page active">
            <h2>펜나뮤직 이어핏<br><span style="font-size: 1.1rem; color: #7F8C8D;">시창/청음 트레이닝</span></h2>
            <div style="flex-grow: 1; display: flex; flex-direction: column; justify-content: center;">
                <p style="color: #7F8C8D; font-size: 13px; margin-bottom: 20px;">연습 모드를 선택하세요.</p>
                <div class="btn-group">
                    <button id="p1-btn" class="btn-main" onclick="initQuiz(1)" disabled>연습 1: 2도 청음 훈련</button>
                    <button id="p2-btn" class="btn-main" onclick="initQuiz(2)" disabled style="background: #5D6D7E;">연습 2: 2도 시창 훈련</button>
                    <button id="p3-btn" class="btn-main" onclick="initQuiz(3)" disabled style="background: #34495E;">연습 3: 단6도 청음 훈련</button>
                    <button id="p4-btn" class="btn-main" onclick="initQuiz(4)" disabled style="background: #2C3E50;">연습 4: 단6도 시창 훈련</button>
                </div>
            </div>
        </div>

        <div id="quiz-page" class="page">
            <h2 id="quiz-title">훈련 진행 중</h2>
            <div class="display-box">
                <div id="quiz-status">문제가 준비되었습니다.</div>
                <div id="quiz-guide-text"></div> 
                <div id="answer-text">정답 표시</div>
                <div id="lyric-match">가사 매칭</div>
                <div id="score-container"></div>
            </div>

            <div id="options-area"></div>

            <div class="tempo-container">
                <div class="tempo-label"><span>재생 속도 (Tempo)</span><span id="tempo-val">BPM 80</span></div>
                <input type="range" id="tempo-slider" min="50" max="180" value="80" oninput="updateTempo(this.value)">
            </div>
            <div class="btn-group">
                <div style="display: flex; gap: 8px;">
                    <button id="play-btn" class="btn-play" style="flex: 1;" onclick="handlePlay(false)">문제 재생</button>
                    <button id="replay-btn" class="btn-replay" style="flex: 1;" onclick="handlePlay(true)" disabled>다시 듣기</button>
                </div>
                <button id="ans-btn" class="btn-sub" onclick="showAns()">정답 및 악보 확인</button>
                <button id="next-btn" class="btn-next" onclick="nextProblem()">다음 문제 도전</button>
                <button class="btn-back" onclick="goBack()">🏠 처음으로 돌아가기</button>
            </div>
        </div>
    </div>

    <script>
        const { Renderer, Stave, StaveNote, Voice, Formatter, Accidental } = Vex.Flow;
        const sampler = new Tone.Sampler({
            urls: {
                "A0": "A0.mp3", "C1": "C1.mp3", "D#1": "Ds1.mp3", "F#1": "Fs1.mp3",
                "A1": "A1.mp3", "C2": "C2.mp3", "D#2": "Ds2.mp3", "F#2": "Fs2.mp3",
                "A2": "A2.mp3", "C3": "C3.mp3", "D#3": "Ds3.mp3", "F#3": "Fs3.mp3",
                "A3": "A3.mp3", "C4": "C4.mp3", "D#4": "Ds4.mp3", "F#4": "Fs4.mp3",
                "A4": "A4.mp3", "C5": "C5.mp3", "D#5": "Ds5.mp3", "F#5": "Fs5.mp3",
                "A5": "A5.mp3", "C6": "C6.mp3"
            },
            release: 0.5,
            baseUrl: "https://tonejs.github.io/audio/salamander/",
            onload: () => {
                document.querySelectorAll('.btn-main').forEach(b => b.disabled = false);
            }
        }).toDestination();

        let currentBpm = 80;
        let visualNotes = [];
        let historyPool = [];
        let currentAns = "", matchedLyric = "";
        let isSightReadingMode = false;
        let currentType = 1;

        function updateTempo(val) {
            currentBpm = val;
            document.getElementById('tempo-val').innerText = `BPM ${val}`;
        }

        const baseScales = [{ n: 'c', m: 0 }, { n: 'd', m: 2 }, { n: 'e', m: 4 }, { n: 'f', m: 5 }, { n: 'g', m: 7 }, { n: 'a', m: 9 }, { n: 'b', m: 11 }];

        function getSimplestNoteInfo(midi, preferredBaseIdx) {
            let octave = Math.floor(midi / 12) - 1;
            let chroma = midi % 12;
            if (chroma < 0) chroma += 12;
            for (let i = 0; i < baseScales.length; i++) {
                if (baseScales[i].m === chroma) return { midi, key: baseScales[i].n, acc: "", oct: octave };
            }
            const targetNatural = baseScales[preferredBaseIdx].m;
            let diff = chroma - targetNatural;
            if (diff > 6) diff -= 12; else if (diff < -6) diff += 12;
            for (let i = 0; i < baseScales.length; i++) {
                let nDiff = chroma - baseScales[i].m;
                if (nDiff > 6) nDiff -= 12; else if (nDiff < -6) nDiff += 12;
                if (Math.abs(nDiff) === 1) return { midi, key: baseScales[i].n, acc: (nDiff === 1 ? "#" : "b"), oct: octave };
            }
            return { midi, key: baseScales[preferredBaseIdx].n, acc: (diff > 0 ? "#" : "b"), oct: octave };
        }

        const pattern2D = [
            { lyric: "도-디-레", intervals: [1, 1], ans: "단2↑ + 단2↑" },
            { lyric: "미-파-솔", intervals: [1, 2], ans: "단2↑ + 장2↑" },
            { lyric: "라-시-도", intervals: [2, 1], ans: "장2↑ + 단2↑" },
            { lyric: "도-레-미", intervals: [2, 2], ans: "장2↑ + 장2↑" },
            { lyric: "도-시-세", intervals: [-1, -1], ans: "단2↓ + 단2↓" },
            { lyric: "솔-파-미", intervals: [-2, -1], ans: "장2↓ + 단2↓" },
            { lyric: "도-시-라", intervals: [-1, -2], ans: "단2↓ + 장2↓" },
            { lyric: "미-레-도", intervals: [-2, -2], ans: "장2↓ + 장2↓" }
        ];

        function generateProblem(type) {
            let n1Midi, n2Midi, n3Midi;
            const minMidi = 55;
            const maxMidi = 72;
            
            do { n1Midi = minMidi + Math.floor(Math.random() * (maxMidi - minMidi + 1)); } while (historyPool.includes(n1Midi));
            historyPool.push(n1Midi); if (historyPool.length > 5) historyPool.shift();

            const n1Idx = [0, 0, 1, 1, 2, 3, 3, 4, 4, 5, 5, 6][n1Midi % 12];

            if (type === 1 || type === 2) { 
                const p = pattern2D[Math.floor(Math.random() * pattern2D.length)];
                n2Midi = n1Midi + p.intervals[0];
                n3Midi = n2Midi + p.intervals[1];
                const n2Idx = (n1Idx + (p.intervals[0] > 0 ? 1 : -1) + 7) % 7;
                const n3Idx = (n2Idx + (p.intervals[1] > 0 ? 1 : -1) + 7) % 7;
                matchedLyric = p.lyric;
                currentAns = p.ans;
                return [getSimplestNoteInfo(n1Midi, n1Idx), getSimplestNoteInfo(n2Midi, n2Idx), getSimplestNoteInfo(n3Midi, n3Idx)];
            } else {
                const upMidi = n1Midi + 8;
                const upIdx = (n1Idx + 5) % 7;
                const downInt = 1 + Math.floor(Math.random() * 7);
                const downMidi = upMidi - downInt;
                const downDeg = (downInt === 6) ? 3 : ({ 1:1, 2:1, 3:2, 4:2, 5:3, 7:4, 8:5, 9:5 }[downInt] || 1);
                const downIdx = (upIdx - downDeg + 7) % 7;
                const lyrics = { 1: "미-도-시", 2: "시-솔-파", 3: "미-도-라", 4: "미-도-솔#", 5: "미-도-솔", 6: "라-파-시", 7: "시-솔-도" };
                matchedLyric = lyrics[downInt] || "";
                currentAns = `단6도 상행 → ${ {1:"단2도", 2:"장2도", 3:"단3도", 4:"장2도", 5:"완4도", 6:"증4/감5도", 7:"완5도"}[downInt] } 하행`;
                return [getSimplestNoteInfo(n1Midi, n1Idx), getSimplestNoteInfo(upMidi, upIdx), getSimplestNoteInfo(downMidi, downIdx)];
            }
        }

        function updateOptionsArea(type) {
            const area = document.getElementById('options-area');
            const guide = document.getElementById('quiz-guide-text');
            area.innerHTML = "";
            if (type === 1) {
                area.style.display = 'grid';
                guide.innerText = "1.도디레 2.미파솔 3.라시도 4.도레미\n5.도시세 6.솔파미 7.도시라 8.미레도";
                pattern2D.forEach((p, i) => {
                    const btn = document.createElement('button');
                    btn.className = "opt-btn";
                    btn.innerText = `${i+1}.${p.lyric}`;
                    btn.onclick = () => checkChoice(btn, p.lyric);
                    area.appendChild(btn);
                });
            } else if (type === 3) {
                area.style.display = 'grid';
                guide.innerText = "미-도-시 / 시-솔-파 / 미-도-라 / 미-도-솔#\n미-도-솔 / 라-파-시 / 시-솔-도";
                ["미-도-시", "시-솔-파", "미-도-라", "미-도-솔#", "미-도-솔", "라-파-시", "시-솔-도"].forEach((text, i) => {
                    const btn = document.createElement('button');
                    btn.className = "opt-btn";
                    btn.innerText = `${i+1}.${text}`;
                    btn.onclick = () => checkChoice(btn, text);
                    area.appendChild(btn);
                });
            } else {
                area.style.display = 'none';
                guide.innerText = "";
            }
        }

        function initQuiz(type) {
            Tone.start();
            currentType = type;
            isSightReadingMode = (type === 2 || type === 4);
            updateOptionsArea(type);
            resetUI();
            visualNotes = generateProblem(type);
            const titles = ["연습 1: 2도 청음 훈련", "연습 2: 2도 시창 훈련", "연습 3: 단6도 청음 훈련", "연습 4: 단6도 시창 훈련"];
            document.getElementById('quiz-title').innerText = titles[type-1];
            document.getElementById('main-page').classList.remove('active');
            document.getElementById('quiz-page').classList.add('active');
            setTimeout(() => { handlePlay(false); }, 300); 
        }

        function nextProblem() {
            resetUI();
            visualNotes = generateProblem(currentType);
            document.getElementById('quiz-status').innerText = "새 문제가 준비되었습니다!";
            setTimeout(() => { handlePlay(false); }, 100);
        }

        function resetUI() {
            document.getElementById('quiz-status').innerText = isSightReadingMode ? "준비되었습니다. 첫 음을 들으세요." : "방금 들은 가사는 무엇일까요?";
            document.getElementById('answer-text').style.display = 'none';
            document.getElementById('lyric-match').style.display = 'none';
            document.getElementById('score-container').style.display = 'none';
            document.getElementById('play-btn').disabled = false;
            document.getElementById('replay-btn').disabled = true;
            document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('correct', 'wrong'));
        }

        function handlePlay(isReplay) {
            const bpmSec = 60 / currentBpm;
            const now = Tone.now();
            if (isSightReadingMode) {
                document.getElementById('quiz-status').innerText = isReplay ? "다시 노래해보세요!" : "가사를 보고 노래하세요!";
                document.getElementById('lyric-match').innerText = `가사: ${matchedLyric}`;
                document.getElementById('lyric-match').style.display = 'block';
                sampler.triggerAttackRelease(Tone.Frequency(visualNotes[0].midi, "midi"), 1.0);
            } else {
                visualNotes.forEach((n, i) => {
                    sampler.triggerAttackRelease(Tone.Frequency(n.midi, "midi"), bpmSec, now + i * bpmSec);
                });
                document.getElementById('quiz-status').innerText = "연주 중...";
                setTimeout(() => { document.getElementById('quiz-status').innerText = "방금 들은 가사는?"; }, (bpmSec * visualNotes.length) * 1000);
            }
            document.getElementById('play-btn').disabled = true;
            document.getElementById('replay-btn').disabled = false;
        }

        function checkChoice(btn, choice) {
            if (choice === matchedLyric) {
                btn.classList.add('correct');
                document.getElementById('quiz-status').innerText = "⭕ 정답입니다!";
                showAns();
            } else {
                btn.classList.add('wrong');
                document.getElementById('quiz-status').innerText = "❌ 다시 들어보세요!";
            }
        }

        function showAns() {
            if (!visualNotes.length) return;
            if (isSightReadingMode || document.getElementById('play-btn').disabled === false) {
                const bpmSec = 60 / currentBpm;
                const now = Tone.now();
                visualNotes.forEach((n, i) => {
                    sampler.triggerAttackRelease(Tone.Frequency(n.midi, "midi"), bpmSec, now + i * bpmSec);
                });
            }
            document.getElementById('answer-text').innerText = `정답: ${currentAns}`;
            document.getElementById('answer-text').style.display = 'block';
            document.getElementById('lyric-match').innerText = `가사: ${matchedLyric}`;
            document.getElementById('lyric-match').style.display = 'block';
            drawScore();
        }

        function drawScore() {
            const container = document.getElementById('score-container');
            container.innerHTML = ""; container.style.display = "flex";
            const renderer = new Renderer(container, Renderer.Backends.SVG);
            renderer.resize(300, 180);
            const ctx = renderer.getContext();
            const stave = new Stave(10, 60, 260);
            stave.addClef("treble").setContext(ctx).draw();
            const notes = visualNotes.map(n => {
                const sn = new StaveNote({ clef: "treble", keys: [`${n.key}/${n.oct}`], duration: "q" });
                if (n.acc) sn.addModifier(new Accidental(n.acc));
                return sn;
            });
            const voice = new Voice({ num_beats: visualNotes.length, beat_value: 4 });
            voice.addTickables(notes);
            new Formatter().joinVoices([voice]).format([voice], 200);
            voice.draw(ctx, stave);
        }

        function goBack() {
            document.getElementById('quiz-page').classList.remove('active');
            document.getElementById('main-page').classList.add('active');
        }
    </script>
</body>
</html>
