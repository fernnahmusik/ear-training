<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>нҺңлӮҳл®Өм§Ғ мқҙм–ҙн•Ҹ мӢңм°Ҫ/мІӯмқҢ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    <style>
        :root { 
            --penna-pink: #FF9AA2; --penna-yellow: #FFE39F; --penna-green: #B5EAD7; --penna-blue: #C7CEEA;    
            --primary: #2C3E50; --secondary: #34495E; --bg: #F9F9F9; 
        }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; touch-action: manipulation; overflow-x: hidden; }
        .app-card { background: white; width: 94%; max-width: 400px; padding: 12px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; height: auto; min-height: 520px; display: flex; flex-direction: column; position: relative; z-index: 1; box-sizing: border-box; border: 5px solid transparent; background-image: linear-gradient(#fff, #fff), linear-gradient(to bottom right, var(--penna-pink), var(--penna-yellow), var(--penna-green), var(--penna-blue)); background-origin: border-box; background-clip: padding-box, border-box; }
        .app-logo { position: absolute; top: 15px; right: 15px; width: 35px; height: 35px; border-radius: 8px; object-fit: cover; pointer-events: none; z-index: 100; }
        .page { display: none; flex-direction: column; flex-grow: 1; position: relative; z-index: 10; }
        .page.active { display: flex; }
        h2 { margin: 15px 0 5px 0; color: var(--primary); font-size: 1.2rem; line-height: 1.2; }
        .sub-title { font-size: 0.9rem; color: #7F8C8D; margin-bottom: 20px; font-weight: 500; }
        .display-box { background: #ffffff; border: none; min-height: 90px; border-radius: 18px; display: flex; flex-direction: column; justify-content: center; align-items: center; margin-bottom: 8px; padding: 10px; flex-shrink: 0; margin-top: 5px; position: relative; overflow: visible; z-index: 5; }
        .ans-header { display: none; width: 100%; justify-content: center; gap: 15px; margin-bottom: 2px; }
        #answer-text { font-size: 13px; color: var(--primary); font-weight: bold; margin: 0; }
        #lyric-match { font-size: 14px; color: #E74C3C; font-weight: 800; margin: 0; }
        #score-container { width: 100%; display: none; justify-content: center; transform: scale(0.85); margin-top: -10px; margin-bottom: -40px; overflow: visible; }
        #quiz-guide-text { font-size: 13px; color: #2C3E50; line-height: 1.5; font-weight: 700; white-space: pre-wrap; background: rgba(242, 244, 246, 0.6); padding: 12px; border-radius: 12px; width: 95%; box-shadow: inset 0 0 5px rgba(0,0,0,0.05); text-align: left; box-sizing: border-box; height: auto; max-height: 250px; overflow-y: auto; }
        #options-area { display: none; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 12px; position: relative; z-index: 20; }
        .btn-group { display: flex; flex-direction: column; gap: 6px; margin-top: auto; padding-bottom: 4px; position: relative; z-index: 50; }
        button, .opt-btn { width: 100%; padding: 12px; border: none; border-radius: 14px; font-size: 13px; font-weight: 600; cursor: pointer; position: relative; z-index: 60; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        button:active { transform: scale(0.97); opacity: 0.9; }
        .btn-category { background: var(--secondary); color: white; padding: 14px; font-size: 0.95rem; }
        .btn-main { background: var(--primary); color: white; }
        .btn-play { background: #27AE60; color: white; } 
        .btn-replay { background: #95A5A6; color: white; } 
        .btn-next { background: #E67E22; color: white; } 
        .btn-sub { background: white; color: var(--primary); border: 1.5px solid #DCDFE6; }
        .btn-back { background: transparent; color: #95A5A6; font-size: 11px; padding: 4px; z-index: 70; }
        .opt-btn { background: #fff; border: 1.5px solid #DCDFE6; color: #606266; }
        .opt-btn.correct { background: var(--penna-green); color: white; border-color: #27AE60; }
        .opt-btn.wrong { background: #FFD1D1; color: #E74C3C; border-color: #E74C3C; }
        .tempo-container { background: #fff; padding: 6px 10px; border-radius: 12px; margin-bottom: 8px; border: 1px solid #eee; flex-shrink: 0; position: relative; z-index: 40; }
        .tempo-label { font-size: 10px; color: var(--secondary); font-weight: 600; margin-bottom: 2px; display: flex; justify-content: space-between; }
        #tempo-slider { width: 100%; cursor: pointer; accent-color: var(--secondary); margin: 0; }
    </style>
</head>
<body>
    <div class="app-card">
        <img src="logo.jpeg" alt="нҺңлӮҳл®Өм§Ғ мқҙм–ҙн•Ҹ лЎңкі " class="app-logo">

        <div id="step1-page" class="page active">
            <h2 style="margin-top:20px;">нҺңлӮҳл®Өм§Ғ мқҙм–ҙн•Ҹ</h2>
            <div class="sub-title">мӢңм°Ҫ/мІӯмқҢ нҠёл ҲмқҙлӢқ</div>
            <div class="btn-group">
                <button class="btn-category" onclick="selectMajor(2)">2лҸ„ нӣҲл Ё</button>
                <button class="btn-category" onclick="goToStep1_3()" style="background: #455A64;">3лҸ„ нӣҲл Ё</button>
                <button class="btn-category" onclick="selectMajor(6)" style="background: #2C3E50;">6лҸ„ нӣҲл Ё</button>
            </div>
        </div>

        <div id="step1-3-main-page" class="page">
            <h2>3лҸ„ нӣҲл Ё м„ёл¶Җ м„ нғқ</h2>
            <div class="btn-group">
                <button class="btn-category" onclick="selectSub3('2up')">3лҸ„ 2лҸ„ мғҒн–үнӣҲл Ё</button>
                <button class="btn-category" onclick="selectSub3('2down')" style="background: #455A64;">3лҸ„ 2лҸ„ н•ҳн–үнӣҲл Ё</button>
                <button class="btn-category" onclick="selectSub3('3up')" style="background: #5D6D7E;">3лҸ„ 3лҸ„ мғҒн–үнӣҲл Ё</button>
                <button class="btn-category" onclick="selectSub3('3down')" style="background: #5D6D7E;">3лҸ„ 3лҸ„ н•ҳн–үнӣҲл Ё</button>
                <button class="btn-back" onclick="goStep1()">в¬… мІҳмқҢмңјлЎң</button>
            </div>
        </div>

        <div id="step1-5-page" class="page">
            <h2>6лҸ„ м„ёл¶Җ м„ нғқ</h2>
            <div class="btn-group">
                <button class="btn-category" onclick="selectSub6('up')">лӢЁ6лҸ„ мғҒн–ү нӣҲл Ё</button>
                <button class="btn-category" onclick="selectSub6('down')" style="background: #2C3E50;">лӢЁ6лҸ„ н•ҳн–ү нӣҲл Ё</button>
                <button class="btn-back" onclick="goStep1()">в¬… мІҳмқҢмңјлЎң</button>
            </div>
        </div>

        <div id="step2-page" class="page">
            <h2 id="step2-title">лӘЁл“ң м„ нғқ</h2>
            <div class="btn-group">
                <button id="mode-ear-btn" class="btn-main" onclick="startQuiz('ear')" disabled>мІӯмқҢ нӣҲл Ё (Ear Training)</button>
                <button id="mode-sight-btn" class="btn-main" onclick="startQuiz('sight')" disabled style="background: #5D6D7E;">мӢңм°Ҫ нӣҲл Ё (Sight Singing)</button>
                <button class="btn-back" onclick="goPrevStep()">в¬… л’ӨлЎң к°Җкё°</button>
            </div>
        </div>

        <div id="quiz-page" class="page">
            <div class="display-box">
                <div id="quiz-status"></div>
                <div class="ans-header" id="ans-header">
                    <p id="answer-text"></p>
                    <p id="lyric-match"></p>
                </div>
                <div id="score-container"></div>
                <div id="quiz-guide-text"></div> 
            </div>
            <div id="options-area"></div>
            <div class="tempo-container">
                <div class="tempo-label"><span>мҶҚлҸ„</span><span id="tempo-val">BPM 80</span></div>
                <input type="range" id="tempo-slider" min="50" max="180" value="80" oninput="updateTempo(this.value)">
            </div>
            <div class="btn-group">
                <div style="display: flex; gap: 6px;">
                    <button id="play-btn" class="btn-play" style="flex: 1;" onclick="handlePlay(false)">мһ¬мғқ</button>
                    <button id="replay-btn" class="btn-replay" style="flex: 1;" onclick="handlePlay(true)" disabled>лӢӨмӢңл“Јкё°</button>
                </div>
                <div style="display: flex; gap: 6px;">
                    <button id="ans-btn" class="btn-sub" style="flex: 1.2;" onclick="showAns()">м •лӢө/м•…ліҙ нҷ•мқё</button>
                    <button id="next-btn" class="btn-next" style="flex: 1;" onclick="nextProblem()">лӢӨмқҢ л¬ём ң</button>
                </div>
                <button class="btn-back" onclick="resetStats(); showStep2();">рҹҸ  лӘЁл“ң м„ нғқмңјлЎң</button>
            </div>
        </div>

        <div id="result-page" class="page">
            <h2 style="margin-top:20px;">рҹҺҜ мӨ‘к°„ м җкІҖ</h2>
            <div class="display-box" style="min-height: 150px; padding: 15px;">
                <div id="res-rate" style="font-size: 1.4rem; color: #27AE60; font-weight: 700;">м •лӢөлҘ : 0%</div>
                <div id="res-counts" style="font-size: 0.9rem; font-weight: 700;">(м •лӢө: 0 / мҳӨлӢө: 0)</div>
                <div class="worst-pattern-box" style="background: #FFF0F0; border: 1px dashed #FF9AA2; padding: 12px; border-radius: 15px; margin-top: 10px; text-align: left;">
                    <div style="font-size: 11px; color: #E74C3C; font-weight: 800; margin-bottom: 5px;">вҡ пёҸ м·Ём•Ҫ нҢЁн„ҙ л¶„м„қ</div>
                    <div id="worst-pattern-text" style="font-size: 13px; font-weight: 700;">л¶„м„қ мӨ‘...</div>
                </div>
            </div>
            <div class="btn-group" style="margin-top: 20px;">
                <button class="btn-next" onclick="continueQuiz()">лӢӨмқҢ 10л¬ём ң кі„мҶҚн•ҳкё°</button>
                <button class="btn-sub" onclick="resetStats(); goStep1();">нӣҲл Ё мў…лЈҢ (мІҳмқҢмңјлЎң)</button>
            </div>
        </div>
    </div>

    <script>
        const { Renderer, Stave, StaveNote, Voice, Formatter, Accidental } = Vex.Flow;
        const sampler = new Tone.Sampler({
            urls: { "A0": "A0.mp3", "C1": "C1.mp3", "D#1": "Ds1.mp3", "F#1": "Fs1.mp3", "A1": "A1.mp3", "C2": "C2.mp3", "D#2": "Ds2.mp3", "F#2": "Fs2.mp3", "A2": "A2.mp3", "C3": "C3.mp3", "D#3": "Ds3.mp3", "F#3": "Fs3.mp3", "A3": "A3.mp3", "C4": "C4.mp3", "D#4": "Ds4.mp3", "F#4": "Fs4.mp3", "A4": "A4.mp3", "C5": "C5.mp3", "D#5": "Ds5.mp3", "F#5": "Fs5.mp3", "A5": "A5.mp3", "C6": "C6.mp3" },
            release: 0.5, baseUrl: "https://tonejs.github.io/audio/salamander/",
            onload: () => { document.querySelectorAll('.btn-main').forEach(b => b.disabled = false); }
        }).toDestination();

        let currentBpm = 80; let visualNotes = []; let currentAns = "", matchedLyric = "";
        let isSightReadingMode = false; let currentIntervalMajor = 2; 
        let sub6Direction = 'up'; let sub3Type = '2up';
        let patternQueue = [];
        let stats = { correct: 0, wrong: 0, sessionCount: 0 };
        let errorTracker = {};

        const RANGE_MIN = 55; const SIGHT_MAX = 77; const EAR_MAX = 84;
        const baseScales = [{ n: 'c', m: 0 }, { n: 'd', m: 2 }, { n: 'e', m: 4 }, { n: 'f', m: 5 }, { n: 'g', m: 7 }, { n: 'a', m: 9 }, { n: 'b', m: 11 }];

        // [мҲҳм •] нҺҳмқҙм§Җ м „нҷҳ мӢң л¬ҙмЎ°кұҙ лӘЁл“  нҺҳмқҙм§Җ мҲЁк№Җ мІҳлҰ¬ лЎңм§Ғ к°•нҷ”
        function hideAllPages() { 
            const pages = document.querySelectorAll('.page');
            pages.forEach(p => p.classList.remove('active')); 
        }

        function goStep1() { 
            hideAllPages(); 
            document.getElementById('step1-page').classList.add('active'); 
        }

        function goToStep1_3() { 
            hideAllPages(); 
            document.getElementById('step1-3-main-page').classList.add('active'); 
        }

        function selectMajor(major) { 
            hideAllPages();
            currentIntervalMajor = major; 
            patternQueue = []; 
            if (major === 6) {
                document.getElementById('step1-5-page').classList.add('active');
            } else {
                showStep2();
            }
        }

        function selectSub6(dir) { 
            sub6Direction = dir; 
            patternQueue = []; 
            showStep2(); 
        }

        function selectSub3(type) { 
            currentIntervalMajor = 3; 
            sub3Type = type; 
            patternQueue = []; 
            showStep2(); 
        }

        function showStep2() { 
            hideAllPages(); 
            document.getElementById('step2-page').classList.add('active'); 
        }

        function goPrevStep() { 
            hideAllPages();
            if (currentIntervalMajor === 6) {
                document.getElementById('step1-5-page').classList.add('active');
            } else if (currentIntervalMajor === 3) {
                document.getElementById('step1-3-main-page').classList.add('active');
            } else {
                goStep1();
            }
        }

        // [кё°мЎҙ нҖҙмҰҲ лЎңм§Ғ мң м§Җ]
        function getNoteByDegree(midi, baseNote, degreeDiff) {
            const chroma = (midi % 12 + 12) % 12;
            const baseIdx = baseScales.findIndex(s => s.n === baseNote.key);
            let targetIdx = (baseIdx + degreeDiff) % 7;
            if (targetIdx < 0) targetIdx += 7;
            const targetScale = baseScales[targetIdx];
            let octave = baseNote.oct + Math.floor((baseIdx + degreeDiff) / 7);
            let diff = chroma - targetScale.m;
            if (diff > 6) diff -= 12; else if (diff < -6) diff += 12;
            let acc = diff === 1 ? "#" : (diff === 2 ? "##" : (diff === -1 ? "b" : (diff === -2 ? "bb" : "")));
            return { midi, key: targetScale.n, acc, oct: octave };
        }

        function getAllNotationOptions(midi) {
            const chroma = (midi % 12 + 12) % 12; const options = [];
            baseScales.forEach((s) => {
                let diff = chroma - s.m; if (diff > 6) diff -= 12; else if (diff < -6) diff += 12;
                if (Math.abs(diff) <= 1) options.push({ midi, key: s.n, acc: diff === 1 ? "#" : (diff === -1 ? "b" : ""), oct: Math.floor(midi / 12) - 1 });
            });
            return options;
        }

        const pattern2D = [{ lyric: "лҸ„-л””-л Ҳ", ans: "лӢЁ2вҶ‘+лӢЁ2вҶ‘", iv: [1, 1], deg: [1, 1] }, { lyric: "лҜё-нҢҢ-мҶ”", ans: "лӢЁ2вҶ‘+мһҘ2вҶ‘", iv: [1, 2], deg: [1, 1] }, { lyric: "лқј-мӢң-лҸ„", ans: "мһҘ2вҶ‘+лӢЁ2вҶ‘", iv: [2, 1], deg: [1, 1] }, { lyric: "лҸ„-л Ҳ-лҜё", ans: "мһҘ2вҶ‘+мһҘ2вҶ‘", iv: [2, 2], deg: [1, 1] }, { lyric: "лҸ„-мӢң-м„ё", ans: "лӢЁ2вҶ“+лӢЁ2вҶ“", iv: [-1, -1], deg: [-1, -1] }, { lyric: "мҶ”-нҢҢ-лҜё", ans: "мһҘ2вҶ“+лӢЁ2вҶ“", iv: [-2, -1], deg: [-1, -1] }, { lyric: "лҸ„-мӢң-лқј", ans: "лӢЁ2вҶ“+мһҘ2вҶ“", iv: [-1, -2], deg: [-1, -1] }, { lyric: "лҜё-л Ҳ-лҸ„", ans: "мһҘ2вҶ“+мһҘ2вҶ“", iv: [-2, -2], deg: [-1, -1] }];
        const pattern3D2Up = [{ lyric: "лҸ„лҜёл Ҳ", ans: "мһҘ3вҶ‘+мһҘ2вҶ“", iv: [4, -2], deg: [2, -1] }, { lyric: "лҸ„лҜёл©”", ans: "мһҘ3вҶ‘+лӢЁ2вҶ“", iv: [4, -1], deg: [2, -1] }, { lyric: "мӢңл ҲлҸ„", ans: "лӢЁ3вҶ‘+мһҘ2вҶ“", iv: [3, -2], deg: [2, -1] }, { lyric: "лқјлҸ„мӢң", ans: "лӢЁ3вҶ‘+лӢЁ2вҶ“", iv: [3, -1], deg: [2, -1] }, { lyric: "мӢңл ҲbлҸ„", ans: "к°җ3вҶ‘+лӢЁ2вҶ“", iv: [2, -1], deg: [2, -1] }];
        const pattern3D2Down = [{ lyric: "лҜёлҸ„л Ҳ", ans: "мһҘ3вҶ“+мһҘ2вҶ‘", iv: [-4, 2], deg: [-2, 1] }, { lyric: "лҜёлҸ„л””", ans: "мһҘ3вҶ“+лӢЁ2вҶ‘", iv: [-4, 1], deg: [-2, 1] }, { lyric: "л ҲмӢңлҸ„", ans: "лӢЁ3вҶ“+лӢЁ2вҶ‘", iv: [-3, 1], deg: [-2, 1] }, { lyric: "лҸ„лқјмӢң", ans: "лӢЁ3вҶ“+мһҘ2вҶ‘", iv: [-3, 2], deg: [-2, 1] }, { lyric: "л ҲbмӢңлҸ„", ans: "к°җ3вҶ“+лӢЁ2вҶ‘", iv: [-2, 1], deg: [-2, 1] }];
        const pattern3D3Up = [{ lyric: "лҸ„лҜёмҶ”", ans: "мһҘ3вҶ‘+лӢЁ3вҶ‘ (мһҘ3нҷ”мқҢ)", iv: [4, 3], deg: [2, 2] }, { lyric: "лҸ„лҜёмҶ”#", ans: "мһҘ3вҶ‘+мһҘ3вҶ‘ (мҰқ3нҷ”мқҢ)", iv: [4, 4], deg: [2, 2] }, { lyric: "лқјлҸ„лҜё", ans: "лӢЁ3вҶ‘+мһҘ3вҶ‘ (лӢЁ3нҷ”мқҢ)", iv: [3, 4], deg: [2, 2] }, { lyric: "мӢңл ҲнҢҢ", ans: "лӢЁ3вҶ‘+лӢЁ3вҶ‘ (к°җ3нҷ”мқҢ)", iv: [3, 3], deg: [2, 2] }];
        const pattern3D3Down = [{ lyric: "мҶ”лҜёлҸ„", ans: "лӢЁ3вҶ“+мһҘ3вҶ“ (мһҘ3нҷ”мқҢ)", iv: [-3, -4], deg: [-2, -2] }, { lyric: "лҸ„мҶ”#лҜё", ans: "мһҘ3вҶ“+мһҘ3вҶ“ (мҰқ3нҷ”мқҢ)", iv: [-4, -4], deg: [-2, -2] }, { lyric: "лҜёлҸ„лқј", ans: "мһҘ3вҶ“+лӢЁ3вҶ“ (лӢЁ3нҷ”мқҢ)", iv: [-4, -3], deg: [-2, -2] }, { lyric: "нҢҢл ҲмӢң", ans: "лӢЁ3вҶ“+лӢЁ3вҶ“ (к°җ3нҷ”мқҢ)", iv: [-3, -3], deg: [-2, -2] }];
        const patternM6Up = { 1: { lyric: "лҜё-лҸ„-мӢң", ans: "лӢЁ6вҶ‘+лӢЁ2вҶ“", iv: [8, -1], deg: [5, -1] }, 2: { lyric: "мӢң-мҶ”-нҢҢ", ans: "лӢЁ6вҶ‘+мһҘ2вҶ“", iv: [8, -2], deg: [5, -1] }, 3: { lyric: "лҜё-лҸ„-лқј", ans: "лӢЁ6вҶ‘+лӢЁ3вҶ“", iv: [8, -3], deg: [5, -2] }, 4: { lyric: "лҜё-лҸ„-мҶ”#", ans: "лӢЁ6вҶ‘+мһҘ3вҶ“", iv: [8, -4], deg: [5, -2] }, 5: { lyric: "лҜё-лҸ„-мҶ”", ans: "лӢЁ6вҶ‘+мҷ„4вҶ“", iv: [8, -5], deg: [5, -3] }, 6: { lyric: "лқј-нҢҢ-мӢң", ans: "лӢЁ6вҶ‘+мҰқ4/к°җ5вҶ“", iv: [8, -6], deg: [5, -4] }, 7: { lyric: "мӢң-мҶ”-лҸ„", ans: "лӢЁ6вҶ‘+мҷ„5вҶ“", iv: [8, -7], deg: [5, -4] } };
        const patternM6Down = { 1: { lyric: "мҶ”-мӢң-лҸ„", ans: "лӢЁ6вҶ“+лӢЁ2вҶ‘", iv: [-8, 1], deg: [-5, 1] }, 2: { lyric: "нҢҢ-лқј-мӢң", ans: "лӢЁ6вҶ“+мһҘ2вҶ‘", iv: [-8, 2], deg: [-5, 1] }, 3: { lyric: "лҸ„-лҜё-мҶ”", ans: "лӢЁ6вҶ“+лӢЁ3вҶ‘", iv: [-8, 3], deg: [-5, 2] }, 4: { lyric: "лҸ„-лҜё-мҶ”#", ans: "лӢЁ6вҶ“+мһҘ3вҶ‘", iv: [-8, 4], deg: [-5, 2] }, 5: { lyric: "лҸ„-лҜё-лқј", ans: "лӢЁ6вҶ“+мҷ„4вҶ‘", iv: [-8, 5], deg: [-5, 3] }, 6: { lyric: "мҶ”-мӢң-нҢҢ", ans: "лӢЁ6вҶ“+мҰқ4/к°җ5вҶ‘", iv: [-8, 6], deg: [-5, 4] }, 7: { lyric: "лҸ„-лҜё-мӢң", ans: "лӢЁ6вҶ“+мҷ„5вҶ‘", iv: [-8, 7], deg: [-5, 5] } };

        function startQuiz(mode) { Tone.start(); isSightReadingMode = (mode === 'sight'); updateOptionsArea(); resetStats(); resetUI(); visualNotes = generateProblem(); hideAllPages(); document.getElementById('quiz-page').classList.add('active'); setTimeout(() => { handlePlay(false); }, 300); }

        function generateProblem() {
            if (patternQueue.length === 0) {
                if (currentIntervalMajor === 2) patternQueue = shuffle([...pattern2D]);
                else if (currentIntervalMajor === 3) {
                    if (sub3Type === '2up') patternQueue = shuffle([...pattern3D2Up]);
                    else if (sub3Type === '2down') patternQueue = shuffle([...pattern3D2Down]);
                    else if (sub3Type === '3up') patternQueue = shuffle([...pattern3D3Up]);
                    else if (sub3Type === '3down') patternQueue = shuffle([...pattern3D3Down]);
                }
                else patternQueue = shuffle(Object.values((sub6Direction === 'up') ? patternM6Up : patternM6Down));
            }
            const p = patternQueue.shift();
            const CURRENT_MAX = isSightReadingMode ? SIGHT_MAX : EAR_MAX; 
            while (true) {
                let n1Midi = RANGE_MIN + Math.floor(Math.random() * (CURRENT_MAX - RANGE_MIN - 8));
                let n2Midi = n1Midi + p.iv[0]; let n3Midi = n2Midi + p.iv[1];
                if (n1Midi < RANGE_MIN || n2Midi < RANGE_MIN || n3Midi < RANGE_MIN || n1Midi > CURRENT_MAX || n2Midi > CURRENT_MAX || n3Midi > CURRENT_MAX) continue;
                const n1Options = getAllNotationOptions(n1Midi);
                for (let n1 of n1Options) {
                    const n2 = getNoteByDegree(n2Midi, n1, p.deg[0]); const n3 = getNoteByDegree(n3Midi, n2, p.deg[1]);
                    if (!n1.acc.includes('##') && !n1.acc.includes('bb') && !n2.acc.includes('##') && !n2.acc.includes('bb') && !n3.acc.includes('##') && !n3.acc.includes('bb')) {
                        matchedLyric = p.lyric; currentAns = p.ans; return [n1, n2, n3];
                    }
                }
            }
        }

        function updateOptionsArea() {
            const area = document.getElementById('options-area'); const guide = document.getElementById('quiz-guide-text'); area.innerHTML = "";
            if (isSightReadingMode) { area.style.display = 'none'; guide.innerText = ""; return; }
            area.style.display = 'grid';
            if (currentIntervalMajor === 2) {
                guide.innerText = "1. лҸ„л””л Ҳ (лӢЁ2вҶ‘+лӢЁ2вҶ‘)\n2. лҜёнҢҢмҶ” (лӢЁ2вҶ‘+мһҘ2вҶ‘)...";
                pattern2D.forEach((p, i) => { const btn = document.createElement('button'); btn.className = "opt-btn"; btn.innerText = `${i+1}.${p.lyric}`; btn.onclick = (e) => { e.preventDefault(); checkChoice(btn, p.lyric); }; area.appendChild(btn); });
            } else if (currentIntervalMajor === 3) {
                let list = [];
                if (sub3Type === '2up') { list = pattern3D2Up; guide.innerText = "1. лҸ„лҜёл Ҳ (мһҘ3вҶ‘мһҘ2вҶ“)\n2. лҸ„лҜёл©” (мһҘ3вҶ‘лӢЁ2вҶ“)\n3. мӢңл ҲлҸ„ (лӢЁ3вҶ‘мһҘ2вҶ“)\n4. лқјлҸ„мӢң (лӢЁ3вҶ‘лӢЁ2вҶ“)\n5. мӢңл ҲbлҸ„ (к°җ3вҶ‘лӢЁ2вҶ“)"; }
                else if (sub3Type === '2down') { list = pattern3D2Down; guide.innerText = "1. лҜёлҸ„л Ҳ (мһҘ3вҶ“мһҘ2вҶ‘)\n2. лҜёлҸ„л”” (мһҘ3вҶ“лӢЁ2вҶ‘)\n3. л ҲмӢңлҸ„ (лӢЁ3вҶ“лӢЁ2вҶ‘)\n4. лҸ„лқјмӢң (лӢЁ3вҶ“мһҘ2вҶ‘)\n5. л ҲbмӢңлҸ„ (к°җ3вҶ“лӢЁ2вҶ‘)"; }
                else if (sub3Type === '3up') { list = pattern3D3Up; guide.innerText = "1. лҸ„лҜёмҶ” (мһҘ3нҷ”мқҢ)\n2. лҸ„лҜёмҶ”# (мҰқ3нҷ”мқҢ)\n3. лқјлҸ„лҜё (лӢЁ3нҷ”мқҢ)\n4. мӢңл ҲнҢҢ (к°җ3нҷ”мқҢ)"; }
                else if (sub3Type === '3down') { list = pattern3D3Down; guide.innerText = "1. мҶ”лҜёлҸ„ (мһҘ3нҷ”мқҢ)\n2. лҸ„мҶ”#лҜё (мҰқ3нҷ”мқҢ)\n3. лҜёлҸ„лқј (лӢЁ3нҷ”мқҢ)\n4. нҢҢл ҲмӢң (к°җ3нҷ”мқҢ)"; }
                list.forEach((p, i) => { const btn = document.createElement('button'); btn.className = "opt-btn"; btn.innerText = `${i+1}.${p.lyric}`; btn.onclick = (e) => { e.preventDefault(); checkChoice(btn, p.lyric); }; area.appendChild(btn); });
            } else if (sub6Direction === 'up') {
                guide.innerText = "1. лҜёлҸ„мӢң (лӢЁ6вҶ‘+лӢЁ2вҶ“)...";
                Object.keys(patternM6Up).forEach((key) => { const p = patternM6Up[key]; const btn = document.createElement('button'); btn.className = "opt-btn"; btn.innerText = `${key}.${p.lyric}`; btn.onclick = (e) => { e.preventDefault(); checkChoice(btn, p.lyric); }; area.appendChild(btn); });
            } else {
                guide.innerText = "1. мҶ”мӢңлҸ„ (лӢЁ6вҶ“+лӢЁ2вҶ‘)...";
                Object.keys(patternM6Down).forEach((key) => { const p = patternM6Down[key]; const btn = document.createElement('button'); btn.className = "opt-btn"; btn.innerText = `${key}.${p.lyric}`; btn.onclick = (e) => { e.preventDefault(); checkChoice(btn, p.lyric); }; area.appendChild(btn); });
            }
        }

        function checkChoice(btn, choice) { if (isSightReadingMode || btn.disabled) return; stats.sessionCount++; if (choice === matchedLyric) { btn.classList.add('correct'); stats.correct++; document.getElementById('quiz-status').innerText = "вӯ• м •лӢө!"; document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true); showAns(); } else { btn.classList.add('wrong'); stats.wrong++; errorTracker[matchedLyric] = (errorTracker[matchedLyric] || 0) + 1; document.getElementById('quiz-status').innerText = "вқҢ мҳӨлӢө!"; } }
        function nextProblem() { if (!isSightReadingMode && stats.sessionCount >= 10) { showResults(); return; } resetUI(); visualNotes = generateProblem(); setTimeout(() => { handlePlay(false); }, 100); }
        function showResults() { hideAllPages(); document.getElementById('result-page').classList.add('active'); document.getElementById('res-counts').innerText = `(м •лӢө: ${stats.correct} / мҳӨлӢө: ${stats.wrong})`; const rate = Math.round((stats.correct / (stats.correct + stats.wrong)) * 100); document.getElementById('res-rate').innerText = `м •лӢөлҘ : ${rate}%`; let worstPattern = "м—ҶмқҢ (мҷ„лІҪн•©лӢҲлӢӨ!)"; let maxErrors = 0; for (let lyric in errorTracker) { if (errorTracker[lyric] > maxErrors) { maxErrors = errorTracker[lyric]; worstPattern = `${lyric} (${maxErrors}нҡҢ мҳӨлӢө)`; } } document.getElementById('worst-pattern-text').innerText = worstPattern; }
        function continueQuiz() { stats.sessionCount = 0; hideAllPages(); document.getElementById('quiz-page').classList.add('active'); nextProblem(); }
        function resetStats() { stats = { correct: 0, wrong: 0, sessionCount: 0 }; errorTracker = {}; }
        function resetUI() { document.getElementById('ans-header').style.display = 'none'; document.getElementById('score-container').style.display = 'none'; document.getElementById('quiz-guide-text').style.display = 'block'; document.getElementById('play-btn').disabled = false; document.getElementById('replay-btn').disabled = true; document.querySelectorAll('.opt-btn').forEach(b => { b.classList.remove('correct', 'wrong'); b.disabled = false; }); const status = document.getElementById('quiz-status'); if (isSightReadingMode) status.innerText = "мІ« мқҢмқ„ л“Јкі  л…ёлһҳн•ҳм„ёмҡ”!"; else status.innerText = ""; }
        function handlePlay(isReplay) { const bpmSec = 60 / currentBpm; const now = Tone.now(); if (isSightReadingMode) { document.getElementById('ans-header').style.display = 'flex'; document.getElementById('answer-text').style.display = 'none'; document.getElementById('lyric-match').innerText = `к°ҖмӮ¬ : ${matchedLyric}`; document.getElementById('lyric-match').style.display = 'block'; sampler.triggerAttackRelease(Tone.Frequency(visualNotes[0].midi, "midi"), 1.0); } else { visualNotes.forEach((n, i) => { sampler.triggerAttackRelease(Tone.Frequency(n.midi, "midi"), bpmSec, now + i * bpmSec); }); } document.getElementById('play-btn').disabled = true; document.getElementById('replay-btn').disabled = false; }
        function updateTempo(val) { currentBpm = val; document.getElementById('tempo-val').innerText = `BPM ${val}`; }
        function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], i]; [a[j], a[i]] = [a[i], a[j]]; } return a; }
        function showAns() { if (!visualNotes.length) return; document.getElementById('ans-header').style.display = 'flex'; document.getElementById('answer-text').innerText = `м •лӢө : ${currentAns}`; document.getElementById('answer-text').style.display = 'block'; document.getElementById('lyric-match').innerText = `к°ҖмӮ¬ : ${matchedLyric}`; document.getElementById('quiz-guide-text').style.display = 'none'; if (isSightReadingMode) { document.getElementById('quiz-status').innerText = ""; } drawScore(); const bpmSec = 60 / currentBpm; const now = Tone.now(); visualNotes.forEach((n, i) => { sampler.triggerAttackRelease(Tone.Frequency(n.midi, "midi"), bpmSec, now + i * bpmSec); }); }
        function drawScore() { const container = document.getElementById('score-container'); container.innerHTML = ""; container.style.display = "flex"; const renderer = new Renderer(container, Renderer.Backends.SVG); renderer.resize(260, 150); const ctx = renderer.getContext(); const stave = new Stave(0, 0, 250); stave.addClef("treble").setContext(ctx).draw(); const accTracker = {}; const notes = visualNotes.map(n => { const sn = new StaveNote({ clef: "treble", keys: [`${n.key}/${n.oct}`], duration: "q" }); const currentAcc = n.acc || ""; const prevAcc = accTracker[n.key]; if (currentAcc === "") { if (prevAcc !== undefined && prevAcc !== "") sn.addModifier(new Accidental("n")); } else { if (prevAcc !== currentAcc) sn.addModifier(new Accidental(currentAcc)); } accTracker[n.key] = currentAcc; return sn; }); const voice = new Voice({ num_beats: visualNotes.length, beat_value: 4 }); voice.addTickables(notes); new Formatter().joinVoices([voice]).format([voice], 200); voice.draw(ctx, stave); }
    </script>
