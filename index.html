<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>펜나뮤직 이어핏 시창/청음</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    <style>
        :root { 
            --penna-pink: #FF9AA2;    
            --penna-yellow: #FFE39F;  
            --penna-green: #B5EAD7;   
            --penna-blue: #C7CEEA;    
            --primary: #2C3E50;       
            --secondary: #34495E;
            --bg: #F9F9F9; 
        }
        
        body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; touch-action: manipulation; }
        
        .app-card { 
            background: white; width: 95%; max-width: 420px; padding: 25px 20px; border-radius: 30px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); text-align: center; min-height: 580px; 
            display: flex; flex-direction: column; position: relative; box-sizing: border-box;
            border: 6px solid transparent;
            background-image: linear-gradient(#fff, #fff), 
                              linear-gradient(to bottom right, var(--penna-pink), var(--penna-yellow), var(--penna-green), var(--penna-blue));
            background-origin: border-box;
            background-clip: content-box, border-box;
        }
        
        .app-logo { position: absolute; top: 15px; right: 15px; width: 40px; height: 40px; border-radius: 8px; object-fit: cover; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .page { display: none; flex-direction: column; flex-grow: 1; animation: fadeIn 0.3s ease-out; }
        .page.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h2 { margin-top: 10px; color: var(--primary); margin-bottom: 25px; font-size: 1.4rem; word-break: keep-all; line-height: 1.3; }
        .display-box { background: #F2F4F6; min-height: 180px; border-radius: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; margin-bottom: 15px; padding: 15px; }
        
        #quiz-status { font-size: 14px; color: #7F8C8D; font-weight: 500; margin-bottom: 10px; }
        #answer-text { font-size: 16px; color: var(--primary); font-weight: bold; margin-bottom: 5px; display: none; }
        #lyric-match { font-size: 18px; color: #E74C3C; font-weight: 800; margin-bottom: 10px; display: none; }
        #score-container { width: 100%; display: none; justify-content: center; }

        #options-area { display: none; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 20px; }
        .opt-btn { background: #fff; border: 1.5px solid #DCDFE6; color: #606266; padding: 12px; font-size: 13px; border-radius: 12px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .opt-btn.correct { background: #E1F3D8; border-color: #67C23A; color: #67C23A; }
        .opt-btn.wrong { background: #FDE2E2; border-color: #F56C6C; color: #F56C6C; }

        .tempo-container { background: #fff; padding: 12px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #eee; }
        .tempo-label { font-size: 12px; color: var(--secondary); font-weight: 600; margin-bottom: 5px; display: flex; justify-content: space-between; }
        #tempo-slider { width: 100%; cursor: pointer; accent-color: var(--secondary); }

        .btn-group { display: flex; flex-direction: column; gap: 8px; margin-top: auto; }
        button { width: 100%; padding: 16px; border: none; border-radius: 15px; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        .btn-main { background: var(--secondary); color: white; }
        .btn-secondary { background: #7F8C8D; color: white; }
        .btn-play { background: #27AE60; color: white; } 
        .btn-replay { background: #95A5A6; color: white; } 
        .btn-next { background: #E67E22; color: white; } 
        .btn-sub { background: white; color: var(--primary); border: 2px solid #DCDFE6; }
        .btn-back { background: transparent; color: #95A5A6; font-size: 12px; padding: 5px; margin-top: 5px; border: none; }
        
        button:disabled { background: #BDC3C7; cursor: not-allowed; opacity: 0.6; }
    </style>
</head>
<body>
    <div class="app-card">
        <img src="logo.jpeg" alt="펜나뮤직 로고" class="app-logo">

        <div id="main-page" class="page active">
            <h2>펜나뮤직 이어핏<br><span style="font-size: 1.1rem; color: #7F8C8D;">시창/청음 트레이닝</span></h2>
            <div style="flex-grow: 1; display: flex; flex-direction: column; justify-content: center;">
                <p style="color: #7F8C8D; font-size: 14px; margin-bottom: 30px;">연습 모드를 선택하세요.</p>
                <div class="btn-group">
                    <button id="p1-load-btn" class="btn-main" onclick="initQuiz(1)" disabled>연습 1: 단6도 청음 훈련</button>
                    <button id="p2-load-btn" class="btn-secondary" onclick="initQuiz(2)" disabled>연습 2: 단6도 시창 훈련</button>
                </div>
