<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>펜나뮤직 이어핏 청음</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    <style>
        :root { --primary: #2C3E50; --secondary: #34495E; --bg: #F9F9F9; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-card { background: white; width: 95%; max-width: 420px; padding: 30px 15px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); text-align: center; border-top: 5px solid var(--primary); margin: 20px; }
        .display-box { background: #F2F4F6; min-height: 140px; border-radius: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; margin-bottom: 25px; padding: 15px; overflow: hidden; }
        #quiz-status { font-size: 15px; color: #7F8C8D; font-weight: 500; margin-bottom: 10px; }
        #answer-text { font-size: 16px; color: var(--primary); font-weight: bold; margin-bottom: 15px; display: none; }
        #score-container { width: 100%; display: none; justify-content: center; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        button { width: 100%; padding: 16px; border: none; border-radius: 15px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        .btn-main { background: var(--primary); color: white; }
        .btn-sub { background: white; color: var(--primary); border: 2px solid var(--primary); }
        button:disabled { background: #BDC3C7; cursor: not-allowed; }
        button:active { transform: scale(0.98); }
        .subtitle { font-size: 14px; color: #95a5a6; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="app-card">
        <h2 style="margin-top:0; color: var(--primary); margin-bottom:5px;">펜나뮤직 이어핏 청음</h2>
        <div class="subtitle">악보 확인형 음정 훈련</div>
        
        <div class="display-box">
            <div id="quiz-status">피아노 소리를 로딩 중입니다...</div>
            <div id="answer-text">정답 표시</div>
            <div id="score-container"></div>
        </div>

        <div class="btn-group">
            <button id="p1-btn" class="btn-main" onclick="playQuiz(1)" disabled>연습 1: 6도 상행 훈련</button>
            <button id="p2-btn" class="btn-main" onclick="playQuiz(2)" disabled style="background: var(--secondary);">연습 2: 7도 상행 훈련</button>
            <button class="btn-sub" onclick="showAns()">정답 및 악보 확인</button>
        </div>
    </div>

    <script>
        const { Renderer, Stave, StaveNote, Voice, Formatter, Accidental } = Vex.Flow;
        
        const sampler = new Tone.Sampler({
            urls: {
                "A0": "A0.mp3", "C1": "C1.mp3", "D#1": "Ds1.mp3", "F#1": "Fs1.mp3",
                "A1": "A1.mp3", "C2": "C2.mp3", "D#2": "Ds2.mp3", "F#2": "Fs2.mp3",
                "A2": "A2.mp3", "C3": "C3.mp3", "D#3": "Ds3.mp3", "F#3": "Fs3.mp3",
                "A3": "A3.mp3", "C4": "C4.mp3", "D#4": "Ds4.mp3", "F#4": "Fs4.mp3",
                "A4": "A4.mp3", "C5": "C5.mp3", "D#5": "Ds5.mp3", "F#5": "Fs5.mp3",
                "A5": "A5.mp3", "C6": "C6.mp3"
            },
            release: 0.4,
            baseUrl: "https://tonejs.github.io/audio/salamander/",
            onload: () => {
                document.getElementById('quiz-status').innerText = "준비 완료! 문제를 선택하세요.";
                document.getElementById('p1-btn').disabled = false;
                document.getElementById('p2-btn').disabled = false;
            }
        }).toDestination();

        const intervalNames = { 1:"단2", 2:"장2", 3:"단3", 4:"장3", 5:"완4", 6:"증4/감5", 7:"완5", 8:"단6", 9:"장6", 10:"단7", 11:"장7" };
        const midiToNote = (midi) => {
            const names = ['c', 'c#', 'd', 'd#', 'e', 'f', 'f#', 'g', 'g#', 'a', 'a#', 'b'];
            return { name: names[midi % 12], octave: Math.floor(midi / 12) - 1 };
        };

        let currentAns = "";
        let currentNotes = [];

        async function playQuiz(type) {
            if (Tone.context.state !== 'running') await Tone.start();
            document.getElementById('answer-text').style.display = 'none';
            document.getElementById('score-container').style.display = 'none';
            document.getElementById('quiz-status').innerText = `🎶 연습 ${type} 연주 중...`;
            
            const root = 52 + Math.floor(Math.random() * 12); 
            let upInterval, downInterval, quizTitle;

            if (type === 1) {
                upInterval = Math.random() > 0.5 ? 8 : 9;
                downInterval = (upInterval === 8) ? 1 + Math.floor(Math.random() * 7) : 1 + Math.floor(Math.random() * 8);
                quizTitle = "[연습 1]";
            } else {
                upInterval = Math.random() > 0.5 ? 10 : 11;
                downInterval = Math.random() > 0.5 ? 8 : 9;
                quizTitle = "[연습 2]";
            }
            
            currentNotes = [root, root + upInterval, (root + upInterval) - downInterval];
            currentAns = `${quizTitle} ${intervalNames[upInterval]} 상행 → ${intervalNames[downInterval]} 하행`;
            
            const now = Tone.now();
            currentNotes.forEach((n, i) => {
                sampler.triggerAttackRelease(Tone.Frequency(n, "midi"), 0.65, now + i * 0.65);
            });

            setTimeout(() => { document.getElementById('quiz-status').innerText = '들으신 음정은?'; }, 2000);
        }

        function drawScore(notesMidi) {
            const container = document.getElementById('score-container');
            container.innerHTML = "";
            container.style.display = "flex";
            
            const renderer = new Renderer(container, Renderer.Backends.SVG);
            renderer.resize(250, 120);
            const context = renderer.getContext();
            const stave = new Stave(10, 0, 200);
            stave.addClef("treble").setContext(context).draw();

            const staveNotes = notesMidi.map(midi => {
                const noteInfo = midiToNote(midi);
                const note = new StaveNote({
                    clef: "treble",
                    keys: [`${noteInfo.name}/${noteInfo.octave}`],
                    duration: "q"
                });
                if (noteInfo.name.includes('#')) {
                    note.addModifier(new Accidental("#"));
                }
                return note;
            });

            const voice = new Voice({ num_beats: 3, beat_value: 4 });
            voice.addTickables(staveNotes);
            new Formatter().joinVoices([voice]).format([voice], 150);
            voice.draw(context, stave);
        }

        function showAns() {
            if (!currentAns) return;
            document.getElementById('answer-text').innerText = currentAns;
            document.getElementById('answer-text').style.display = 'block';
            drawScore(currentNotes);
        }
    </script>
</body>
</html>
