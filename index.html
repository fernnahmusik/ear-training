<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>펜나뮤직 이어핏 시창/청음</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    <style>
        :root { --primary: #2C3E50; --secondary: #34495E; --bg: #F9F9F9; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-card { background: white; width: 95%; max-width: 420px; padding: 25px 15px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); text-align: center; border-top: 5px solid var(--primary); margin: 20px; }
        .display-box { background: #F2F4F6; min-height: 190px; border-radius: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; margin-bottom: 20px; padding: 15px; overflow: hidden; }
        #quiz-status { font-size: 14px; color: #7F8C8D; font-weight: 500; margin-bottom: 10px; }
        #answer-text { font-size: 16px; color: var(--primary); font-weight: bold; margin-bottom: 5px; display: none; white-space: pre-line; }
        #lyric-match { font-size: 18px; color: #E74C3C; font-weight: 800; margin-bottom: 10px; display: none; }
        #score-container { width: 100%; display: none; justify-content: center; }
        
        .tempo-container { background: #fff; padding: 15px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #eee; }
        .tempo-label { font-size: 14px; color: var(--secondary); font-weight: 600; margin-bottom: 10px; display: flex; justify-content: space-between; }
        #tempo-slider { width: 100%; cursor: pointer; accent-color: var(--primary); }

        .btn-group { display: flex; flex-direction: column; gap: 8px; }
        button { width: 100%; padding: 16px; border: none; border-radius: 15px; font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        .btn-main { background: var(--primary); color: white; }
        .btn-replay { background: #95A5A6; color: white; }
        .btn-sub { background: white; color: var(--primary); border: 2px solid var(--primary); }
        #lyric-guide { margin-top: 25px; padding: 15px; background: #fff; border: 1px dashed #BDC3C7; border-radius: 15px; text-align: left; display: none; }
        .guide-title { font-size: 13px; font-weight: bold; color: var(--primary); margin-bottom: 8px; }
        .guide-list { font-size: 12px; color: #7F8C8D; line-height: 1.6; }
        button:disabled { background: #BDC3C7; cursor: not-allowed; }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="app-card">
        <h2 style="margin-top:0; color: var(--primary); margin-bottom:20px;">펜나뮤직 이어핏 시창/청음</h2>
        
        <div class="display-box">
            <div id="quiz-status">피아노 소리를 로딩 중입니다...</div>
            <div id="answer-text">정답 표시</div>
            <div id="lyric-match">가사 매칭</div>
            <div id="score-container"></div>
        </div>

        <div class="tempo-container">
            <div class="tempo-label">
                <span>재생 속도 (Tempo)</span>
                <span id="tempo-val">BPM 80</span>
            </div>
            <input type="range" id="tempo-slider" min="50" max="180" value="80" oninput="updateTempo(this.value)">
        </div>

        <div class="btn-group">
            <button id="p1-btn" class="btn-main" onclick="playQuiz(1)" disabled>연습 1: 단6도 청음 훈련</button>
            <button id="p2-btn" class="btn-main" onclick="playQuiz(2)" disabled style="background: var(--secondary);">연습 2: 단6도 시창 훈련</button>
            <button id="replay-btn" class="btn-replay" onclick="replaySound()" disabled>다시 듣기</button>
            <button class="btn-sub" onclick="showAns()">정답 및 악보 확인</button>
        </div>

        <div id="lyric-guide">
            <div class="guide-title">💡 음정별 가사</div>
            <div class="guide-list">
                1. 미-도-시 (단6↑ 단2↓) &nbsp; 2. 시-솔-파 (단6↑ 장2↓)<br>
                3. 미-도-라 (단6↑ 단3↓) &nbsp; 4. 미-도-솔# (단6↑ 장3↓)<br>
                5. 미-도-솔 (단6↑ 완4↓) &nbsp; 6. 라-파-시 (단6↑ 증4↓)<br>
                7. 시-솔-도 (단6↑ 완5↓)
            </div>
        </div>
    </div>

    <script>
        const { Renderer, Stave, StaveNote, Voice, Formatter, Accidental } = Vex.Flow;
        const sampler = new Tone.Sampler({
            urls: {
                "A0": "A0.mp3", "C1": "C1.mp3", "D#1": "Ds1.mp3", "F#1": "Fs1.mp3",
                "A1": "A1.mp3", "C2": "C2.mp3", "D#2": "Ds2.mp3", "F#2": "Fs2.mp3",
                "A2": "A2.mp3", "C3": "C3.mp3", "D#3": "Ds3.mp3", "F#3": "Fs3.mp3",
                "A3": "A3.mp3", "C4": "C4.mp3", "D#4": "Ds4.mp3", "F#4": "Fs4.mp3",
                "A4": "A4.mp3", "C5": "C5.mp3", "D#5": "Ds5.mp3", "F#5": "Fs5.mp3",
                "A5": "A5.mp3", "C6": "C6.mp3"
            },
            release: 0.5,
            baseUrl: "https://tonejs.github.io/audio/salamander/",
            onload: () => {
                document.getElementById('quiz-status').innerText = "준비 완료!";
                document.getElementById('p1-btn').disabled = false;
                document.getElementById('p2-btn').disabled = false;
            }
        }).toDestination();

        let currentBpm = 80;
        let currentAns = "";
        let matchedLyric = "";
        let visualNotes = [];
        
        // 연습 1과 연습 2 각각의 독립적인 히스토리 관리
        let p1History = [];
        let p2History = [];

        let isSightReadingMode = false;

        function updateTempo(val) {
            currentBpm = val;
            document.getElementById('tempo-val').innerText = `BPM ${val}`;
        }

        const baseScales = [{ n: 'c', m: 0 }, { n: 'd', m: 2 }, { n: 'e', m: 4 }, { n: 'f', m: 5 }, { n: 'g', m: 7 }, { n: 'a', m: 9 }, { n: 'b', m: 11 }];
        const intervalNames = { 1:"단2", 2:"장2", 3:"단3", 4:"장3", 5:"완4", 6:"증4/감5", 7:"완5", 8:"단6", 9:"장6", 10:"단7", 11:"장7" };

        function getSimplestNoteInfo(midi, preferredBaseIdx) {
            let octave = Math.floor(midi / 12) - 1;
            let chroma = midi % 12;
            if (chroma < 0) chroma += 12;
            for (let i = 0; i < baseScales.length; i++) {
                if (baseScales[i].m === chroma) return { midi, key: baseScales[i].n, acc: "", oct: octave };
            }
            const targetNatural = baseScales[preferredBaseIdx].m;
            let diff = chroma - targetNatural;
            if (diff > 6) diff -= 12;
            if (diff < -6) diff += 12;
            if (Math.abs(diff) === 1) return { midi, key: baseScales[preferredBaseIdx].n, acc: (diff === 1 ? "#" : "b"), oct: octave };
            for (let i = 0; i < baseScales.length; i++) {
                let newDiff = chroma - baseScales[i].m;
                if (newDiff > 6) newDiff -= 12;
                if (newDiff < -6) newDiff += 12;
                if (Math.abs(newDiff) === 1) return { midi, key: baseScales[i].n, acc: (newDiff === 1 ? "#" : "b"), oct: octave };
            }
            return { midi, key: baseScales[preferredBaseIdx].n, acc: (diff > 0 ? "#" : "b"), oct: octave };
        }

        function generateProblem(upInt, downInt, mode) {
            let rMidi;
            let attempts = 0;
            const history = (mode === 1) ? p1History : p2History;
            
            // 시창(2): 최고음 F5(77) 이하가 되도록 시작음 상한은 69(A4)
            // 청음(1): G3(55)~C5(72)
            const minMidi = 55;
            const maxRoot = (mode === 2) ? 69 : 72; 

            do {
                rMidi = minMidi + Math.floor(Math.random() * (maxRoot - minMidi + 1));
                attempts++;
            } while (history.includes(rMidi) && attempts < 20);

            history.push(rMidi);
            if (history.length > 5) history.shift();

            const preferredNames = [0, 0, 1, 1, 2, 3, 3, 4, 4, 5, 5, 6];
            const rBaseIdx = preferredNames[rMidi % 12];
            const upMidi = rMidi + upInt;
            const upDeg = (upInt >= 10) ? 6 : 5;
            const upBaseIdx = (rBaseIdx + upDeg) % 7;
            const downMidi = upMidi - downInt;
            let downDeg = (downInt === 6) ? 3 : ({ 1:1, 2:1, 3:2, 4:2, 5:3, 7:4, 8:5, 9:5 }[downInt] || 1);
            const downBaseIdx = (upBaseIdx - downDeg + 7) % 7;

            return [
                getSimplestNoteInfo(rMidi, rBaseIdx),
                getSimplestNoteInfo(upMidi, upBaseIdx),
                getSimplestNoteInfo(downMidi, downBaseIdx)
            ];
        }

        async function playQuiz(type) {
            if (Tone.context.state !== 'running') await Tone.start();
            document.getElementById('answer-text').style.display = 'none';
            document.getElementById('lyric-match').style.display = 'none';
            document.getElementById('score-container').style.display = 'none';
            document.getElementById('lyric-guide').style.display = 'block';

            isSightReadingMode = (type === 2);
            
            let downInt = 1 + Math.floor(Math.random() * 7);
            visualNotes = generateProblem(8, downInt, type);
            currentAns = `[연습 ${type}] 단6도 상행 → ${intervalNames[downInt]} 하행`;
            const lyrics = { 1: "미-도-시", 2: "시-솔-파", 3: "미-도-라", 4: "미-도-솔#", 5: "미-도-솔", 6: "라-파-시", 7: "시-솔-도" };
            matchedLyric = lyrics[downInt] || "";

            if (isSightReadingMode) {
                document.getElementById('quiz-status').innerText = "가사를 보고 시창하세요! (첫 음 제시)";
                document.getElementById('lyric-match').innerText = `가사: ${matchedLyric}`;
                document.getElementById('lyric-match').style.display = 'block';
                sampler.triggerAttackRelease(Tone.Frequency(visualNotes[0].midi, "midi"), 1.0);
            } else {
                executeSound();
            }
            document.getElementById('replay-btn').disabled = false;
        }

        function executeSound() {
            const secondsPerBeat = 60 / currentBpm;
            const now = Tone.now();
            visualNotes.forEach((n, i) => {
                sampler.triggerAttackRelease(Tone.Frequency(n.midi, "midi"), secondsPerBeat, now + i * secondsPerBeat);
            });
            document.getElementById('quiz-status').innerText = "연주 중...";
            setTimeout(() => { document.getElementById('quiz-status').innerText = "방금 들은 음정은?"; }, (secondsPerBeat * 3) * 1000);
        }

        function replaySound() {
            if (visualNotes.length) {
                if (isSightReadingMode) {
                    sampler.triggerAttackRelease(Tone.Frequency(visualNotes[0].midi, "midi"), 1.0);
                } else {
                    executeSound();
                }
            }
        }

        function drawScore() {
            const container = document.getElementById('score-container');
            container.innerHTML = "";
            container.style.display = "flex";
            const renderer = new Renderer(container, Renderer.Backends.SVG);
            renderer.resize(300, 200);
            const context = renderer.getContext();
            const stave = new Stave(10, 80, 260);
            stave.addClef("treble").setContext(context).draw();
            const staveNotes = visualNotes.map(n => {
                const note = new StaveNote({ clef: "treble", keys: [`${n.key}/${n.oct}`], duration: "q" });
                if (n.acc) note.addModifier(new Accidental(n.acc));
                return note;
            });
            const voice = new Voice({ num_beats: 3, beat_value: 4 });
            voice.addTickables(staveNotes);
            new Formatter().joinVoices([voice]).format([voice], 200);
            voice.draw(context, stave);
        }

        function showAns() {
            if (!currentAns) return;
            document.getElementById('answer-text').innerText = currentAns;
            document.getElementById('answer-text').style.display = 'block';
            document.getElementById('lyric-match').innerText = `가사: ${matchedLyric}`;
            document.getElementById('lyric-match').style.display = 'block';
            if (isSightReadingMode) executeSound();
            drawScore();
        }
    </script>
</body>
</html>
