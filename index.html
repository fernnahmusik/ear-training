<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>펜나뮤직 이어핏 시창/청음</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    <style>
        :root {
            --penna-pink: #FF9AA2; --penna-yellow: #FFE39F; --penna-green: #B5EAD7; --penna-blue: #C7CEEA;
            --primary: #2C3E50; --secondary: #34495E; --bg: #F9F9F9;
        }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background: var(--bg); margin: 0;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            /* [수정] touch-action을 body 대신 명시적으로 제어 */
            touch-action: pan-y;
            overflow-x: hidden;
        }
        .app-card {
            background: white; width: 94%; max-width: 400px; padding: 12px;
            border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center; min-height: 520px;
            display: flex; flex-direction: column; position: relative;
            /* [수정] z-index 및 isolation 추가 — 자식 터치 이벤트가 카드 배경에 막히지 않도록 */
            isolation: isolate;
            border: 5px solid transparent;
            background-image: linear-gradient(#fff, #fff), linear-gradient(to bottom right, var(--penna-pink), var(--penna-yellow), var(--penna-green), var(--penna-blue));
            background-origin: border-box; background-clip: padding-box, border-box;
        }
        .app-logo { position: absolute; top: 15px; right: 15px; width: 35px; height: 35px; border-radius: 8px; object-fit: cover; pointer-events: none; z-index: 100; }
        .page { display: none; flex-direction: column; flex-grow: 1; position: relative; }
        .page.active { display: flex; }
        h2 { margin: 15px 0 5px 0; color: var(--primary); font-size: 1.2rem; line-height: 1.2; }
        .sub-title { font-size: 0.9rem; color: #7F8C8D; margin-bottom: 20px; font-weight: 500; }
        .display-box {
            background: #ffffff; border: none; min-height: 90px; border-radius: 18px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            margin-bottom: 8px; padding: 10px; flex-shrink: 0; margin-top: 5px;
            position: relative; overflow: visible;
        }
        .ans-header { display: none; width: 100%; justify-content: center; gap: 15px; margin-bottom: 2px; }
        #answer-text { font-size: 13px; color: var(--primary); font-weight: bold; margin: 0; }
        #lyric-match { font-size: 14px; color: #E74C3C; font-weight: 800; margin: 0; }
        #score-container { width: 100%; display: none; justify-content: center; transform: scale(0.85); margin-top: -10px; margin-bottom: -40px; overflow: visible; }

        #options-area {
            display: none;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
            margin-bottom: 12px;
            width: 100%;
        }

        .btn-group { display: flex; flex-direction: column; gap: 6px; margin-top: auto; padding-bottom: 4px; }

        /* [핵심 수정] 버튼 터치 이벤트 완전 허용 */
        button, .opt-btn {
            width: 100%; padding: 10px 6px; border: none; border-radius: 14px;
            font-weight: 600; cursor: pointer;
            touch-action: manipulation;          /* ← 모바일 더블탭 지연 제거 */
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            position: relative;
        }
        button:active, .opt-btn:active { transform: scale(0.97); opacity: 0.9; }

        .opt-btn {
            background: #fff; border: 1.5px solid #DCDFE6; color: #606266;
            font-size: 11px; line-height: 1.2; height: 52px;
            display: flex; align-items: center; justify-content: center;
            text-align: center; word-break: keep-all;
        }

        .btn-category { background: var(--secondary); color: white; padding: 14px; font-size: 0.95rem; }
        .btn-main { background: var(--primary); color: white; }
        .btn-play { background: #27AE60; color: white; }
        .btn-replay { background: #95A5A6; color: white; }
        .btn-next { background: #E67E22; color: white; }
        .btn-sub { background: white; color: var(--primary); border: 1.5px solid #DCDFE6; }
        .btn-back { background: transparent; color: #95A5A6; font-size: 11px; padding: 4px; }
        .opt-btn.correct { background: var(--penna-green); color: white; border-color: #27AE60; }
        .opt-btn.wrong { background: #FFD1D1; color: #E74C3C; border-color: #E74C3C; }

        .tempo-container { background: #fff; padding: 6px 10px; border-radius: 12px; margin-bottom: 8px; border: 1px solid #eee; flex-shrink: 0; }
        .tempo-label { font-size: 10px; color: var(--secondary); font-weight: 600; margin-bottom: 2px; display: flex; justify-content: space-between; }
        #tempo-slider { width: 100%; cursor: pointer; accent-color: var(--secondary); margin: 0; }

        #loading-banner {
            position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.6); color: white; font-size: 11px;
            padding: 5px 14px; border-radius: 20px; white-space: nowrap;
            z-index: 999; transition: opacity 0.5s;
            /* [수정] 로딩 배너가 버튼 클릭 막지 않도록 */
            pointer-events: none;
        }
        #loading-banner.hidden { opacity: 0; }
    </style>
</head>
<body>
    <div class="app-card">
        <img src="logo.jpeg" alt="펜나뮤직 로고" class="app-logo" onerror="this.style.display='none'">
        <div id="loading-banner">🎹 음원 로딩 중...</div>

        <div id="step1-page" class="page active">
            <h2 style="margin-top:20px;">펜나뮤직 이어핏</h2>
            <div class="sub-title">시창/청음 트레이닝</div>
            <div class="btn-group">
                <button class="btn-category" onclick="selectMajor(2)">2도 훈련</button>
                <button class="btn-category" onclick="goToStep1_3()" style="background: #455A64;">3도 훈련</button>
                <button class="btn-category" onclick="goToStep1_4()" style="background: #5D6D7E;">4도 훈련</button>
                <button class="btn-category" onclick="selectMajor(6)" style="background: #2C3E50;">6도 훈련</button>
            </div>
        </div>

        <div id="step1-3-main-page" class="page">
            <h2>3도 훈련 세부 선택</h2>
            <div class="btn-group">
                <button class="btn-category" onclick="selectSub3('2up')">3도상행 2도하행</button>
                <button class="btn-category" onclick="selectSub3('2down')" style="background: #455A64;">3도하행 2도상행</button>
                <button class="btn-category" onclick="selectSub3('2upup')" style="background: #607D8B;">3도상행 2도상행</button>
                <button class="btn-category" onclick="selectSub3('3up')" style="background: #5D6D7E;">3도상행 3도하행</button>
                <button class="btn-category" onclick="selectSub3('3down')" style="background: #5D6D7E;">3도하행 3도상행</button>
                <button class="btn-back" onclick="goStep1()">⬅ 처음으로</button>
            </div>
        </div>

        <div id="step1-4-main-page" class="page">
            <h2>4도 훈련 세부 선택</h2>
            <div class="btn-group" style="gap: 4px;">
                <button class="btn-category" onclick="selectSub4('up2')">4도상행 2도하행</button>
                <button class="btn-category" onclick="selectSub4('up3')">4도상행 3도하행</button>
                <button class="btn-category" onclick="selectSub4('upAll')" style="background: #2C3E50;">4도상행 2-4도하행</button>
                <button class="btn-category" onclick="selectSub4('down2')">4도하행 2도상행</button>
                <button class="btn-category" onclick="selectSub4('down3')">4도하행 3도상행</button>
                <button class="btn-category" onclick="selectSub4('downAll')" style="background: #2C3E50;">4도하행 2-4도상행</button>
                <button class="btn-back" onclick="goStep1()">⬅ 처음으로</button>
            </div>
        </div>

        <div id="step1-5-page" class="page">
            <h2>6도 세부 선택</h2>
            <div class="btn-group">
                <button class="btn-category" onclick="selectSub6('up')">단6도 상행 훈련</button>
                <button class="btn-category" onclick="selectSub6('down')" style="background: #2C3E50;">단6도 하행 훈련</button>
                <button class="btn-back" onclick="goStep1()">⬅ 처음으로</button>
            </div>
        </div>

        <div id="step2-page" class="page">
            <h2 id="step2-title">모드 선택</h2>
            <div class="btn-group">
                <button id="mode-ear-btn" class="btn-main" onclick="startQuiz('ear')" disabled>청음 훈련 (Ear Training)</button>
                <button id="mode-sight-btn" class="btn-main" onclick="startQuiz('sight')" disabled style="background: #5D6D7E;">시창 훈련 (Sight Singing)</button>
                <button class="btn-back" onclick="goPrevStep()">⬅ 뒤로 가기</button>
            </div>
        </div>

        <div id="quiz-page" class="page">
            <div class="display-box">
                <div id="quiz-status"></div>
                <div class="ans-header" id="ans-header">
                    <p id="answer-text"></p>
                    <p id="lyric-match"></p>
                </div>
                <div id="score-container"></div>
            </div>
            <div id="options-area"></div>
            <div class="tempo-container">
                <div class="tempo-label"><span>속도</span><span id="tempo-val">BPM 80</span></div>
                <input type="range" id="tempo-slider" min="50" max="180" value="80" oninput="updateTempo(this.value)">
            </div>
            <div class="btn-group">
                <div style="display: flex; gap: 6px;">
                    <button id="play-btn" class="btn-play" style="flex: 1;" onclick="handlePlay(false)">재생</button>
                    <button id="replay-btn" class="btn-replay" style="flex: 1;" onclick="handlePlay(true)" disabled>다시듣기</button>
                </div>
                <div style="display: flex; gap: 6px;">
                    <button id="ans-btn" class="btn-sub" style="flex: 1.2;" onclick="showAns()">정답/악보 확인</button>
                    <button id="next-btn" class="btn-next" style="flex: 1;" onclick="nextProblem()">다음 문제</button>
                </div>
                <button class="btn-back" onclick="resetStats(); showStep2();">🏠 모드 선택으로</button>
            </div>
        </div>

        <div id="result-page" class="page">
            <h2 style="margin-top:20px;">🎯 중간 점검</h2>
            <div class="display-box" style="min-height: 150px; padding: 15px;">
                <div id="res-rate" style="font-size: 1.4rem; color: #27AE60; font-weight: 700;">정답률: 0%</div>
                <div id="res-counts" style="font-size: 0.9rem; font-weight: 700;">(정답: 0 / 오답: 0)</div>
                <div class="worst-pattern-box" style="background: #FFF0F0; border: 1px dashed #FF9AA2; padding: 12px; border-radius: 15px; margin-top: 10px; text-align: left;">
                    <div style="font-size: 11px; color: #E74C3C; font-weight: 800; margin-bottom: 5px;">⚠️ 취약 패턴 분석</div>
                    <div id="worst-pattern-text" style="font-size: 13px; font-weight: 700;">분석 중...</div>
                </div>
            </div>
            <div class="btn-group" style="margin-top: 20px;">
                <button class="btn-next" onclick="continueQuiz()">다음 10문제 계속하기</button>
                <button class="btn-sub" onclick="resetStats(); goStep1();">훈련 종료 (처음으로)</button>
            </div>
        </div>
    </div>

    <script>
        const { Renderer, Stave, StaveNote, Voice, Formatter, Accidental } = Vex.Flow;

        const sampler = new Tone.Sampler({
            urls: { "A0": "A0.mp3", "C1": "C1.mp3", "D#1": "Ds1.mp3", "F#1": "Fs1.mp3", "A1": "A1.mp3", "C2": "C2.mp3", "D#2": "Ds2.mp3", "F#2": "Fs2.mp3", "A2": "A2.mp3", "C3": "C3.mp3", "D#3": "Ds3.mp3", "F#3": "Fs3.mp3", "A3": "A3.mp3", "C4": "C4.mp3", "D#4": "Ds4.mp3", "F#4": "Fs4.mp3", "A4": "A4.mp3", "C5": "C5.mp3", "D#5": "Ds5.mp3", "F#5": "Fs5.mp3", "A5": "A5.mp3", "C6": "C6.mp3" },
            release: 0.5, baseUrl: "https://tonejs.github.io/audio/salamander/",
            onload: () => {
                document.getElementById('mode-ear-btn').disabled = false;
                document.getElementById('mode-sight-btn').disabled = false;
                const banner = document.getElementById('loading-banner');
                banner.innerText = '✅ 준비 완료!';
                setTimeout(() => banner.classList.add('hidden'), 1200);
            }
        }).toDestination();

        let currentBpm = 80; let visualNotes = []; let currentAns = "", matchedLyric = "";
        let isSightReadingMode = false; let currentIntervalMajor = 2;
        let sub6Direction = 'up'; let sub3Type = '2up'; let sub4Type = 'up2';
        let patternQueue = [];
        let stats = { correct: 0, wrong: 0, sessionCount: 0 };
        let errorTracker = {};
        let answeredCurrent = false;

        const RANGE_MIN = 55; const SIGHT_MAX = 77; const EAR_MAX = 84;
        const baseScales = [{ n: 'c', m: 0 }, { n: 'd', m: 2 }, { n: 'e', m: 4 }, { n: 'f', m: 5 }, { n: 'g', m: 7 }, { n: 'a', m: 9 }, { n: 'b', m: 11 }];

        // [수정] touchstart 대신 Tone.start()를 각 버튼 클릭 시점에서 처리 (이미 startQuiz에서 함)
        document.addEventListener('touchstart', () => {
            if (Tone.context.state !== 'running') Tone.context.resume();
        }, { passive: true });

        function hideAllPages() { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); }
        function goStep1() { hideAllPages(); document.getElementById('step1-page').classList.add('active'); }
        function goToStep1_3() { hideAllPages(); document.getElementById('step1-3-main-page').classList.add('active'); }
        function goToStep1_4() { hideAllPages(); document.getElementById('step1-4-main-page').classList.add('active'); }
        function selectMajor(major) { hideAllPages(); currentIntervalMajor = major; if (major === 6) document.getElementById('step1-5-page').classList.add('active'); else showStep2(); }
        function selectSub6(dir) { sub6Direction = dir; showStep2(); }
        function selectSub3(type) { currentIntervalMajor = 3; sub3Type = type; showStep2(); }
        function selectSub4(type) { currentIntervalMajor = 4; sub4Type = type; showStep2(); }
        function showStep2() { hideAllPages(); document.getElementById('step2-page').classList.add('active'); }
        function goPrevStep() { hideAllPages(); if (currentIntervalMajor === 6) document.getElementById('step1-5-page').classList.add('active'); else if (currentIntervalMajor === 4) document.getElementById('step1-4-main-page').classList.add('active'); else if (currentIntervalMajor === 3) document.getElementById('step1-3-main-page').classList.add('active'); else goStep1(); }

        const p4Up2 = [{ lyric: "도파미", ans: "완4↑단2↓", iv: [5, -1], deg: [3, -1] }, { lyric: "레솔파", ans: "완4↑장2↓", iv: [5, -2], deg: [3, -1] }, { lyric: "시파미", ans: "증4↑단2↓", iv: [6, -1], deg: [3, -1] }, { lyric: "파시라", ans: "증4↑장2↓", iv: [6, -2], deg: [3, -1] }];
        const p4Up3 = [{ lyric: "솔도라", ans: "완4↑단3↓", iv: [5, -3], deg: [3, -2] }, { lyric: "레솔미", ans: "완4↑장3↓", iv: [5, -4], deg: [3, -2] }, { lyric: "시파레", ans: "증4↑단3↓", iv: [6, -3], deg: [3, -2] }, { lyric: "파시솔", ans: "증4↑장3↓", iv: [6, -4], deg: [3, -2] }];
        const p4Down2 = [{ lyric: "도솔시", ans: "완4↓단2↑", iv: [-5, 1], deg: [-3, 1] }, { lyric: "솔레파", ans: "완4↓장2↑", iv: [-5, 2], deg: [-3, 1] }, { lyric: "파시도", ans: "증4↓단2↑", iv: [-6, 1], deg: [-3, 1] }, { lyric: "시파솔", ans: "증4↓장2↑", iv: [-6, 2], deg: [-3, 1] }];
        const p4Down3 = [{ lyric: "솔레파", ans: "완4↓단3↑", iv: [-5, 3], deg: [-3, 2] }, { lyric: "도솔시", ans: "완4↓장3↑", iv: [-5, 4], deg: [-3, 2] }, { lyric: "파시레", ans: "증4↓단3↑", iv: [-6, 3], deg: [-3, 2] }, { lyric: "시파라", ans: "증4↓장3↑", iv: [-6, 4], deg: [-3, 2] }];
        const p4UpExtra = { lyric: "시파도", ans: "증4↑완4↓", iv: [6, -5], deg: [3, -3] };
        const p4DownExtra = { lyric: "파시미", ans: "증4↓완4↑", iv: [-6, 5], deg: [-3, 3] };

        const pattern2D = [{ lyric: "도디레", ans: "단2↑단2↑", iv: [1, 1], deg: [1, 1] }, { lyric: "미파솔", ans: "단2↑장2↑", iv: [1, 2], deg: [1, 1] }, { lyric: "라시도", ans: "장2↑단2↑", iv: [2, 1], deg: [1, 1] }, { lyric: "도레미", ans: "장2↑장2↑", iv: [2, 2], deg: [1, 1] }, { lyric: "도시세", ans: "단2↓단2↓", iv: [-1, -1], deg: [-1, -1] }, { lyric: "솔파미", ans: "장2↓단2↓", iv: [-2, -1], deg: [-1, -1] }, { lyric: "도시라", ans: "단2↓장2↓", iv: [-1, -2], deg: [-1, -1] }, { lyric: "미레도", ans: "장2↓장2↓", iv: [-2, -2], deg: [-1, -1] }];
        const pattern3D2Up = [{ lyric: "도미레", ans: "장3↑장2↓", iv: [4, -2], deg: [2, -1] }, { lyric: "도미메", ans: "장3↑단2↓", iv: [4, -1], deg: [2, -1] }, { lyric: "시레도", ans: "단3↑장2↓", iv: [3, -2], deg: [2, -1] }, { lyric: "라도시", ans: "단3↑단2↓", iv: [3, -1], deg: [2, -1] }, { lyric: "시레b도", ans: "감3↑단2↓", iv: [2, -1], deg: [2, -1] }];
        const pattern3D2Down = [{ lyric: "미도레", ans: "장3↓장2↑", iv: [-4, 2], deg: [-2, 1] }, { lyric: "미도디", ans: "장3↓단2↑", iv: [-4, 1], deg: [-2, 1] }, { lyric: "레시도", ans: "단3↓단2↑", iv: [-3, 1], deg: [-2, 1] }, { lyric: "도라시", ans: "단3↓장2↑", iv: [-3, 2], deg: [-2, 1] }, { lyric: "레b시도", ans: "감3↓단2↑", iv: [-2, 1], deg: [-2, 1] }];
        const pattern3D2UpUp = [{ lyric: "라도디", ans: "단3↑단2↑", iv: [3, 1], deg: [2, 1] }, { lyric: "도미파", ans: "장3↑단2↑", iv: [4, 1], deg: [2, 1] }, { lyric: "파라시", ans: "장3↑장2↑", iv: [4, 2], deg: [2, 1] }, { lyric: "레파솔", ans: "단3↑장2↑", iv: [3, 2], deg: [2, 1] }];
        const pattern3D3Up = [{ lyric: "도미솔", ans: "장3↑단3↑", iv: [4, 3], deg: [2, 2] }, { lyric: "도미솔#", ans: "장3↑장3↑", iv: [4, 4], deg: [2, 2] }, { lyric: "라도미", ans: "단3↑장3↑", iv: [3, 4], deg: [2, 2] }, { lyric: "시레파", ans: "단3↑단3↑", iv: [3, 3], deg: [2, 2] }];
        const pattern3D3Down = [{ lyric: "솔미도", ans: "단3↓장3↓", iv: [-3, -4], deg: [-2, -2] }, { lyric: "도솔#미", ans: "장3↓장3↓", iv: [-4, -4], deg: [-2, -2] }, { lyric: "미도라", ans: "장3↓단3↓", iv: [-4, -3], deg: [-2, -2] }, { lyric: "파레시", ans: "단3↓단3↓", iv: [-3, -3], deg: [-2, -2] }];
        const patternM6Up = [{ lyric: "미도시", ans: "단6↑단2↓", iv: [8, -1], deg: [5, -1] }, { lyric: "시솔파", ans: "단6↑장2↓", iv: [8, -2], deg: [5, -1] }, { lyric: "미도라", ans: "단6↑단3↓", iv: [8, -3], deg: [5, -2] }, { lyric: "미도솔#", ans: "단6↑장3↓", iv: [8, -4], deg: [5, -2] }, { lyric: "미도솔", ans: "단6↑완4↓", iv: [8, -5], deg: [5, -3] }, { lyric: "라파시", ans: "단6↑증4↓", iv: [8, -6], deg: [5, -4] }, { lyric: "시솔도", ans: "단6↑완5↓", iv: [8, -7], deg: [5, -4] }];
        const patternM6Down = [{ lyric: "솔시도", ans: "단6↓단2↑", iv: [-8, 1], deg: [-5, 1] }, { lyric: "파라시", ans: "단6↓장2↑", iv: [-8, 2], deg: [-5, 1] }, { lyric: "도미솔", ans: "단6↓단3↑", iv: [-8, 3], deg: [-5, 2] }, { lyric: "도미솔#", ans: "단6↓장3↑", iv: [-8, 4], deg: [-5, 2] }, { lyric: "도미라", ans: "단6↓완4↑", iv: [-8, 5], deg: [-5, 3] }, { lyric: "솔시파", ans: "단6↓증4↑", iv: [-8, 6], deg: [-5, 4] }, { lyric: "도미시", ans: "단6↓완5↑", iv: [-8, 7], deg: [-5, 5] }];

        async function startQuiz(mode) {
            await Tone.start();
            isSightReadingMode = (mode === 'sight');
            patternQueue = [];
            updateOptionsArea();
            resetStats();
            resetUI();
            visualNotes = generateProblem();

            requestAnimationFrame(() => {
                hideAllPages();
                document.getElementById('quiz-page').classList.add('active');
                setTimeout(() => { handlePlay(false); }, 350);
            });
        }

        function generateProblem() {
            if (patternQueue.length === 0) {
                if (currentIntervalMajor === 2) patternQueue = shuffle([...pattern2D]);
                else if (currentIntervalMajor === 3) {
                    if (sub3Type === '2up') patternQueue = shuffle([...pattern3D2Up]);
                    else if (sub3Type === '2down') patternQueue = shuffle([...pattern3D2Down]);
                    else if (sub3Type === '2upup') patternQueue = shuffle([...pattern3D2UpUp]);
                    else if (sub3Type === '3up') patternQueue = shuffle([...pattern3D3Up]);
                    else if (sub3Type === '3down') patternQueue = shuffle([...pattern3D3Down]);
                } else if (currentIntervalMajor === 4) {
                    if (sub4Type === 'up2') patternQueue = shuffle([...p4Up2]);
                    else if (sub4Type === 'up3') patternQueue = shuffle([...p4Up3]);
                    else if (sub4Type === 'upAll') patternQueue = shuffle([...p4Up2, ...p4Up3, p4UpExtra]);
                    else if (sub4Type === 'down2') patternQueue = shuffle([...p4Down2]);
                    else if (sub4Type === 'down3') patternQueue = shuffle([...p4Down3]);
                    else if (sub4Type === 'downAll') patternQueue = shuffle([...p4Down2, ...p4Down3, p4DownExtra]);
                } else patternQueue = shuffle([...(sub6Direction === 'up' ? patternM6Up : patternM6Down)]);
            }
            const p = patternQueue.shift();
            const CURRENT_MAX = isSightReadingMode ? SIGHT_MAX : EAR_MAX;
            let attempts = 0;
            while (attempts < 500) {
                attempts++;
                let n1Midi = RANGE_MIN + Math.floor(Math.random() * (CURRENT_MAX - RANGE_MIN - 10));
                let n2Midi = n1Midi + p.iv[0]; let n3Midi = n2Midi + p.iv[1];
                if (n1Midi < RANGE_MIN || n2Midi < RANGE_MIN || n3Midi < RANGE_MIN || n1Midi > CURRENT_MAX || n2Midi > CURRENT_MAX || n3Midi > CURRENT_MAX) continue;
                const n1Options = getAllNotationOptions(n1Midi);
                if (n1Options.length === 0) continue;
                for (let n1 of n1Options) {
                    const n2 = getNoteByDegree(n2Midi, n1, p.deg[0]); const n3 = getNoteByDegree(n3Midi, n2, p.deg[1]);
                    if (!n1.acc.includes('##') && !n1.acc.includes('bb') && !n2.acc.includes('##') && !n2.acc.includes('bb') && !n3.acc.includes('##') && !n3.acc.includes('bb')) {
                        matchedLyric = p.lyric; currentAns = p.ans; return [n1, n2, n3];
                    }
                }
            }
            console.warn('generateProblem: 유효한 조합을 찾지 못해 다른 패턴으로 재시도합니다.');
            if (patternQueue.length > 0) return generateProblem();
            patternQueue = shuffle([...pattern2D]);
            return generateProblem();
        }

        // [핵심 수정] opt-btn 생성 시 addEventListener로 등록 (onclick 속성 방식 대신)
        function updateOptionsArea() {
            const area = document.getElementById('options-area');
            area.innerHTML = "";
            if (isSightReadingMode) { area.style.display = 'none'; return; }
            area.style.display = 'grid';
            let list = [];
            if (currentIntervalMajor === 2) list = pattern2D;
            else if (currentIntervalMajor === 3) {
                if (sub3Type === '2up') list = pattern3D2Up; else if (sub3Type === '2down') list = pattern3D2Down;
                else if (sub3Type === '2upup') list = pattern3D2UpUp;
                else if (sub3Type === '3up') list = pattern3D3Up; else list = pattern3D3Down;
            } else if (currentIntervalMajor === 4) {
                if (sub4Type === 'up2') list = p4Up2; else if (sub4Type === 'up3') list = p4Up3; else if (sub4Type === 'upAll') list = [...p4Up2, ...p4Up3, p4UpExtra];
                else if (sub4Type === 'down2') list = p4Down2; else if (sub4Type === 'down3') list = p4Down3; else list = [...p4Down2, ...p4Down3, p4DownExtra];
            } else list = (sub6Direction === 'up' ? patternM6Up : patternM6Down);

            list.forEach((p, i) => {
                const btn = document.createElement('button');
                btn.className = "opt-btn";
                btn.textContent = `${i+1}.${p.lyric}\n(${p.ans})`;
                btn.style.whiteSpace = 'pre-line';
                // [핵심] addEventListener + touchend 이중 처리로 iOS 반응성 보장
                const handler = (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    if (!btn.disabled) checkChoice(btn, p.lyric);
                };
                btn.addEventListener('click', handler);
                btn.addEventListener('touchend', handler, { passive: false });
                area.appendChild(btn);
            });
        }

        function checkChoice(btn, choice) {
            answeredCurrent = true;
            stats.sessionCount++;
            if (choice === matchedLyric) {
                btn.classList.add('correct'); stats.correct++;
                document.getElementById('quiz-status').innerText = "⭕ 정답!";
                document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
                showAns();
            } else {
                btn.classList.add('wrong'); stats.wrong++;
                errorTracker[matchedLyric] = (errorTracker[matchedLyric] || 0) + 1;
                document.getElementById('quiz-status').innerText = "❌ 오답!";
            }
        }

        async function nextProblem() {
            await Tone.start();
            if (!isSightReadingMode && !answeredCurrent) { stats.sessionCount++; }
            if (!isSightReadingMode && stats.sessionCount >= 10) { showResults(); return; }
            resetUI();
            visualNotes = generateProblem();
            setTimeout(() => { handlePlay(false); }, 150);
        }

        function showResults() {
            hideAllPages();
            document.getElementById('result-page').classList.add('active');
            document.getElementById('res-counts').innerText = `(정답: ${stats.correct} / 오답: ${stats.wrong})`;
            const total = stats.correct + stats.wrong;
            const rate = total > 0 ? Math.round((stats.correct / total) * 100) : 0;
            document.getElementById('res-rate').innerText = `정답률: ${rate}%`;
            let wp = "없음"; let maxE = 0;
            for (let l in errorTracker) { if (errorTracker[l] > maxE) { maxE = errorTracker[l]; wp = `${l} (${maxE}회)`; } }
            document.getElementById('worst-pattern-text').innerText = wp;
        }

        function continueQuiz() { stats.sessionCount = 0; hideAllPages(); document.getElementById('quiz-page').classList.add('active'); nextProblem(); }
        function resetStats() { stats = { correct: 0, wrong: 0, sessionCount: 0 }; errorTracker = {}; }

        function resetUI() {
            answeredCurrent = false;
            document.getElementById('ans-header').style.display = 'none';
            document.getElementById('score-container').style.display = 'none';
            document.getElementById('play-btn').disabled = false;
            document.getElementById('replay-btn').disabled = true;
            document.querySelectorAll('.opt-btn').forEach(b => { b.classList.remove('correct', 'wrong'); b.disabled = false; });
            const s = document.getElementById('quiz-status');
            if (isSightReadingMode) s.innerText = "첫 음을 듣고 노래하세요!"; else s.innerText = "";
        }

        async function handlePlay(isReplay) {
            await Tone.start();
            const bpmSec = 60 / currentBpm; const now = Tone.now();
            if (isSightReadingMode) {
                document.getElementById('ans-header').style.display = 'flex';
                document.getElementById('lyric-match').innerText = `가사 : ${matchedLyric}`;
                sampler.triggerAttackRelease(Tone.Frequency(visualNotes[0].midi, "midi"), 1.0);
            } else {
                visualNotes.forEach((n, i) => { sampler.triggerAttackRelease(Tone.Frequency(n.midi, "midi"), bpmSec, now + i * bpmSec); });
            }
            document.getElementById('play-btn').disabled = true;
            document.getElementById('replay-btn').disabled = false;
        }

        function updateTempo(val) { currentBpm = val; document.getElementById('tempo-val').innerText = `BPM ${val}`; }
        function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }

        function showAns() {
            document.getElementById('ans-header').style.display = 'flex';
            document.getElementById('answer-text').innerText = `정답 : ${currentAns}`;
            document.getElementById('lyric-match').innerText = `가사 : ${matchedLyric}`;
            if (isSightReadingMode) document.getElementById('quiz-status').innerText = "";
            drawScore();
            const b = 60/currentBpm; const n = Tone.now();
            visualNotes.forEach((v, i) => { sampler.triggerAttackRelease(Tone.Frequency(v.midi, "midi"), b, n + i * b); });
        }

        function drawScore() {
            const c = document.getElementById('score-container');
            c.innerHTML = ""; c.style.display = "flex";
            const r = new Renderer(c, Renderer.Backends.SVG);
            r.resize(260, 150);
            const ctx = r.getContext();
            const s = new Stave(0, 0, 250);
            s.addClef("treble").setContext(ctx).draw();
            const at = {};
            const notes = visualNotes.map(n => {
                const sn = new StaveNote({ clef: "treble", keys: [`${n.key}/${n.oct}`], duration: "q" });
                const ca = n.acc || ""; const pa = at[n.key];
                if (ca === "") { if (pa !== undefined && pa !== "") sn.addModifier(new Accidental("n")); }
                else { if (pa !== ca) sn.addModifier(new Accidental(ca)); }
                at[n.key] = ca; return sn;
            });
            const voice = new Voice({ num_beats: visualNotes.length, beat_value: 4 });
            voice.addTickables(notes);
            new Formatter().joinVoices([voice]).format([voice], 200);
            voice.draw(ctx, s);
        }

        function getNoteByDegree(midi, baseNote, degreeDiff) {
            const chroma = (midi % 12 + 12) % 12;
            const baseIdx = baseScales.findIndex(s => s.n === baseNote.key);
            let targetIdx = (baseIdx + degreeDiff) % 7;
            if (targetIdx < 0) targetIdx += 7;
            const targetScale = baseScales[targetIdx];
            let octave = baseNote.oct + Math.floor((baseIdx + degreeDiff) / 7);
            let diff = chroma - targetScale.m;
            if (diff > 6) diff -= 12; else if (diff < -6) diff += 12;
            let acc = diff === 1 ? "#" : (diff === 2 ? "##" : (diff === -1 ? "b" : (diff === -2 ? "bb" : "")));
            return { midi, key: targetScale.n, acc, oct: octave };
        }

        function getAllNotationOptions(midi) {
            const chroma = (midi % 12 + 12) % 12;
            const options = [];
            baseScales.forEach((s) => {
                let diff = chroma - s.m;
                if (diff > 6) diff -= 12; else if (diff < -6) diff += 12;
                if (Math.abs(diff) <= 1) {
                    const acc = diff === 1 ? "#" : (diff === -1 ? "b" : "");
                    let oct = Math.floor(midi / 12) - 1;
                    if (s.n === 'b' && acc === '#') oct -= 1;
                    if (s.n === 'c' && acc === 'b') oct += 1;
                    options.push({ midi, key: s.n, acc, oct });
                }
            });
            return options;
        }
    </script>
